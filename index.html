document.body.addEventListener('click', async function(e){
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const action=el.dataset.action;

  if(action==='open-file') return openFile();
  if(action==='sync-now'){
    clearTimeout(saveTimeout);
    const btn=document.getElementById('syncBtn');
    if(btn) btn.classList.add('spinning');
    await saveFile(false);
    if(btn) btn.classList.remove('spinning');
    return;
  }
  if(action==='new-file') return newFile();
  if(action==='close-modal'){ if(e.target===el) closeModal(); return; }

  if(action==='gen-sync-code'){
    const codeInput=document.getElementById('set-sync-code');
    if(codeInput) codeInput.value=generateSyncCode();
    return;
  }
  if(action==='save-and-sync'){
    const urlInput=document.getElementById('set-sync-url');
    const codeInput=document.getElementById('set-sync-code');
    state.settings.syncServerUrl=(urlInput?urlInput.value:'').trim();
    state.settings.syncCode=(codeInput?codeInput.value:'').trim();
    scheduleSave();
    await serverSyncNow();
    return;
  }
  if(action==='upload-now'){
    const urlInput=document.getElementById('set-sync-url');
    const codeInput=document.getElementById('set-sync-code');
    const rawUrl=(urlInput?urlInput.value:'').trim();
    const code=(codeInput?codeInput.value:'').trim();
    if(!rawUrl || !code){ toast('Enter your Worker URL and a sync code first.'); return; }
    state.settings.syncServerUrl=rawUrl;
    state.settings.syncCode=code;
    scheduleSave();
    confirmUploadModal();
    return;
  }
  if(action==='confirm-upload'){
    closeModal();
    await serverUploadNow();
    return;
  }
  if(action==='nav'){ activeTab=el.dataset.tab; render(); return; }

  if(action==='sched-view'){ scheduleViewMode=el.dataset.mode; render(); return; }
  if(action==='week-prev'){ scheduleWeekStart=addDaysISO(scheduleWeekStart,-7); render(); return; }
  if(action==='week-next'){ scheduleWeekStart=addDaysISO(scheduleWeekStart,7); render(); return; }
  if(action==='week-today'){ scheduleWeekStart=mondayOfWeek(todayISO()); render(); return; }
  if(action==='add-block'){
    const day=el.dataset.day!==undefined?Number(el.dataset.day):0;
    const date=addDaysISO(scheduleWeekStart,day);
    openModal(blockModalHtml(blockDraftDefaults(day,date,el.dataset.start)));
    return;
  }
  if(action==='edit-block'){
    const b=state.scheduleBlocks.find(x=>x.id===el.dataset.id);
    const draft={id:b.id,subjectId:b.subjectId,label:b.label,recurring:b.recurring!==false,day:b.day,date:b.date||addDaysISO(scheduleWeekStart,b.day),start:b.start,end:b.end};
    openModal(blockModalHtml(draft));
    return;
  }
  if(action==='toggle-block-recurring'){
    const wasRecurring=document.getElementById('mf-recurring').value==='1';
    const draft={
      id:el.dataset.id||null,
      subjectId:document.getElementById('mf-subject').value,
      label:document.getElementById('mf-label').value,
      recurring:!wasRecurring,
      day:Number(document.getElementById('mf-day').value),
      date:document.getElementById('mf-date').value||todayISO(),
      start:document.getElementById('mf-start').value,
      end:document.getElementById('mf-end').value
    };
    openModal(blockModalHtml(draft));
    return;
  }
  if(action==='save-block'){
    const id=el.dataset.id;
    const recurring=document.getElementById('mf-recurring').value==='1';
    const dateVal=document.getElementById('mf-date').value||todayISO();
    const data={
      subjectId:document.getElementById('mf-subject').value,
      label:document.getElementById('mf-label').value.trim(),
      recurring,
      day: recurring? Number(document.getElementById('mf-day').value) : isoToDayIdx(dateVal),
      date: recurring? null : dateVal,
      start:document.getElementById('mf-start').value,
      end:document.getElementById('mf-end').value
    };
    if(data.end<=data.start){ toast('End time must be after start time.'); return; }
    if(id){ Object.assign(state.scheduleBlocks.find(x=>x.id===id), data); }
    else{ state.scheduleBlocks.push({id:uid(),...data}); }
    scheduleSave(); closeModal(); render(); return;
  }
  if(action==='delete-block'){ state.scheduleBlocks=state.scheduleBlocks.filter(x=>x.id!==el.dataset.id); scheduleSave(); closeModal(); render(); return; }

  if(action==='add-homework'){ openModal(homeworkModalHtml(null)); return; }
  if(action==='edit-homework'){ const h=state.homework.find(x=>x.id===el.dataset.id); openModal(homeworkModalHtml(h)); return; }
  if(action==='save-homework'){
    const id=el.dataset.id;
    const data={title:document.getElementById('mf-title').value.trim()||'Untitled',subjectId:document.getElementById('mf-subject').value,dueDate:document.getElementById('mf-due').value||todayISO(),priority:document.getElementById('mf-priority').value,status:document.getElementById('mf-status').value,description:document.getElementById('mf-desc').value.trim()};
    if(id){ Object.assign(state.homework.find(x=>x.id===id), data); }
    else{ state.homework.push({id:uid(),createdAt:todayISO(),...data}); }
    scheduleSave(); closeModal(); render(); return;
  }
  if(action==='delete-homework'){ state.homework=state.homework.filter(x=>x.id!==el.dataset.id); scheduleSave(); closeModal(); render(); return; }
  if(action==='toggle-hw'){ const h=state.homework.find(x=>x.id===el.dataset.id); h.status = h.status==='done'?'pending':'done'; scheduleSave(); render(); return; }
  if(action==='filter-hw'){ return; }

  if(action==='add-question'){ openModal(questionModalHtml(null)); return; }
  if(action==='edit-question'){ const q=state.questions.find(x=>x.id===el.dataset.id); openModal(questionModalHtml(q)); return; }
  if(action==='save-question'){
    const id=el.dataset.id;
    const text=document.getElementById('mf-qtext').value.trim();
    if(!text){ toast("Question can't be empty."); return; }
    const data={
      text,
      subjectId:document.getElementById('mf-qsubject').value,
      answered:document.getElementById('mf-qstatus').value==='answered',
      answer:document.getElementById('mf-qanswer').value.trim()
    };
    if(id){ Object.assign(state.questions.find(x=>x.id===id), data); }
    else{ state.questions.push({id:uid(),date:todayISO(),createdAt:new Date().toISOString(),...data}); }
    scheduleSave(); closeModal(); render(); return;
  }
  if(action==='delete-question'){ state.questions=state.questions.filter(x=>x.id!==el.dataset.id); scheduleSave(); closeModal(); render(); return; }
  if(action==='toggle-question'){ const q=state.questions.find(x=>x.id===el.dataset.id); q.answered=!q.answered; scheduleSave(); render(); return; }
  if(action==='filter-q'){ return; }

  if(action==='add-subject'){ openModal(subjectModalHtml(null)); return; }
  if(action==='edit-subject'){ const s=subj(el.dataset.id); openModal(subjectModalHtml(s)); return; }
  if(action==='save-subject'){
    const id=el.dataset.id;
    const name=document.getElementById('mf-name').value.trim()||'Untitled';
    const color=document.getElementById('mf-color').value;
    if(id){ Object.assign(subj(id),{name,color}); }
    else{ state.subjects.push({id:uid(),name,color}); }
    scheduleSave(); closeModal(); render(); return;
  }
  if(action==='delete-subject'){
    const id=el.dataset.id;
    const inUse = state.scheduleBlocks.some(b=>b.subjectId===id) || state.homework.some(h=>h.subjectId===id) || state.studyLogs.some(l=>l.subjectId===id) || state.questions.some(q=>q.subjectId===id);
    if(inUse && !confirm('This subject is used in your schedule, homework, logs, or questions. Remove it anyway? (Those items will keep the subject name blank.)')) return;
    state.subjects=state.subjects.filter(s=>s.id!==id);
    scheduleSave(); closeModal(); render(); return;
  }

  if(action==='timer-mode'){
    if(el.disabled) return;
    if(el.dataset.mode==='pomodoro' && state.activeSession){ toast('Stop or discard the current stopwatch session first.'); return; }
    if(el.dataset.mode==='stopwatch' && timer.running){ toast('Pause or finish the pomodoro timer first.'); return; }
    timerMode=el.dataset.mode; render(); return;
  }
  if(action==='open-timer-fullscreen'){ openTimerFullscreen(); return; }
  if(action==='close-timer-fullscreen'){ closeTimerFullscreen(); return; }
  if(action==='start-stopwatch'){
    if(timer.running){ toast('Pause or finish the pomodoro timer first.'); return; }
    const sel=document.getElementById('sw-subject');
    const topicEl=document.getElementById('sw-topic');
    startStopwatch(sel?sel.value:undefined, topicEl?topicEl.value.trim():'');
    return;
  }
  if(action==='stop-stopwatch'){ stopStopwatch(false); return; }
  if(action==='discard-stopwatch'){ if(confirm('Discard this session without logging it?')) stopStopwatch(true); return; }

  if(action==='timer-start'){
    if(state.activeSession){ toast('Stop or discard the current stopwatch session first.'); return; }
    const sel=document.getElementById('timer-subject');
    const topicEl=document.getElementById('pomo-topic');
    if(sel) timer.subjectId=sel.value;
    if(topicEl) timer.topic=topicEl.value;
    if(!timer.subjectId) timer.subjectId=state.subjects[0]?.id;
    if(!timer.running){ timer.running=true; timer.intervalId=setInterval(tickTimer,1000); }
    timerMode='pomodoro';
    render(); return;
  }
  if(action==='timer-pause'){ timer.running=false; clearInterval(timer.intervalId); render(); return; }
  if(action==='timer-reset'){ timer.running=false; clearInterval(timer.intervalId); timer.mode='work'; timer.remaining=state.settings.pomodoroWork*60; timer.topic=''; render(); return; }
  if(action==='timer-finish'){
    timer.running=false; clearInterval(timer.intervalId);
    if(timer.mode==='work'){
      const elapsed=state.settings.pomodoroWork*60-timer.remaining;
      if(elapsed>=60) logStudy(timer.subjectId, elapsed/60, 'timer', timer.topic||'');
    }
    timer.mode='work'; timer.remaining=state.settings.pomodoroWork*60; timer.topic='';
    render(); return;
  }
  if(action==='manual-log'){
    const subjectId=document.getElementById('ml-subject').value;
    const date=document.getElementById('ml-date').value||todayISO();
    const minutes=Number(document.getElementById('ml-minutes').value)||0;
    const note=document.getElementById('ml-note').value.trim();
    if(minutes<=0){ toast('Enter minutes greater than 0.'); return; }
    state.studyLogs.push({id:uid(),subjectId,date,minutes:Math.round(minutes),note,source:'manual'});
    scheduleSave(); render(); toast('Logged '+fmtMins(minutes)+'.'); return;
  }

  if(action==='log-view'){ logViewMode=el.dataset.mode; render(); return; }
  if(action==='log-day-prev'){ logCursorDate=addDaysISO(logCursorDate,-1); render(); return; }
  if(action==='log-day-next'){ logCursorDate=addDaysISO(logCursorDate,1); render(); return; }
  if(action==='log-month-prev'){ logCursorMonth=shiftMonth(logCursorMonth,-1); render(); return; }
  if(action==='log-month-next'){ logCursorMonth=shiftMonth(logCursorMonth,1); render(); return; }
  if(action==='log-jump-day'){ logCursorDate=el.dataset.date; logViewMode='daily'; render(); return; }
  if(action==='delete-log'){
    if(confirm('Delete this logged session?')){
      state.studyLogs=state.studyLogs.filter(x=>x.id!==el.dataset.id);
      scheduleSave(); render();
    }
    return;
  }

  if(action==='trigger-camera'){
    if(isTouchPrimary()){ document.getElementById('cameraInput').click(); }
    else if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){ await openWebcamCapture(); }
    else{ document.getElementById('cameraInput').click(); }
    return;
  }
  if(action==='trigger-gallery'){ document.getElementById('galleryInput').click(); return; }
  if(action==='webcam-cancel'){ closeModal(); return; }
  if(action==='webcam-shoot'){
    const video=document.getElementById('webcam-video');
    if(video && video.videoWidth){
      pendingPhotoData=resizeToDataUrl(video, video.videoWidth, video.videoHeight);
      stopWebcamStream();
      openModal(photoCaptureModalHtml());
    }
    return;
  }
  if(action==='discard-pending-photo'){ pendingPhotoData=null; closeModal(); return; }
  if(action==='link-photos-new'){ await linkPhotoFile('create'); return; }
  if(action==='link-photos-open'){ await linkPhotoFile('open'); return; }
  if(action==='migrate-photos-new'){ await migrateLegacyPhotos('create'); return; }
  if(action==='migrate-photos-open'){ await migrateLegacyPhotos('open'); return; }
  if(action==='import-photos'){ await importPhotosFlow(); return; }
  if(action==='save-photo'){
    if(!pendingPhotoData){ closeModal(); return; }
    const note=document.getElementById('mf-photo-note').value.trim();
    getPhotosArray().push({id:uid(), dataUrl:pendingPhotoData, note, takenAt:new Date().toISOString()});
    pendingPhotoData=null;
    markPhotosDirty(); closeModal(); render();
    toast('Photo saved.');
    return;
  }
  if(action==='view-photo'){
    const p=getPhotosArray().find(x=>x.id===el.dataset.id);
    if(p){ viewingPhotoId=p.id; openModal(photoModalHtml(p)); }
    return;
  }
  if(action==='prev-photo'){ navigatePhoto(-1); return; }
  if(action==='next-photo'){ navigatePhoto(1); return; }
  if(action==='save-photo-note'){
    const p=getPhotosArray().find(x=>x.id===el.dataset.id);
    if(p) p.note=document.getElementById('mf-photo-edit-note').value.trim();
    markPhotosDirty(); closeModal(); render();
    return;
  }
  if(action==='delete-photo'){
    if(confirm('Delete this photo permanently?')){
      const arr=getPhotosArray();
      const idx=arr.findIndex(x=>x.id===el.dataset.id);
      if(idx!==-1) arr.splice(idx,1);
      markPhotosDirty(); closeModal(); render();
    }
    return;
  }
  if(action==='download-photo'){
    const p=getPhotosArray().find(x=>x.id===el.dataset.id);
    if(!p) return;
    const a=document.createElement('a');
    a.href=p.dataUrl;
    a.download='ledger-photo-'+p.takenAt.replace(/[:.]/g,'-')+'.jpg';
    a.click();
    return;
  }
  if(action==='unlock-photos'){
    const input=document.getElementById('photo-unlock-pw');
    const pw=input?input.value:'';
    if(!pw){ toast('Enter your password.'); return; }
    const ok=await unlockPhotosWithPassword(pw);
    if(ok){ finishPendingLegacyMigration(); toast('Unlocked.'); render(); } else { toast('Incorrect password.'); }
    return;
  }
  if(action==='set-photo-password'){ openModal(setPhotoPasswordModalHtml()); return; }
  if(action==='confirm-set-photo-password'){
    const p1=document.getElementById('pw-new1').value, p2=document.getElementById('pw-new2').value;
    if(p1.length<6){ toast('Use at least 6 characters.'); return; }
    if(p1!==p2){ toast('Passwords don’t match.'); return; }
    closeModal();
    await lockPhotosWithPassword(p1);
    toast('Photos locked.');
    render();
    return;
  }
  if(action==='change-photo-password'){ openModal(changePhotoPasswordModalHtml()); return; }
  if(action==='lock-photos-now'){ await relockPhotosNow(); return; }
  if(action==='confirm-change-photo-password'){
    const cur=document.getElementById('pw-cur').value;
    const p1=document.getElementById('pw-new1').value, p2=document.getElementById('pw-new2').value;
    const ok=await verifyLockPassword(cur);
    if(!ok){ toast('Current password is incorrect.'); return; }
    if(p1.length<6){ toast('Use at least 6 characters.'); return; }
    if(p1!==p2){ toast('New passwords don’t match.'); return; }
    closeModal();
    await changeLockPassword(p1);
    toast('Password updated.');
    return;
  }
  if(action==='remove-photo-password'){ openModal(removePhotoPasswordModalHtml()); return; }
  if(action==='confirm-remove-photo-password'){
    const cur=document.getElementById('pw-cur').value;
    const ok=await verifyLockPassword(cur);
    if(!ok){ toast('Current password is incorrect.'); return; }
    closeModal();
    await removeLockPassword();
    toast('Password removed — photos file is no longer locked.');
    render();
    return;
  }

  if(action==='toggle-dark'){ state.settings.darkMode=!state.settings.darkMode; scheduleSave(); applyTheme(); render(); return; }
  if(action==='set-palette'){ state.settings.palette=el.dataset.palette; scheduleSave(); applyTheme(); render(); return; }
  if(action==='save-timer-settings'){
    state.settings.pomodoroWork=Math.max(1,Number(document.getElementById('set-work').value)||25);
    state.settings.pomodoroBreak=Math.max(1,Number(document.getElementById('set-break').value)||5);
    timer.remaining=state.settings.pomodoroWork*60;
    scheduleSave(); toast('Timer defaults saved.'); return;
  }
  if(action==='save-reminder-settings'){
    state.settings.reminderDaysBefore=Math.max(0,Number(document.getElementById('set-reminder').value)||0);
    scheduleSave(); toast('Reminder window saved.'); return;
  }
  if(action==='settings-save'){ await saveFile(false); toast('Saved.'); return; }
  if(action==='settings-saveas'){ await pickSaveLocation(); return; }
  if(action==='settings-open'){
    if(stopwatchIntervalId){ clearInterval(stopwatchIntervalId); stopwatchIntervalId=null; }
    await openFile();
    return;
  }
  if(action==='clear-all'){
    const photoWarning=photosLinked()?' Your linked photos file will also be cleared.':'';
    if(confirm('This will erase all subjects, schedule blocks, homework, and logs in this open ledger.'+photoWarning+' This cannot be undone. Continue?')){
      if(stopwatchIntervalId){ clearInterval(stopwatchIntervalId); stopwatchIntervalId=null; }
      state=defaultState();
      if(photosLinked()){ photoState=defaultPhotoState(); schedulePhotoSave(); }
      scheduleSave(); updateLiveSessionBadge(); render(); toast('Ledger cleared.');
    }
    return;
  }
});

    render();

  if(e.target.matches('[data-action="filter-q"]')){
    qFilters[e.target.dataset.key]=e.target.value;
    render();
  }
});
document.body.addEventListener('click', function(e){
  const sw=e.target.closest('#mf-palette .sw');
  if(sw && sw.dataset.color){
    document.querySelectorAll('#mf-palette .sw').forEach(x=>x.classList.remove('sel'));
    sw.classList.add('sel');
    document.getElementById('mf-color').value=sw.dataset.color;
  }
});
document.body.addEventListener('input', function(e){
  if(e.target.id==='mf-colorpicker'){
    document.querySelectorAll('#mf-palette .sw').forEach(x=>x.classList.remove('sel'));
    document.getElementById('mf-color').value=e.target.value;
  }
  if(e.target.id==='sw-topic' && state.activeSession){
    state.activeSession.topic=e.target.value;
    scheduleSave();
  }
  if(e.target.id==='pomo-topic'){
    timer.topic=e.target.value;
  }
});

/* keep timer ticking while navigating tabs, but don't render each tick if not on timer view */
window.addEventListener('beforeunload', function(e){
  if(document.getElementById('syncStatus') && document.getElementById('syncStatus').textContent.indexOf('Not synced')===0){
    e.preventDefault(); e.returnValue='';
  }
});

})();
</script>
</body>
</html>
