<style>
:root{
  --paper:#EFEDE6;
  --paper-2:#E4E0D4;
  --paper-3:#D9D4C4;
  --ink:#23272B;
  --ink-soft:#5B5F63;
  --line:#C9C2B4;
  --accent-study:#2E5E4E;
  --accent-study-soft:#DDEAE4;
  --accent-due:#B23A48;
  --accent-due-soft:#F6DEDF;
  --accent-gold:#C98A3E;
  --accent-gold-soft:#F3E4CC;
  --accent-info:#4A5FBF;
  --accent-info-soft:#E1E4F6;
  --radius:10px;
  --radius-sm:6px;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --shadow:0 1px 2px rgba(35,39,43,0.06),0 4px 14px rgba(35,39,43,0.06);
  --on-study:#fff;
  --on-due:#fff;
}
[data-theme="dark"]{
  --paper:#1B1D1F;
  --paper-2:#232629;
  --paper-3:#2C3033;
  --ink:#EDEAE2;
  --ink-soft:#A8A9A6;
  --line:#3A3D40;
  --accent-study:#5AA189;
  --accent-study-soft:#20342C;
  --accent-due:#E1707B;
  --accent-due-soft:#3B2226;
  --accent-gold:#DDAB63;
  --accent-gold-soft:#392C19;
  --accent-info:#8B9BE8;
  --accent-info-soft:#232A47;
  --shadow:0 1px 2px rgba(0,0,0,0.3),0 4px 18px rgba(0,0,0,0.35);
  --on-study:#151515;
  --on-due:#151515;
}
/* ===== THEME: Terminal — dark, monospace, sharp-edged, CRT-inspired ===== */
[data-palette="terminal"]{
  --paper:#0A0F0B;
  --paper-2:#10160F;
  --paper-3:#1A231A;
  --ink:#C8F5D0;
  --ink-soft:#6FA37F;
  --line:#274430;
  --accent-study:#3DFF8E;
  --accent-study-soft:#0F3320;
  --accent-due:#FF5C5C;
  --accent-due-soft:#3A1414;
  --accent-gold:#FFD84D;
  --accent-gold-soft:#3A3312;
  --accent-info:#5CD1FF;
  --accent-info-soft:#0F2C3A;
  --radius:2px;
  --radius-sm:2px;
  --font-display:'JetBrains Mono',ui-monospace,monospace;
  --font-body:'JetBrains Mono',ui-monospace,monospace;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --shadow:none;
  --on-study:#081208;
  --on-due:#081208;
}
[data-palette="terminal"] body{
  background-image:repeating-linear-gradient(0deg, rgba(61,255,142,0.035) 0px, rgba(61,255,142,0.035) 1px, transparent 1px, transparent 3px);
  letter-spacing:0.01em;
}
[data-palette="terminal"] .card{ box-shadow:none; }
[data-palette="terminal"] .btn{ border-radius:2px; text-transform:uppercase; letter-spacing:.05em; font-size:12px; font-weight:600; }
[data-palette="terminal"] .btn.primary{ box-shadow:0 0 12px rgba(61,255,142,0.35); }
[data-palette="terminal"] h1,[data-palette="terminal"] h2,[data-palette="terminal"] h3,[data-palette="terminal"] .display{ text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
[data-palette="terminal"] .brand-mark,[data-palette="terminal"] .swatch,[data-palette="terminal"] .navitem,[data-palette="terminal"] .tag{ border-radius:2px; }
[data-palette="terminal"] .navitem.active{ box-shadow:0 0 10px rgba(61,255,142,0.4); }
/* ===== THEME: Neon — dark cyberpunk, glowing text and controls ===== */
[data-palette="neon"]{
  --paper:#0D0221;
  --paper-2:#150533;
  --paper-3:#20094A;
  --ink:#F2E9FF;
  --ink-soft:#9C87C9;
  --line:#3D1A6B;
  --accent-study:#39FF9E;
  --accent-study-soft:#0F3B2C;
  --accent-due:#FF2E9A;
  --accent-due-soft:#3D0E28;
  --accent-gold:#FFE93C;
  --accent-gold-soft:#3A3308;
  --accent-info:#2EE6FF;
  --accent-info-soft:#0B2E38;
  --radius:6px;
  --radius-sm:4px;
  --font-display:'Orbitron',sans-serif;
  --font-body:'Space Grotesk',sans-serif;
  --shadow:none;
  --on-study:#0D0221;
  --on-due:#0D0221;
}
[data-palette="neon"] body{
  background-image:linear-gradient(rgba(46,230,255,0.055) 1px,transparent 1px),linear-gradient(90deg,rgba(46,230,255,0.055) 1px,transparent 1px);
  background-size:26px 26px;
}
[data-palette="neon"] h1,[data-palette="neon"] h2,[data-palette="neon"] h3,[data-palette="neon"] .display{
  text-shadow:0 0 3px rgba(242,233,255,0.3); letter-spacing:.03em; font-weight:600;
}
[data-palette="neon"] .card,[data-palette="neon"] .navitem,[data-palette="neon"] .swatch,[data-palette="neon"] .tag{ border-radius:6px; }
[data-palette="neon"] .btn.primary{ box-shadow:0 0 5px rgba(57,255,158,0.4); animation:neonPulse 2.8s ease-in-out infinite; }
[data-palette="neon"] .navitem.active{ box-shadow:0 0 5px rgba(57,255,158,0.3); }
[data-palette="neon"] .streaknum,[data-palette="neon"] .statnum{ text-shadow:0 0 4px rgba(57,255,158,0.45); }
@keyframes neonPulse{
  0%,100%{ box-shadow:0 0 4px rgba(57,255,158,0.32); }
  50%{ box-shadow:0 0 7px rgba(57,255,158,0.48); }
}

/* ===== THEME: Aurora — dark, slow-drifting gradient glow ===== */
[data-palette="aurora"]{
  --paper:#070A12;
  --paper-2:#0D1420;
  --paper-3:#16202F;
  --ink:#E4EDF5;
  --ink-soft:#7C93AD;
  --line:#233047;
  --accent-study:#57E8B0;
  --accent-study-soft:#0F3328;
  --accent-due:#FF6E9E;
  --accent-due-soft:#3A1826;
  --accent-gold:#FFD37A;
  --accent-gold-soft:#3A2E14;
  --accent-info:#8C93F8;
  --accent-info-soft:#1E223F;
  --radius:14px;
  --radius-sm:10px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --on-study:#0A0E18;
  --on-due:#0A0E18;
}
[data-palette="aurora"] #app{ position:relative; z-index:1; }
[data-palette="aurora"] body{ position:relative; }
[data-palette="aurora"] body::before{
  content:''; position:fixed; inset:-20%;
  background:
    radial-gradient(circle at 20% 20%,rgba(87,232,176,0.16),transparent 40%),
    radial-gradient(circle at 80% 25%,rgba(140,147,248,0.15),transparent 45%),
    radial-gradient(circle at 50% 85%,rgba(255,110,158,0.12),transparent 40%);
  animation:auroraDrift 20s ease-in-out infinite alternate;
  z-index:0; pointer-events:none;
}
@keyframes auroraDrift{
  0%{ transform:translate(0,0) scale(1); }
  100%{ transform:translate(-4%,3%) scale(1.1); }
}
[data-palette="aurora"] .card{ backdrop-filter:blur(2px); }

/* ===== THEME: Sakura — light, drifting petals, blossom-pink over spring sky ===== */
[data-palette="sakura"]{
  --paper:#FFF6F8;
  --paper-2:#FFEAF0;
  --paper-3:#FFD9E4;
  --ink:#5C3A45;
  --ink-soft:#B98A9A;
  --line:#F5C7D6;
  --accent-study:#D9648A;
  --accent-study-soft:#FCE4EC;
  --accent-due:#C13B52;
  --accent-due-soft:#F8DCE0;
  --accent-gold:#EFAA55;
  --accent-gold-soft:#FCEAD3;
  --accent-info:#6FA4DE;
  --accent-info-soft:#E3EEFA;
  --radius:16px;
  --radius-sm:11px;
  --font-display:'Comfortaa',sans-serif;
  --font-body:'Nunito',sans-serif;
  --shadow:0 3px 14px rgba(217,100,138,0.18);
  --on-study:#151515;
}
[data-palette="sakura"] .card{ border-width:0; }
[data-palette="sakura"] .btn{ border-radius:100px; font-weight:700; }
[data-palette="sakura"] .navitem{ border-radius:100px; }
[data-palette="sakura"] .swatch,[data-palette="sakura"] .cal-cell{ border-radius:10px; }
.sakura-fx{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5;}
.sakura-fx .petal{position:absolute;top:-6%;width:10px;height:10px;border-radius:50% 0 50% 50%;background:#F49CB5;animation-name:petalFall;animation-timing-function:linear;animation-iteration-count:infinite;}
@keyframes petalFall{
  0%{ transform:translateY(0) translateX(0) rotate(0deg); }
  100%{ transform:translateY(110vh) translateX(50px) rotate(320deg); }
}

/* ===== THEME: Sunset — warm drifting gradient, retro grid horizon ===== */
[data-palette="sunset"]{
  --paper:#FFF1E6;
  --paper-2:#FFE4D1;
  --paper-3:#FFCBA6;
  --ink:#5A2E3D;
  --ink-soft:#B97D8E;
  --line:#F0B98A;
  --accent-study:#128071;
  --accent-study-soft:#DDF0EC;
  --accent-due:#D6455B;
  --accent-due-soft:#FBE0E3;
  --accent-gold:#F4A73E;
  --accent-gold-soft:#FDEcd2;
  --accent-info:#7A5FBF;
  --accent-info-soft:#EBE4F7;
  --radius:4px;
  --radius-sm:3px;
  --font-display:'Righteous',cursive;
  --shadow:0 2px 10px rgba(122,60,90,0.12);
  --on-due:#151515;
}
[data-palette="sunset"] body{
  position:relative;
  background:linear-gradient(180deg,#FFDFAE 0%,#FFB199 35%,#F589B0 65%,#C97FD1 100%);
  background-size:100% 220%;
  animation:sunsetShift 16s ease-in-out infinite alternate;
}
@keyframes sunsetShift{
  0%{ background-position:0% 0%; }
  100%{ background-position:0% 45%; }
}
[data-palette="sunset"] #app{ position:relative; z-index:1; }
[data-palette="sunset"] .sidebar,[data-palette="sunset"] #syncbar,[data-palette="sunset"] .card{ background:rgba(255,246,240,0.7); backdrop-filter:blur(6px); }
[data-palette="sunset"] body::after{
  content:''; position:fixed; left:0; right:0; bottom:0; height:130px;
  background-image:linear-gradient(rgba(122,95,191,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(122,95,191,0.4) 1px,transparent 1px);
  background-size:34px 34px;
  transform:perspective(200px) rotateX(55deg); transform-origin:bottom;
  pointer-events:none; z-index:0; opacity:0.55;
}
[data-palette="sunset"] h1,[data-palette="sunset"] h2,[data-palette="sunset"] h3,[data-palette="sunset"] .display{ letter-spacing:.01em; }

/* ===== THEME: Lavender — calm stationery/journal, dot-grid paper, engraved serif headers ===== */
[data-palette="lavender"]{
  --paper:#F5F2FC;
  --paper-2:#ECE4FA;
  --paper-3:#DED0F4;
  --ink:#453A5E;
  --ink-soft:#8D80AC;
  --line:#D6C6EF;
  --accent-study:#8B7BC7;
  --accent-study-soft:#EAE5F8;
  --accent-due:#C2477A;
  --accent-due-soft:#F7DFEA;
  --accent-gold:#CC9752;
  --accent-gold-soft:#F5E7D2;
  --accent-info:#6E88CC;
  --accent-info-soft:#E4E9F8;
  --radius:14px;
  --radius-sm:9px;
  --font-display:'Cormorant Garamond',serif;
  --font-body:'Poppins',sans-serif;
  --shadow:0 2px 16px rgba(139,123,199,0.14);
  --on-study:#151515;
}
[data-palette="lavender"] body{
  background-image:radial-gradient(rgba(139,123,199,0.16) 1px,transparent 1.5px);
  background-size:24px 24px;
}
[data-palette="lavender"] .card{ border-width:0; }
[data-palette="lavender"] h1,[data-palette="lavender"] h2,[data-palette="lavender"] h3,[data-palette="lavender"] .display{ font-weight:600; letter-spacing:.01em; }
[data-palette="lavender"] h1::after,[data-palette="lavender"] h2::after{ content:''; display:block; width:38px; height:2px; background:var(--accent-study); opacity:.5; margin-top:8px; border-radius:2px; }
[data-palette="lavender"] .navitem.active{ box-shadow:0 3px 10px rgba(139,123,199,0.3); }

/* ===== THEME: Mint — crisp, fresh, frosted glass over a whisper of green ===== */
[data-palette="mint"]{
  --paper:#EFFAF5;
  --paper-2:#E1F4EA;
  --paper-3:#CDEBDC;
  --ink:#2F4A40;
  --ink-soft:#6B9484;
  --line:#BFE6D6;
  --accent-study:#22A379;
  --accent-study-soft:#DBF2E8;
  --accent-due:#DD6E89;
  --accent-due-soft:#FAE2E8;
  --accent-gold:#D9A24E;
  --accent-gold-soft:#F5E8D0;
  --accent-info:#3E85D9;
  --accent-info-soft:#DFEBFA;
  --radius:8px;
  --radius-sm:5px;
  --font-display:'Sora',sans-serif;
  --font-body:'Manrope',sans-serif;
  --shadow:0 2px 12px rgba(34,163,121,0.14);
  --on-study:#0F2019;
  --on-due:#0F2019;
}
[data-palette="mint"] body{
  background:
    radial-gradient(circle at 15% 0%,rgba(34,163,121,0.08),transparent 45%),
    radial-gradient(circle at 100% 30%,rgba(62,133,217,0.06),transparent 40%),
    var(--paper);
}
[data-palette="mint"] .card{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(7px);
  border-top:2px solid var(--accent-study);
}
[data-palette="mint"] h1,[data-palette="mint"] h2,[data-palette="mint"] h3,[data-palette="mint"] .display{ letter-spacing:-0.01em; }

/* ===== THEME: Diagnostic — dark oxblood terminal, dithered readouts, monospace HUD ===== */
[data-palette="diagnostic"]{
  --paper:#241412;
  --paper-2:#2E1917;
  --paper-3:#3B211E;
  --ink:#E8DDC8;
  --ink-soft:#9C8570;
  --line:#4A2B26;
  --accent-study:#8FA88A;
  --accent-study-soft:#28352A;
  --accent-due:#C0574C;
  --accent-due-soft:#3D211D;
  --accent-gold:#C99A52;
  --accent-gold-soft:#3A2E1C;
  --accent-info:#7C93A6;
  --accent-info-soft:#232E36;
  --radius:0px;
  --radius-sm:0px;
  --font-display:'JetBrains Mono',ui-monospace,monospace;
  --font-body:'JetBrains Mono',ui-monospace,monospace;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --shadow:none;
  --on-study:#1B2119;
  --on-due:#F4EAD9;
}
[data-palette="diagnostic"] body{
  background-image:
    linear-gradient(rgba(232,221,200,0.05) 2px, transparent 2px),
    linear-gradient(90deg, rgba(232,221,200,0.05) 2px, transparent 2px),
    repeating-linear-gradient(0deg, rgba(232,221,200,0.02) 0px, rgba(232,221,200,0.02) 1px, transparent 1px, transparent 3px);
  background-size:13px 13px, 13px 13px, auto;
  letter-spacing:.01em;
}
[data-palette="diagnostic"] svg{ stroke-linecap:square; stroke-linejoin:miter; }
[data-palette="diagnostic"] h1,[data-palette="diagnostic"] h2,[data-palette="diagnostic"] h3,[data-palette="diagnostic"] .display{
  text-transform:uppercase; font-weight:700; letter-spacing:.06em;
}
[data-palette="diagnostic"] h1::before,[data-palette="diagnostic"] h2::before,[data-palette="diagnostic"] h3::before{
  content:'// '; color:var(--accent-study); opacity:.6;
}
[data-palette="diagnostic"] .card{ position:relative; box-shadow:none; }
[data-palette="diagnostic"] .card::before,[data-palette="diagnostic"] .card::after{
  content:''; position:absolute; width:8px; height:8px; opacity:.55; pointer-events:none;
}
[data-palette="diagnostic"] .card::before{ top:-1px; left:-1px; border-top:2px solid var(--accent-study); border-left:2px solid var(--accent-study); }
[data-palette="diagnostic"] .card::after{ bottom:-1px; right:-1px; border-bottom:2px solid var(--accent-study); border-right:2px solid var(--accent-study); }
[data-palette="diagnostic"] .btn{ text-transform:uppercase; letter-spacing:.05em; font-size:12px; font-weight:600; border-radius:0; box-shadow:2px 2px 0 var(--line); }
[data-palette="diagnostic"] .btn:active{ box-shadow:1px 1px 0 var(--line); transform:translate(1px,1px); }
[data-palette="diagnostic"] .btn.primary{ box-shadow:2px 2px 0 rgba(0,0,0,.3); }
[data-palette="diagnostic"] .btn.primary:active{ box-shadow:1px 1px 0 rgba(0,0,0,.3); transform:translate(1px,1px); }
[data-palette="diagnostic"] .navitem{ text-transform:uppercase; font-size:12px; letter-spacing:.05em; font-weight:600; border-radius:0; }
[data-palette="diagnostic"] .navitem.active{ box-shadow:0 0 9px rgba(143,168,138,0.35); }
[data-palette="diagnostic"] .tag{ text-transform:uppercase; letter-spacing:.04em; border-radius:0; }
[data-palette="diagnostic"] .brand-mark,[data-palette="diagnostic"] .swatch,[data-palette="diagnostic"] .wg-block,[data-palette="diagnostic"] .cal-cell{ border-radius:0; }
[data-palette="diagnostic"] .barrow .track{ border:1px solid var(--line); border-radius:0; }
[data-palette="diagnostic"] .barrow .fill{
  border-radius:0;
  background-image:repeating-conic-gradient(rgba(0,0,0,.45) 0% 25%, transparent 0% 50%) !important;
  background-size:4px 4px !important;
}
[data-palette="diagnostic"] .barrow .val{ text-transform:uppercase; }
[data-palette="diagnostic"] .empty{ border-style:solid; border-radius:0; }

/* ===== THEME: Halftone — dot-screen night sky, drifting cumulus, print-registration
   texture on every surface. This theme also gets two bespoke animations (see the
   HALFTONE THEME EFFECTS block in the script, and the .halftone-curtain / .section-in
   rules below): an ink-dot curtain that wipes top-to-bottom the first time this theme
   is shown, and a matching top-to-bottom reveal on the main content whenever the
   person switches tabs while it's active. Both are Halftone-only — every other theme
   is unaffected. ===== */
[data-palette="halftone"]{
  --paper:#0E1A2B;
  --paper-2:#152640;
  --paper-3:#1C3252;
  --ink:#EAF3FC;
  --ink-soft:#89ABCB;
  --line:#28456D;
  --accent-study:#57C6E0;
  --accent-study-soft:#123244;
  --accent-due:#F2718A;
  --accent-due-soft:#3A1C29;
  --accent-gold:#F4C15E;
  --accent-gold-soft:#3A2E14;
  --accent-info:#9FB8E8;
  --accent-info-soft:#1C2C4A;
  --radius:16px;
  --radius-sm:10px;
  --font-display:'Outfit',sans-serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --shadow:0 10px 32px rgba(4,10,20,0.5);
  --on-study:#06141F;
  --on-due:#2A0812;
}
/* Real background art (the dotted sky + clouds) is a <canvas> painted by JS into
   #halftoneBgLayer, fixed behind #app — see setupHalftoneBackground(). This flat
   dot-mesh is just a same-tone fallback for the instant before that canvas paints,
   and for no-JS/print contexts. */
[data-palette="halftone"] body{
  background-color:var(--paper);
  background-image:
    radial-gradient(circle, rgba(234,243,252,0.035) 1px, transparent 1.5px),
    radial-gradient(circle, rgba(87,198,224,0.05) 1px, transparent 1.5px);
  background-size:13px 13px, 13px 13px;
  background-position:0 0, 6.5px 6.5px;
}
[data-palette="halftone"] #app{ position:relative; z-index:1; }
[data-palette="halftone"] .sidebar{
  background-color:rgba(21,38,64,0.68);
  background-image:
    radial-gradient(circle, rgba(244,193,94,0.05) 1px, transparent 1.4px),
    radial-gradient(circle, rgba(87,198,224,0.06) 1px, transparent 1.4px);
  background-size:13px 13px, 13px 13px;
  background-position:0 0, 6.5px 6.5px;
  backdrop-filter:blur(12px);
  border-right:1px solid rgba(87,198,224,0.16);
}
[data-palette="halftone"] #syncbar{
  background:rgba(21,38,64,0.6); backdrop-filter:blur(12px); border-bottom-color:rgba(87,198,224,0.16);
}
[data-palette="halftone"] .card{
  background-color:rgba(28,50,82,0.58);
  background-image:
    radial-gradient(circle, rgba(234,243,252,0.05) 1px, transparent 1.4px),
    radial-gradient(circle, rgba(87,198,224,0.06) 1px, transparent 1.4px);
  background-size:12px 12px, 12px 12px;
  background-position:0 0, 6px 6px;
  backdrop-filter:blur(8px);
  border-color:rgba(87,198,224,0.18);
}
[data-palette="halftone"] h1,[data-palette="halftone"] h2,[data-palette="halftone"] h3,[data-palette="halftone"] .display{ font-weight:600; letter-spacing:-0.005em; }
[data-palette="halftone"] h1::before,[data-palette="halftone"] h2::before,[data-palette="halftone"] h3::before{ content:'· '; color:var(--accent-study); opacity:.75; }
[data-palette="halftone"] .btn{ background-color:rgba(28,50,82,0.55); backdrop-filter:blur(4px); }
[data-palette="halftone"] .btn:hover{ background-color:rgba(37,63,100,0.8); }
[data-palette="halftone"] .btn.primary{ animation:haloBreathe 3.6s ease-in-out infinite; }
[data-palette="halftone"] .navitem.active{ box-shadow:0 4px 18px rgba(87,198,224,0.4); }
[data-palette="halftone"] .brand-mark{ box-shadow:0 0 14px rgba(87,198,224,0.5); }
[data-palette="halftone"] .swatch,[data-palette="halftone"] .navitem,[data-palette="halftone"] .tag,[data-palette="halftone"] .wg-block,[data-palette="halftone"] .cal-cell{ border-radius:12px; }
[data-palette="halftone"] .cal-cell{ background:rgba(28,50,82,0.4); border-color:rgba(87,198,224,0.16); }
[data-palette="halftone"] .barrow .track{ background:rgba(20,36,58,0.7); }
[data-palette="halftone"] .barrow .fill{ background-image:radial-gradient(circle, rgba(255,255,255,0.35) 1px, transparent 1.2px); background-size:5px 5px; }
[data-palette="halftone"] .empty{ border-color:rgba(87,198,224,0.28); }
[data-palette="halftone"] .modal{ background:rgba(19,33,54,0.94); backdrop-filter:blur(18px); border:1px solid rgba(87,198,224,0.2); }
[data-palette="halftone"] .toast{ background:var(--accent-study); color:var(--on-study); }
[data-palette="halftone"] select,[data-palette="halftone"] input[type=text],[data-palette="halftone"] input[type=date],[data-palette="halftone"] input[type=number],[data-palette="halftone"] textarea{
  background:rgba(10,20,34,0.55); border-color:rgba(87,198,224,0.24); color:var(--ink);
}
@keyframes haloBreathe{
  0%,100%{ box-shadow:0 3px 16px rgba(87,198,224,0.28); }
  50%{ box-shadow:0 5px 26px rgba(87,198,224,0.5); }
}

/* --- Halftone-only entrance: an opaque dot curtain that wipes away top-to-bottom the
   first time this theme is shown (page load, or switching into it from Settings). --- */
.halftone-curtain{
  position:fixed; inset:0; z-index:9999; pointer-events:none;
  background-color:#0B1420;
  background-image:
    radial-gradient(circle, rgba(234,243,252,0.14) 1px, transparent 1.6px),
    radial-gradient(circle, rgba(87,198,224,0.2) 1px, transparent 1.6px);
  background-size:13px 13px, 13px 13px;
  background-position:0 0, 6.5px 6.5px;
  animation: halftoneCurtainOut 1.3s cubic-bezier(.6,0,.2,1) forwards;
}
.halftone-curtain-sweep{
  position:absolute; left:0; right:0; top:0; height:64px;
  background-image: radial-gradient(circle, rgba(255,255,255,0.95) 1.6px, transparent 1.8px);
  background-size:11px 11px;
  mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
  box-shadow:0 0 26px 6px rgba(87,198,224,0.55);
  animation: halftoneSweepMove 1.3s cubic-bezier(.6,0,.2,1) forwards;
}
@keyframes halftoneCurtainOut{
  0%{ clip-path:inset(0 0 0 0); }
  100%{ clip-path:inset(100% 0 0 0); }
}
@keyframes halftoneSweepMove{
  0%{ top:0%; opacity:1; }
  88%{ opacity:1; }
  100%{ top:100%; opacity:0; }
}

/* --- Halftone-only section transitions: main content reveals top-to-bottom, with the
   same travelling dot-line, every time the person switches tabs (see render() in the
   script, which adds/removes .section-in on the persistent #main node). --- */
[data-palette="halftone"] main{ position:relative; }
[data-palette="halftone"] main.section-in{ animation: halftoneMainIn .6s cubic-bezier(.22,.8,.32,1) both; }
[data-palette="halftone"] main.section-in::after{
  content:''; position:absolute; left:0; right:0; top:0; height:44px;
  background-image: radial-gradient(circle, rgba(87,198,224,0.95) 1.4px, transparent 1.6px);
  background-size:10px 10px;
  mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
  box-shadow:0 0 16px 4px rgba(87,198,224,0.5);
  pointer-events:none; z-index:5;
  animation: halftoneSweepMove .6s cubic-bezier(.22,.8,.32,1) both;
}
@keyframes halftoneMainIn{
  0%{ clip-path:inset(0 0 100% 0); opacity:.5; }
  100%{ clip-path:inset(0 0 0% 0); opacity:1; }
}

/* ===== THEME: Glass — an iridescent field of long, wiggly "ribbon" lines behind the
   whole app, seen through frosted glass panels (sidebar, cards, sync bar, modals).
   The ribbon field is a <canvas> painted by setupGlassBackground() — see the GLASS
   THEME EFFECTS block in the script — plus a matching wiggly-ribbon flower as the
   full-screen timer's hero art, and a left-to-right sweep reveal (the mirror image
   of Halftone's top-to-bottom one) on first appearance and on every tab switch.
   Both animations are Glass-only — every other theme is unaffected. ===== */
[data-palette="glass"]{
  --paper:#FBF8F5;
  --paper-2:#F4EFE9;
  --paper-3:#EBE0F8;
  --ink:#29243D;
  --ink-soft:#8B84A8;
  --line:#E2D5F5;
  --accent-study:#8A5CE8;
  --accent-study-soft:#EEE6FC;
  --accent-due:#E8734F;
  --accent-due-soft:#FCE3D8;
  --accent-gold:#E7A93E;
  --accent-gold-soft:#FBEAD1;
  --accent-info:#4FA3D8;
  --accent-info-soft:#E1EFF9;
  --radius:20px;
  --radius-sm:13px;
  --font-display:'Outfit',sans-serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --shadow:0 10px 40px rgba(138,92,232,0.16);
  --on-study:#fff;
  --on-due:#fff;
}
/* Real background art (the wiggly ribbon field) is a <canvas> painted by JS into
   #glassBgLayer, fixed behind #app — see setupGlassBackground(). This gradient is
   just a same-tone fallback for the instant before that canvas paints, and for
   no-JS/print contexts. */
[data-palette="glass"] body{
  background:linear-gradient(165deg,#FBF8F5 0%,#F5EEFB 55%,#EFE3FA 100%);
}
[data-palette="glass"] #app{ position:relative; z-index:1; }
[data-palette="glass"] .sidebar{
  background-color:rgba(255,255,255,0.5);
  backdrop-filter:blur(18px) saturate(1.3);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  border-right:1px solid rgba(255,255,255,0.65);
}
[data-palette="glass"] #syncbar{
  background:rgba(255,255,255,0.45); backdrop-filter:blur(16px) saturate(1.3); -webkit-backdrop-filter:blur(16px) saturate(1.3);
  border-bottom-color:rgba(255,255,255,0.55);
}
[data-palette="glass"] .card{
  background-color:rgba(255,255,255,0.55);
  backdrop-filter:blur(16px) saturate(1.25);
  -webkit-backdrop-filter:blur(16px) saturate(1.25);
  border:1px solid rgba(255,255,255,0.65);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.8), 0 10px 30px rgba(138,92,232,0.10);
}
[data-palette="glass"] h1,[data-palette="glass"] h2,[data-palette="glass"] h3,[data-palette="glass"] .display{ font-weight:600; letter-spacing:-0.01em; }
[data-palette="glass"] h1::after,[data-palette="glass"] h2::after{
  content:''; display:block; width:46px; height:3px; margin-top:9px; border-radius:3px;
  background:linear-gradient(90deg, var(--accent-study), var(--accent-due), var(--accent-gold), var(--accent-info));
}
[data-palette="glass"] .btn{ background-color:rgba(255,255,255,0.62); backdrop-filter:blur(6px); border-color:rgba(255,255,255,0.75); }
[data-palette="glass"] .btn:hover{ background-color:rgba(255,255,255,0.9); }
[data-palette="glass"] .btn.primary{
  background:linear-gradient(120deg, var(--accent-study), #B08CE8 45%, var(--accent-info));
  background-size:220% 220%; border-color:transparent; color:#fff;
  animation:glassSheen 5s ease-in-out infinite;
}
@keyframes glassSheen{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }
[data-palette="glass"] .navitem.active{ background:linear-gradient(120deg, var(--accent-study), #B08CE8); box-shadow:0 6px 18px rgba(138,92,232,0.35); }
[data-palette="glass"] .brand-mark{ background:linear-gradient(135deg, var(--accent-study), var(--accent-due)); box-shadow:0 0 16px rgba(138,92,232,0.4); }
[data-palette="glass"] .swatch,[data-palette="glass"] .navitem,[data-palette="glass"] .tag,[data-palette="glass"] .wg-block,[data-palette="glass"] .cal-cell{ border-radius:14px; }
[data-palette="glass"] .cal-cell{ background:rgba(255,255,255,0.45); border-color:rgba(138,92,232,0.2); }
[data-palette="glass"] .barrow .track{ background:rgba(235,224,248,0.7); }
[data-palette="glass"] .empty{ border-color:rgba(138,92,232,0.28); }
[data-palette="glass"] .modal{ background:rgba(255,255,255,0.88); backdrop-filter:blur(24px) saturate(1.3); -webkit-backdrop-filter:blur(24px) saturate(1.3); border:1px solid rgba(255,255,255,0.7); }
[data-palette="glass"] .toast{ background:var(--accent-study); color:var(--on-study); }
[data-palette="glass"] select,[data-palette="glass"] input[type=text],[data-palette="glass"] input[type=date],[data-palette="glass"] input[type=number],[data-palette="glass"] textarea{
  background:rgba(255,255,255,0.65); border-color:rgba(138,92,232,0.25); color:var(--ink);
}

/* --- Glass-only entrance: a dense, colourful wiggly-ribbon curtain that wipes away
   left-to-right the first time this theme is shown (page load, or switching into it
   from Settings) — the mirror image of Halftone's top-to-bottom dot curtain. --- */
.glass-curtain{
  position:fixed; inset:0; z-index:9999; pointer-events:none; overflow:hidden;
  animation: glassCurtainOut 1.3s cubic-bezier(.6,0,.2,1) forwards;
}
.glass-curtain canvas{ position:absolute; inset:0; width:100%; height:100%; }
.glass-curtain-sweep{
  position:absolute; top:0; bottom:0; left:0; width:clamp(34px,9vw,84px);
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.95) 55%, rgba(138,92,232,0.55) 82%, transparent);
  mask-image: linear-gradient(to right, black 0%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, black 0%, transparent 100%);
  box-shadow:0 0 30px 8px rgba(138,92,232,0.5);
  animation: glassSweepMove 1.3s cubic-bezier(.6,0,.2,1) forwards;
}
@keyframes glassCurtainOut{
  0%{ clip-path:inset(0 0 0 0); }
  100%{ clip-path:inset(0 0 0 100%); }
}
@keyframes glassSweepMove{
  0%{ left:0%; opacity:1; }
  88%{ opacity:1; }
  100%{ left:100%; opacity:0; }
}

/* --- Glass-only section transitions: main content reveals left-to-right, with the
   same travelling ribbon-glow line, every time the person switches tabs (see render()
   in the script, which adds/removes .section-in on the persistent #main node). --- */
[data-palette="glass"] main{ position:relative; }
[data-palette="glass"] main.section-in{ animation: glassMainIn .6s cubic-bezier(.22,.8,.32,1) both; }
[data-palette="glass"] main.section-in::after{
  content:''; position:absolute; top:0; bottom:0; left:0; width:clamp(26px,7vw,64px);
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.9) 55%, rgba(138,92,232,0.45) 82%, transparent);
  mask-image: linear-gradient(to right, black 0%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, black 0%, transparent 100%);
  box-shadow:0 0 20px 5px rgba(138,92,232,0.45);
  pointer-events:none; z-index:5;
  animation: glassSweepMove .6s cubic-bezier(.22,.8,.32,1) both;
}
@keyframes glassMainIn{
  0%{ clip-path:inset(0 100% 0 0); opacity:.5; }
  100%{ clip-path:inset(0 0% 0 0); opacity:1; }
}

*{box-sizing:border-box;}
body{margin:0;}
html,body{height:100%;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:var(--font-display);font-weight:600;letter-spacing:-0.01em;}
.mono{font-family:var(--font-mono);}
button{font-family:inherit;}
a{color:inherit;}

/* ===== Layout ===== */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:220px;flex-shrink:0;
  background:var(--paper-2);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  padding:20px 14px;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px 8px;}
.brand-mark{width:30px;height:30px;border-radius:7px;background:var(--accent-study);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-mark svg{width:17px;height:17px;stroke:var(--paper);}
.brand-name{font-family:var(--font-display);font-size:19px;font-weight:700;line-height:1.1;}
.brand-sub{font-size:10.5px;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;}

nav.navlist{display:flex;flex-direction:column;gap:2px;flex:1;}
.navitem{
  display:flex;align-items:center;gap:11px;
  padding:9px 10px;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--ink-soft);font-size:14px;font-weight:500;
  border:none;background:none;text-align:left;width:100%;
}
.navitem svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;flex-shrink:0;}
.navitem:hover{background:var(--paper-3);color:var(--ink);}
.navitem.active{background:var(--accent-study);color:var(--on-study);}
.navitem.active svg{stroke:var(--on-study);}

.content-col{flex:1;min-width:0;display:flex;flex-direction:column;max-width:1180px;}
#syncbar{position:sticky;top:0;z-index:15;display:flex;align-items:center;gap:16px;padding:11px 34px;background:var(--paper-2);border-bottom:1px solid var(--line);flex-wrap:wrap;}
.syncbar-file{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.syncbar-file svg{width:15px;height:15px;stroke:var(--ink-soft);flex-shrink:0;}
.syncbar-status{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);margin-right:auto;white-space:nowrap;}
.syncbar-time{font-family:var(--font-mono);font-size:11px;}
#syncBtn{flex-shrink:0;}
#syncBtn svg{width:14px;height:14px;}
#syncBtn.spinning svg{animation:spin .6s linear;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.live-session{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--accent-study);background:var(--accent-study-soft);padding:5px 12px;border-radius:100px;flex-shrink:0;}
.live-session .dot-pulse{width:8px;height:8px;border-radius:50%;background:var(--accent-study);animation:pulse 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.live-session .btn{padding:2px 9px;font-size:11.5px;}
main{flex:1;min-width:0;padding:24px 34px 60px;}
.savedot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent-study);margin-right:5px;}
.savedot.pending{background:var(--accent-gold);}

.pagehead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.pagehead h1{font-size:26px;margin:0;}
.pagehead .sub{color:var(--ink-soft);font-size:13px;margin-top:2px;}

/* ===== Cards / generic ===== */
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
.card+.card{margin-top:14px;}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:900px){.grid2{grid-template-columns:1fr;}.grid3{grid-template-columns:1fr;}}

.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--line);
  background:var(--paper);color:var(--ink);font-size:13.5px;font-weight:600;cursor:pointer;
}
.btn:hover{background:var(--paper-3);}
.btn.primary{background:var(--accent-study);border-color:var(--accent-study);color:var(--on-study);}
.btn.primary:hover{filter:brightness(1.08);}
.btn.danger{background:var(--accent-due);border-color:var(--accent-due);color:var(--on-due);}
.btn.ghost{background:transparent;border-color:transparent;}
.btn.small{padding:5px 10px;font-size:12px;}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;}

.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:100px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.empty{color:var(--ink-soft);font-size:13.5px;padding:22px 10px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius);}

/* ===== Topbar file controls ===== */
.topbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:18px;flex-wrap:wrap;}

/* ===== Today view ===== */
.streakrow{display:flex;align-items:center;gap:14px;}
.streaknum{font-family:var(--font-mono);font-size:34px;font-weight:700;color:var(--accent-study);}
.tally{display:flex;gap:6px;flex-wrap:wrap;}
.tallygroup{display:flex;gap:2px;position:relative;padding-right:6px;}
.tallybar{width:3px;height:20px;background:var(--accent-gold);border-radius:1px;}
.tallybar.strike{position:relative;}
.tallybar.strike::after{content:'';position:absolute;left:-9px;top:9px;width:20px;height:3px;background:var(--accent-gold);transform:rotate(-40deg);}

.schedrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);}
.schedrow:last-child{border-bottom:none;}
.schedtime{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);width:98px;flex-shrink:0;}
.schedlabel{font-size:13.5px;font-weight:500;flex:1;}

.duerow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
.duerow:last-child{border-bottom:none;}
.duedate{font-family:var(--font-mono);font-size:12px;padding:3px 8px;border-radius:5px;flex-shrink:0;}

/* ===== Schedule grid ===== */
.viewtoggle{display:flex;gap:4px;background:var(--paper-3);padding:3px;border-radius:8px;}
.viewtoggle button{border:none;background:none;padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
.viewtoggle button.active{background:var(--paper);color:var(--ink);box-shadow:var(--shadow);}
.viewtoggle button:disabled{opacity:.4;cursor:not-allowed;}

.weekwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper-2);}
.weekgrid{display:grid;grid-template-columns:52px repeat(7,minmax(108px,1fr));min-width:820px;position:relative;}
.wg-daylabel{position:sticky;top:0;background:var(--paper-2);z-index:2;padding:9px 4px;text-align:center;font-size:11.5px;font-weight:700;letter-spacing:.03em;border-bottom:1px solid var(--line);border-left:1px solid var(--line);}
.wg-daylabel.wg-today{background:var(--accent-study-soft);color:var(--accent-study);}
.wg-datenum{font-family:var(--font-mono);font-size:13px;font-weight:600;margin-top:2px;}
.wg-corner{position:sticky;top:0;left:0;background:var(--paper-2);z-index:3;border-bottom:1px solid var(--line);}
.wg-timelabel{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-soft);text-align:right;padding-right:6px;transform:translateY(-6px);}
.wg-timelabel-first{transform:translateY(0);}
.wg-cell{border-left:1px solid var(--line);border-top:1px solid var(--paper-3);cursor:pointer;}
.wg-cell:hover{background:var(--accent-study-soft);}
.wg-cell.hourline{border-top:1px solid var(--line);}
.wg-block{margin:1px 3px;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:600;color:#fff;overflow:hidden;cursor:pointer;line-height:1.3;z-index:1;position:relative;}
.wg-block .t{font-family:var(--font-mono);font-weight:500;opacity:.9;font-size:9.5px;display:block;}

.listday{margin-bottom:16px;}
.listday h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:0 0 8px;}

/* ===== Homework ===== */
.filterbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
select,input[type=text],input[type=date],input[type=number],textarea{
  font-family:inherit;font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);
  border:1px solid var(--line);background:var(--paper);color:var(--ink);
}
textarea{width:100%;resize:vertical;min-height:64px;}
.hwcard{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--paper);margin-bottom:8px;}
.hwcard.done{opacity:.55;}
.hwcard .chk{width:19px;height:19px;border-radius:5px;border:2px solid var(--line);flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.hwcard .chk.checked{background:var(--accent-study);border-color:var(--accent-study);}
.hwcard .chk.checked svg{width:12px;height:12px;stroke:#fff;stroke-width:3;}
.hwtitle{font-weight:600;font-size:14px;}
.hwmeta{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap;}
.hwdesc{font-size:12.5px;color:var(--ink-soft);margin-top:5px;}
.priority-high{color:var(--accent-due);}
.priority-med{color:var(--accent-gold);}
.priority-low{color:var(--ink-soft);}

/* ===== Timer ===== */
.timerwrap{display:flex;flex-direction:column;align-items:center;padding:30px 10px;position:relative;}
.timerdisplay{font-family:var(--font-mono);font-size:64px;font-weight:700;letter-spacing:-0.02em;margin:14px 0;}
.stopwatch-display{font-family:var(--font-mono);font-size:52px;font-weight:700;letter-spacing:-0.02em;margin:14px 0;}
.timerctrls{display:flex;gap:10px;margin-top:8px;}
.timerform{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:6px;}
.sessionrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
.sessionrow:last-child{border-bottom:none;}
.fs-toggle-btn{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;color:var(--ink-soft);padding:7px;border-radius:var(--radius-sm);display:flex;}
.fs-toggle-btn:hover{background:var(--paper-3);color:var(--ink);}
.fs-toggle-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;}

/* ===== Timer Fullscreen ===== */
.timer-fs{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:var(--paper);color:var(--ink);}
.timer-fs .fs-stage{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;max-width:92vw;}
.fs-close{position:absolute;top:24px;right:28px;z-index:5;background:none;border:1px solid var(--line);cursor:pointer;color:var(--ink-soft);padding:9px;border-radius:var(--radius-sm);display:flex;}
.fs-close:hover{background:var(--paper-3);color:var(--ink);}
.fs-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;}
.fs-subject{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;margin-bottom:6px;}
.fs-label{font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;}
.fs-topic{font-size:13px;color:var(--ink-soft);margin-top:2px;max-width:70vw;text-align:center;}
.fs-ringwrap{position:relative;display:flex;align-items:center;justify-content:center;margin:18px 0;}
.fs-ringwrap svg{transform:rotate(-90deg);width:min(56vw,340px);height:min(56vw,340px);}
.fs-ringwrap circle{fill:none;stroke-width:5;}
.fs-ring-bg{stroke:var(--line);opacity:.5;}
.fs-ring-fg{stroke:var(--accent-study);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.fs-time{position:absolute;font-family:var(--font-mono);font-weight:700;letter-spacing:-0.02em;font-size:clamp(40px,9vw,84px);}
.fs-ctrls{display:flex;gap:12px;margin-top:8px;position:relative;z-index:3;}
.fs-ctrls .btn{padding:12px 24px;font-size:14.5px;}
.fs-cycles{margin-top:18px;font-size:12px;color:var(--ink-soft);position:relative;z-index:3;}
.fs-hint{position:absolute;bottom:26px;font-size:11px;color:var(--ink-soft);opacity:.6;letter-spacing:.03em;}
.fs-fx{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;}

/* --- ledger: warm paper glow, gentle lamplight breathing --- */
.timer-fs.fs-ledger::before{content:'';position:absolute;inset:-15%;background:radial-gradient(circle at 50% 42%,var(--accent-study-soft),transparent 62%);opacity:.75;animation:fsBreathe 6s ease-in-out infinite;z-index:0;}
@keyframes fsBreathe{0%,100%{transform:scale(1);opacity:.55;}50%{transform:scale(1.12);opacity:.85;}}

/* --- terminal: CRT scanlines + flicker glow --- */
.timer-fs.fs-terminal{background:var(--paper);}
.timer-fs.fs-terminal::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(61,255,142,0.05) 0px,rgba(61,255,142,0.05) 1px,transparent 1px,transparent 3px);z-index:0;}
.timer-fs.fs-terminal::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(61,255,142,0.08),transparent 70%);animation:fsCrtFlicker 4.5s infinite;z-index:0;}
.timer-fs.fs-terminal .fs-time{text-shadow:0 0 22px currentColor,0 0 6px currentColor;}
.timer-fs.fs-terminal .fs-label,.timer-fs.fs-terminal .fs-subject{text-transform:uppercase;letter-spacing:.15em;}
@keyframes fsCrtFlicker{0%,89%,91%,100%{opacity:1;}90%{opacity:.75;}}

/* --- neon: cyberpunk grid + scanning beam --- */
.timer-fs.fs-neon{background:var(--paper);}
.timer-fs.fs-neon::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(46,230,255,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(46,230,255,0.08) 1px,transparent 1px);background-size:34px 34px;z-index:0;}
.timer-fs.fs-neon .fs-beam{position:absolute;left:0;right:0;height:120px;background:linear-gradient(180deg,transparent,rgba(57,255,158,0.14),transparent);animation:fsScan 5s linear infinite;z-index:0;}
@keyframes fsScan{0%{top:-120px;}100%{top:100%;}}
.timer-fs.fs-neon .fs-time{text-shadow:0 0 16px currentColor;}

/* --- aurora: intensified drifting glow + twinkling stars --- */
.timer-fs.fs-aurora::before{content:'';position:absolute;inset:-25%;background:
    radial-gradient(circle at 20% 20%,rgba(87,232,176,0.22),transparent 42%),
    radial-gradient(circle at 80% 25%,rgba(140,147,248,0.2),transparent 48%),
    radial-gradient(circle at 50% 85%,rgba(255,110,158,0.16),transparent 42%);
  animation:auroraDrift 14s ease-in-out infinite alternate;z-index:0;}
.timer-fs.fs-aurora .fs-star{position:absolute;border-radius:50%;background:#fff;animation:fsTwinkle 3s ease-in-out infinite;}
@keyframes fsTwinkle{0%,100%{opacity:.15;}50%{opacity:.9;}}

/* --- sakura: denser falling petals + soft glow --- */
.timer-fs.fs-sakura::before{content:'';position:absolute;inset:-10%;background:radial-gradient(circle at 50% 40%,rgba(244,156,181,0.22),transparent 60%);z-index:0;}
.timer-fs.fs-sakura .fs-petal{position:absolute;top:-6%;width:13px;height:13px;border-radius:50% 0 50% 50%;background:#F49CB5;animation-name:petalFall;animation-timing-function:linear;animation-iteration-count:infinite;}

/* --- sunset: animated sky + retro horizon + rising/setting sun --- */
.timer-fs.fs-sunset{background:linear-gradient(180deg,#FFDFAE 0%,#FFB199 35%,#F589B0 65%,#C97FD1 100%);background-size:100% 220%;animation:sunsetShift 16s ease-in-out infinite alternate;}
.timer-fs.fs-sunset .fs-sun{position:absolute;left:50%;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#FFE9C2,#F4A73E 70%);box-shadow:0 0 60px rgba(244,167,62,0.55);transform:translateX(-50%);transition:top 1s linear;z-index:0;}
.timer-fs.fs-sunset .fs-horizon{position:absolute;left:0;right:0;bottom:0;height:36%;background-image:linear-gradient(rgba(122,95,191,0.45) 1px,transparent 1px),linear-gradient(90deg,rgba(122,95,191,0.45) 1px,transparent 1px);background-size:34px 34px;transform:perspective(200px) rotateX(55deg);transform-origin:bottom;z-index:1;opacity:.65;}
.timer-fs.fs-sunset .fs-stage,.timer-fs.fs-sunset .fs-ctrls,.timer-fs.fs-sunset .fs-cycles{background:rgba(255,246,240,0.55);backdrop-filter:blur(6px);border-radius:20px;padding:24px 34px;}
.timer-fs.fs-sunset .fs-ctrls{background:none;backdrop-filter:none;padding:0;}

/* --- lavender / mint: calm breathing circle for focus pacing --- */
.timer-fs.fs-lavender .fs-breathe,.timer-fs.fs-mint .fs-breathe{position:absolute;border-radius:50%;background:var(--accent-study-soft);animation:fsBreatheCalm 8s ease-in-out infinite;z-index:0;}
@keyframes fsBreatheCalm{0%,100%{transform:scale(0.85);opacity:.5;}50%{transform:scale(1.25);opacity:.85;}}
.timer-fs.fs-lavender .fs-mote{position:absolute;border-radius:50%;background:var(--accent-study);opacity:.4;animation:fsMoteDrift ease-in-out infinite;}
@keyframes fsMoteDrift{0%{transform:translateY(0) translateX(0);opacity:0;}15%{opacity:.5;}85%{opacity:.4;}100%{transform:translateY(-90vh) translateX(24px);opacity:0;}}
.timer-fs.fs-mint .fs-leaf{position:absolute;font-size:22px;opacity:.5;animation:fsSway ease-in-out infinite;}
@keyframes fsSway{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-14px) rotate(8deg);}}

/* --- diagnostic: dot-grid HUD + scanning oscilloscope line --- */
.timer-fs.fs-diagnostic{background:var(--paper);}
.timer-fs.fs-diagnostic::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(232,221,200,0.06) 2px,transparent 2px),linear-gradient(90deg,rgba(232,221,200,0.06) 2px,transparent 2px);background-size:13px 13px;z-index:0;}
.timer-fs.fs-diagnostic .fs-scan{position:absolute;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,var(--accent-study) 0 4px,transparent 4px 8px);opacity:.5;animation:fsDiagScan 4.5s steps(24) infinite;z-index:0;}
@keyframes fsDiagScan{0%{top:0%;}100%{top:100%;}}
.timer-fs.fs-diagnostic .fs-time{letter-spacing:0;}
.timer-fs.fs-diagnostic .fs-label,.timer-fs.fs-diagnostic .fs-subject{text-transform:uppercase;letter-spacing:.14em;}
.timer-fs.fs-diagnostic .fs-ringwrap circle{stroke-width:7;}
.timer-fs.fs-diagnostic .fs-ring-bg{stroke-dasharray:5 4;}
.timer-fs.fs-diagnostic .fs-ring-fg{stroke-linecap:butt;}
.timer-fs.fs-diagnostic .fs-eyewrap{position:absolute;left:50%;top:39%;width:min(56vw,285px);height:min(34vw,171px);transform:translate(-50%,-50%);z-index:0;image-rendering:pixelated;}
.timer-fs.fs-diagnostic .fs-eye-frame{position:absolute;inset:0;display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(9,1fr);}
.timer-fs.fs-diagnostic .fs-eye-frame i{display:block;}
.timer-fs.fs-diagnostic .fs-eye-frame.open{animation:fsEyeShowOpen 5.5s steps(1,end) infinite;}
.timer-fs.fs-diagnostic .fs-eye-frame.closed{opacity:0;animation:fsEyeShowClosed 5.5s steps(1,end) infinite;}
@keyframes fsEyeShowOpen{0%,87%,100%{opacity:1;}89%,96%{opacity:0;}}
@keyframes fsEyeShowClosed{0%,87%,100%{opacity:0;}89%,96%{opacity:1;}}
.timer-fs.fs-diagnostic .fs-eye-frame i.s{background:var(--ink-soft);opacity:.4;}
.timer-fs.fs-diagnostic .fs-eye-frame i.i{background:var(--accent-study);opacity:.55;}
.timer-fs.fs-diagnostic .fs-eye-frame i.p{background:var(--paper-3);opacity:.9;}
.timer-fs.fs-diagnostic .fs-eye-frame i.g{background:var(--ink);opacity:.7;}
.timer-fs.fs-diagnostic .fs-eye-frame i.l{background:var(--ink-soft);opacity:.4;}
.timer-fs.fs-diagnostic .fs-eye-frame i.ls{background:var(--ink-soft);opacity:.2;}
.timer-fs.fs-diagnostic .fs-lettergrid{position:absolute;left:50%;bottom:68px;transform:translateX(-50%);display:grid;grid-template-columns:repeat(12,1fr);gap:4px;width:min(88vw,540px);font-family:var(--font-mono);font-size:11px;font-weight:700;z-index:0;}
.timer-fs.fs-diagnostic .fs-gridcell{display:flex;align-items:center;justify-content:center;aspect-ratio:1;border:1px solid var(--line);color:var(--ink-soft);opacity:.55;}
.timer-fs.fs-diagnostic .fs-gridcell.hit{background:var(--accent-study-soft);color:var(--accent-study);opacity:.9;border-color:var(--accent-study);}

/* --- halftone: a big cozy dot-screen cloud drawn to <canvas> by renderFsCloud(), with a
   slow drift/breathe on the canvas itself (cheap — it's a transform, not a redraw) plus a
   scatter of tiny twinkling dots in the dark upper sky. --- */
.timer-fs.fs-halftone{background:#0E1A2B;}
.timer-fs.fs-halftone .fs-cloud-canvas{
  position:absolute; inset:-4%; width:108%; height:108%;
  animation:fsCloudDrift 16s ease-in-out infinite; transform-origin:50% 60%;
}
@keyframes fsCloudDrift{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-1.2%,0.6%) scale(1.02); }
}
.timer-fs.fs-halftone .fs-twinkle{
  position:absolute; border-radius:50%; background:#EAF3FC; opacity:.75;
  box-shadow:0 0 5px rgba(234,243,252,0.6);
  animation-name:fsTwinkleDot; animation-timing-function:ease-in-out; animation-iteration-count:infinite;
}
.timer-fs.fs-halftone .fs-twinkle.warm{ background:#F4C15E; box-shadow:0 0 6px rgba(244,193,94,0.7); }
@keyframes fsTwinkleDot{
  0%,100%{ opacity:.25; transform:scale(.8); }
  50%{ opacity:.9; transform:scale(1.15); }
}
.timer-fs.fs-halftone .fs-stage{
  background:rgba(14,26,43,0.42); backdrop-filter:blur(14px);
  border-radius:28px; padding:36px 42px; border:1px solid rgba(87,198,224,0.22);
}
.timer-fs.fs-halftone .fs-time{ text-shadow:0 0 22px rgba(87,198,224,.4); }
.timer-fs.fs-halftone .fs-ring-fg{ filter:drop-shadow(0 0 6px rgba(87,198,224,.55)); }
.timer-fs.fs-halftone .fs-label,.timer-fs.fs-halftone .fs-subject{ letter-spacing:.06em; }

/* --- glass: a big cozy wiggly-ribbon flower drawn to <canvas> by renderFsGlassFlower(),
   with a slow sway on the canvas itself (cheap — it's a transform, not a redraw), a
   warm breathing glow behind it for coziness, and a scatter of small twinkling glints
   in the iridescent palette. --- */
.timer-fs.fs-glass{ background:linear-gradient(180deg,#FBF8F5 0%,#F3ECFB 100%); }
.timer-fs.fs-glass::before{
  content:''; position:absolute; inset:-20%;
  background:radial-gradient(circle at 50% 46%, rgba(231,169,62,0.16), transparent 60%);
  opacity:.85; animation:fsBreathe 7s ease-in-out infinite; z-index:0;
}
.timer-fs.fs-glass .fs-flower-canvas{
  position:absolute; inset:-6%; width:112%; height:112%;
  animation:fsFlowerSway 18s ease-in-out infinite; transform-origin:50% 52%;
}
@keyframes fsFlowerSway{
  0%,100%{ transform:rotate(0deg) scale(1); }
  50%{ transform:rotate(1.4deg) scale(1.015); }
}
.timer-fs.fs-glass .fs-glint{
  position:absolute; border-radius:50%; opacity:.7;
  animation-name:fsGlintTwinkle; animation-timing-function:ease-in-out; animation-iteration-count:infinite;
}
.timer-fs.fs-glass .fs-glint.v{ background:#8A5CE8; box-shadow:0 0 7px rgba(138,92,232,.7); }
.timer-fs.fs-glass .fs-glint.c{ background:#E8734F; box-shadow:0 0 7px rgba(232,115,79,.7); }
.timer-fs.fs-glass .fs-glint.g{ background:#E7A93E; box-shadow:0 0 7px rgba(231,169,62,.7); }
.timer-fs.fs-glass .fs-glint.s{ background:#4FA3D8; box-shadow:0 0 7px rgba(79,163,216,.7); }
@keyframes fsGlintTwinkle{ 0%,100%{ opacity:.2; transform:scale(.7); } 50%{ opacity:.9; transform:scale(1.2); } }
.timer-fs.fs-glass .fs-stage{
  background:rgba(255,255,255,0.5); backdrop-filter:blur(20px) saturate(1.3); -webkit-backdrop-filter:blur(20px) saturate(1.3);
  border-radius:30px; padding:38px 44px; border:1px solid rgba(255,255,255,0.7);
  box-shadow:0 20px 60px rgba(138,92,232,0.18);
}
.timer-fs.fs-glass .fs-time{ text-shadow:0 0 26px rgba(138,92,232,.35); }
.timer-fs.fs-glass .fs-ring-fg{ filter:drop-shadow(0 0 7px rgba(138,92,232,.5)); }
.timer-fs.fs-glass .fs-label,.timer-fs.fs-glass .fs-subject{ letter-spacing:.06em; }

/* ===== Stats ===== */
.barrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.barrow .lbl{width:110px;font-size:12.5px;font-weight:500;flex-shrink:0;}
.barrow .track{flex:1;height:10px;background:var(--paper-3);border-radius:100px;overflow:hidden;}
.barrow .fill{height:100%;border-radius:100px;}
.barrow .val{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);width:52px;text-align:right;flex-shrink:0;}

.weekbars{display:flex;align-items:flex-end;gap:10px;height:120px;padding-top:10px;}
.weekbar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;height:100%;}
.weekbar-fill{width:100%;border-radius:5px 5px 0 0;background:var(--accent-study);min-height:2px;}
.weekbar-day{font-size:10.5px;color:var(--ink-soft);font-family:var(--font-mono);}

.statnum{font-family:var(--font-mono);font-size:28px;font-weight:700;}
.statlabel{font-size:12px;color:var(--ink-soft);margin-top:2px;}

.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:10.5px;color:var(--ink-soft);text-align:center;margin-bottom:5px;font-weight:700;letter-spacing:.03em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:6px;padding:4px;display:flex;flex-direction:column;cursor:pointer;position:relative;overflow:hidden;background:var(--paper);}
.cal-cell.empty-cell{border:none;cursor:default;background:transparent;}
.cal-cell:not(.empty-cell):hover{border-color:var(--accent-study);}
.cal-cell.cal-today{border-color:var(--accent-study);border-width:2px;}
.cal-daynum{font-size:10.5px;color:var(--ink-soft);font-family:var(--font-mono);position:relative;z-index:1;}
.cal-bar{position:absolute;inset:0;background:var(--accent-study);z-index:0;}
.cal-mins{position:relative;z-index:1;font-size:9px;margin-top:auto;font-weight:700;}

/* ===== Subjects ===== */
.subjrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
.subjrow:last-child{border-bottom:none;}
.swatch{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.1);cursor:pointer;}
.palette{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.palette .sw{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.palette .sw.sel{border-color:var(--ink);}

/* ===== Photos ===== */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.photo-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--paper-3);border:1px solid var(--line);}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-meta{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.6));color:#fff;font-size:9.5px;padding:5px 6px;font-family:var(--font-mono);}

/* ===== Modal ===== */
.modal-backdrop{position:fixed;inset:0;background:rgba(20,20,18,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--paper);border-radius:14px;padding:24px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h2{margin:0 0 16px;font-size:19px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field select,.field input,.field textarea{width:100%;}
.fieldrow{display:flex;gap:10px;}
.fieldrow .field{flex:1;}
.modalactions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

/* ===== Settings ===== */
.togglerow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);}
.togglerow:last-child{border-bottom:none;}
.switch{width:40px;height:23px;border-radius:100px;background:var(--paper-3);position:relative;cursor:pointer;border:1px solid var(--line);flex-shrink:0;}
.switch.on{background:var(--accent-study);}
.switch .knob{width:17px;height:17px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;}
.switch.on .knob{left:19px;}
.theme-options{display:flex;gap:10px;flex-wrap:wrap;}
.theme-opt{border:2px solid var(--line);border-radius:10px;padding:9px;cursor:pointer;text-align:center;font-size:11.5px;font-weight:600;width:88px;flex-shrink:0;}
.theme-opt.sel{border-color:var(--accent-study);}
.theme-preview{height:38px;border-radius:6px;margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:5px;}
.theme-preview span{width:11px;height:11px;border-radius:50%;display:inline-block;}
.theme-opt .theme-desc{font-weight:400;color:var(--ink-soft);font-size:10px;margin-top:2px;}

/* ===== Gate screen (no file open) ===== */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.gatecard{max-width:440px;text-align:center;}
.gatecard .brand-mark{margin:0 auto 18px;width:52px;height:52px;border-radius:14px;}
.gatecard .brand-mark svg{width:28px;height:28px;}
.gatecard h1{font-size:26px;margin:0 0 8px;}
.gatecard p{color:var(--ink-soft);font-size:14px;line-height:1.55;margin-bottom:24px;}
.gateactions{display:flex;flex-direction:column;gap:10px;}
.gatenote{font-size:11.5px;color:var(--ink-soft);margin-top:18px;line-height:1.6;}
.gateversion{font-size:11px;color:var(--ink-soft);margin-top:14px;opacity:.75;}
.gateversion .codename{font-style:italic;}
.mascot{display:flex;justify-content:center;margin-bottom:4px;animation:mascotBob 3.2s ease-in-out infinite;}
.mascot-eye{transform-box:fill-box;transform-origin:center;animation:mascotBlink 4.6s ease-in-out infinite;}
@keyframes mascotBob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-6px) rotate(2deg);}}
@keyframes mascotBlink{0%,90%,100%{transform:scaleY(1);}93%,96%{transform:scaleY(0.12);}}
@media(prefers-reduced-motion:reduce){.mascot,.mascot-eye{animation:none;}}

.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--paper);padding:10px 16px;border-radius:8px;font-size:13px;z-index:100;box-shadow:var(--shadow);}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--paper-3);border-radius:10px;}

@media(max-width:760px){
  #app{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;align-items:center;padding:12px;overflow-x:auto;}
  .brand{padding:0 10px 0 0;}
  nav.navlist{flex-direction:row;}
  .navitem span{display:none;}
  #syncbar{padding:9px 16px;gap:10px;}
  .syncbar-file{display:none;}
  main{padding:18px 16px 50px;}
  .grid2{grid-template-columns:1fr;}
}
:focus-visible{outline:2px solid var(--accent-info);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important;}}

/* ===== Accessibility utilities ===== */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.skip-link{position:absolute;left:10px;top:-50px;background:var(--ink);color:var(--paper);padding:10px 16px;border-radius:0 0 8px 8px;z-index:200;font-size:13.5px;font-weight:600;text-decoration:none;transition:top .15s;}
.skip-link:focus{top:0;}
[role="button"],[role="switch"],[role="checkbox"]{cursor:pointer;}
.modal:focus{outline:none;}
</style>

<script>
(function(){
"use strict";

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

/* ============================= DATA LAYER ============================= */
// Versioning: semantic versioning from here on (MAJOR.MINOR.PATCH), GitHub-release
// style — tag releases as vX.Y.Z. Bump MAJOR for breaking changes, MINOR for new
// features (e.g. a new theme), PATCH for fixes. Previous versions used a plain
// MAJOR.MINOR number (e.g. "3.9"); 3.9 -> 3.9.0 is the semver equivalent. 3.10.0
// added the Diagnostic theme; 3.12.0 bumped MINOR for an accessibility pass across
// the app (keyboard navigation, screen-reader labelling, focus management on
// modals) and to stop the sync code field from displaying a previously-saved code
// in plain text. 3.13.0 bumped MINOR again for the Halftone theme: a dot-screen
// night sky with drifting clouds behind the whole app, its own hero cloud artwork
// in the full-screen timer, and an ink-dot page-load/section-switch animation that
// only runs while Halftone is the active theme. 3.14.0 bumped MINOR again to add
// the Glass theme: a canvas-painted field of long, wiggly iridescent "ribbon" lines
// behind the whole app, seen through frosted glass panels; a matching wiggly-ribbon
// flower as the full-screen timer's hero art; and a page-load/section-switch reveal
// that sweeps left-to-right — the mirror image of Halftone's top-to-bottom one.
// This release bumps MINOR again to 3.15.0 for a fresh set of custom app icons (all
// four manifest sizes — see icon-192.png, icon-512.png, icon-maskable-192.png,
// icon-maskable-512.png — replacing the old flat placeholder mark with the Glass
// theme's wiggly-ribbon flower), and fixes a Glass-theme bug along the way: its
// ribbon field and entrance/section sweep bars were sized for desktop and didn't
// scale down for narrow phone screens, so the same ~52-ribbon field that looked
// right at 1280px was crammed into a ~380px-wide phone with barely any gap between
// ribbons. Ribbon count, wiggle amplitude, and sweep-bar width now all scale with
// viewport width. This release bumps MINOR again to 3.16.0 to redraw all four app
// icons a second time: 3.15.0's rainbow flower mark was a loose gesture at the
// Glass theme's colours, but didn't actually match the reference art's material —
// a dense cluster of tapered, glassy bristle blades with a cool silvery-lavender
// sheen on the outer curves and a muted amber-copper glow in the shadowed valleys
// between lobes, on a plain white ground. The new icon draws ~130 individually
// tapered, gently-bowed blades with that same cool/warm colour grading instead of
// flat rainbow hues, and drops the flat-color background for the reference's
// plain near-white one.
const APP_VERSION='3.16.0';
const APP_CODENAME='Filament';
// The ONE intentional difference between the main and beta deployments'
// index.html: everything else stays byte-identical. Set to 'beta' in the
// beta copy only, so the version display below reads e.g. "Beta 3.10.0"
// instead of just "3.10.0" — makes it unmistakable which build you're in,
// on top of the already-different app name/icon.
const BUILD_CHANNEL='beta';
const DISPLAY_VERSION = BUILD_CHANNEL ? `Beta ${APP_VERSION}` : APP_VERSION;
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_NAMES_FULL = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SUBJECT_PALETTE = ['#2E5E4E','#4A5FBF','#B23A48','#C98A3E','#6B4C7A','#3E7C8C','#8C5B3E','#5B7A3E','#7A3E5E','#3E5E7A','#A6444A','#4A8FA6','#7A5E3E','#5E3E7A','#3E7A5E','#A67E3E','#3E4A7A','#7A3E3E','#4A7A3E','#3E3E5E'];

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayDayIdx(){return (new Date().getDay()+6)%7;} // Monday=0
function isoToDayIdx(iso){return (new Date(iso+'T00:00:00').getDay()+6)%7;}
function addDaysISO(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function mondayOfWeek(iso){ return addDaysISO(iso, -isoToDayIdx(iso)); }
function shiftMonth(ym,delta){ let [y,m]=ym.split('-').map(Number); m+=delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} return y+'-'+String(m).padStart(2,'0'); }
function fmtDate(iso){const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}
function fmtDateTime(isoDatetime){const d=new Date(isoDatetime);return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function fmtTime(isoDatetime){const d=new Date(isoDatetime);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function fmtMins(m){const h=Math.floor(m/60),mm=m%60;return h>0?(h+'h'+(mm?' '+mm+'m':'')):(mm+'m');}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function defaultState(){
  const s1=uid(),s2=uid(),s3=uid();
  return {
    version:1,
    subjects:[
      {id:s1,name:'Mathematics',color:'#2E5E4E'},
      {id:s2,name:'Physics',color:'#4A5FBF'},
      {id:s3,name:'English',color:'#B23A48'}
    ],
    scheduleBlocks:[],
    studyLogs:[],
    homework:[],
    questions:[],
    photos:[],
    activeSession:null,
    // Per-category "this id was deleted at this time" records for schedule blocks,
    // homework, and questions — see the SYNC MERGE HELPERS section below for why.
    // Not used for subjects/studyLogs, which intentionally never sync deletions.
    tombstones:{scheduleBlocks:{}, homework:{}, questions:{}},
    settings:{darkMode:false,palette:'ledger',pomodoroWork:25,pomodoroBreak:5,reminderDaysBefore:2,syncServerUrl:'',syncCode:''}
  };
}
/* ============================= SUBJECT DEDUPE HELPERS =============================
   Shared by (1) migrateState's self-heal pass below, which cleans up duplicate
   subjects that may already exist from a first-sync collision, and (2) the server
   merge logic further down, which prevents new ones from being created going
   forward. Two subjects are considered "the same" if their names match once
   trimmed and case-folded — this is what catches two devices' independently
   generated default subjects ("Mathematics" / "Mathematics") even though they
   have completely different random ids. */
function normSubjectName(name){
  return String(name||'').trim().toLowerCase().replace(/\s+/g,' ');
}
// Walks a subjects array and drops later entries whose name matches an earlier
// one, keeping the earliest. Returns the surviving list plus a {droppedId:keptId}
// remap so callers can repoint anything that referenced a dropped duplicate.
function dedupeSubjectList(subjects){
  const seen=new Map();
  const remap={};
  const kept=[];
  (subjects||[]).forEach(sub=>{
    if(!sub || !sub.id) return;
    const key=normSubjectName(sub.name);
    if(seen.has(key)){
      remap[sub.id]=seen.get(key);
    }else{
      seen.set(key,sub.id);
      kept.push(sub);
    }
  });
  return {subjects:kept, remap};
}
// Repoints subjectId fields per a {droppedId:keptId} remap. Mutates in place.
function applySubjectRemap(remap, ...refArrays){
  if(!remap || Object.keys(remap).length===0) return;
  const fix=id=>Object.prototype.hasOwnProperty.call(remap,id)?remap[id]:id;
  refArrays.forEach(arr=>{ (arr||[]).forEach(item=>{ if(item && item.subjectId!=null) item.subjectId=fix(item.subjectId); }); });
}
// A real ledger file will have at least one of these top-level arrays (even an empty one) —
// used to catch opening the wrong file (e.g. a photos file, or something unrelated) by mistake
// instead of silently accepting it and quietly backfilling a blank-looking ledger.
function looksLikeLedgerFile(parsed){
  if(!parsed || typeof parsed!=='object' || Array.isArray(parsed)) return false;
  return ['subjects','scheduleBlocks','studyLogs','homework','questions'].some(k=>Object.prototype.hasOwnProperty.call(parsed,k));
}
function migrateState(s){
  s.version=s.version||1;
  s.subjects=s.subjects||[];
  // Backfill updatedAt on records saved before per-record sync timestamps existed. There's no
  // real history to recover here, so "just migrated" is treated as "just updated" — safe because
  // this only matters relative to a cloud copy, and a freshly-opened file has nothing pending to
  // lose either way.
  const stampIfMissing=arr=>(arr||[]).map(x=>(x&&x.updatedAt==null)?{...x,updatedAt:Date.now()}:x);
  s.scheduleBlocks=stampIfMissing((s.scheduleBlocks||[]).map(b=>({...b, recurring:(b.recurring!==undefined?b.recurring:true), date:(b.date!==undefined?b.date:null)})));
  s.studyLogs=s.studyLogs||[];
  s.homework=stampIfMissing(s.homework||[]);
  s.questions=stampIfMissing(s.questions||[]);
  s.photos=s.photos||[];
  s.activeSession=s.activeSession||null;
  s.tombstones=Object.assign({scheduleBlocks:{},homework:{},questions:{}},s.tombstones||{});
  s.tombstones.scheduleBlocks=s.tombstones.scheduleBlocks||{};
  s.tombstones.homework=s.tombstones.homework||{};
  s.tombstones.questions=s.tombstones.questions||{};
  s.settings=Object.assign({darkMode:false,palette:'ledger',pomodoroWork:25,pomodoroBreak:5,reminderDaysBefore:2,syncServerUrl:'',syncCode:''},s.settings||{});

  // Self-heal: if this file already picked up duplicate subjects (e.g. from a
  // first sync between two fresh devices, before this fix existed), collapse
  // them back down to one per name and fix up anything that pointed at the
  // dropped copies so nothing gets silently orphaned.
  const {subjects:dedupedSubjects, remap}=dedupeSubjectList(s.subjects);
  const removedCount=s.subjects.length-dedupedSubjects.length;
  if(removedCount>0){
    s.subjects=dedupedSubjects;
    applySubjectRemap(remap, s.scheduleBlocks, s.studyLogs, s.homework, s.questions);
    toast(`Cleaned up ${removedCount} duplicate subject${removedCount===1?'':'s'} left over from an earlier sync.`);
  }
  return s;
}

let state=null;
let fileHandle=null;
let saveTimeout=null;
let activeTab='today';
let scheduleViewMode='week';
let scheduleWeekStart=mondayOfWeek(todayISO());
let logViewMode='daily';
let logCursorDate=todayISO();
let logCursorMonth=todayISO().slice(0,7);
let timerMode='stopwatch';
let timerFullscreen=false;
let stopwatchIntervalId=null;
let pendingPhotoData=null;
let photoState=null;
let photoFileHandle=null;
let viewingPhotoId=null;
let photoLockedRaw=null;      // raw {locked:true,...} wrapper waiting for a password this session
let photoLockKey=null;        // derived CryptoKey, held in memory only — never written to disk
let photoLockMeta=null;       // {saltB64, iterations} for the currently-active lock, needed to re-encrypt on save
let photoLockLastWrapper=null;// last known-good locked wrapper on disk, used to verify a password before changing/removing it
let pendingLockedImport=null; // {parsed, sourceHandle, sourceName} awaiting a password to decrypt during photo import
// true when this session's data came from "Log in" (Worker URL + sync code) on the gate screen,
// rather than a local file. There's no fileHandle in this mode, so saves go to a per-account
// device cache (localStorage) instead, and the syncbar's button talks to the cloud instead of disk.
let cloudMode=false;
// --- Theme background/entrance effects (see HALFTONE THEME EFFECTS + GLASS THEME EFFECTS below) ---
let lastAppliedPalette=null; // lets us detect "just switched into halftone/glass" to fire the curtain once
let lastRenderedTab=null;    // lets render() know a tab switch (not just a data refresh) happened
let haloBlobs=null;          // this session's cloud-cluster layout, reused across resizes/re-renders
let halftoneResizeBound=false;
let glassRibbons=null;       // this session's ribbon-field layout, reused across resizes/re-renders
let glassResizeBound=false;
let glassFsResizeBound=false; // separate debounce binding for the full-screen hero flower canvas
// active=true from the moment a session first starts until Reset or Finish&log — stays true
// through pauses and through the automatic work->break->work handoff, so the subject select
// (which checks `active`, not `running`) can't be changed mid-session by pausing and swapping.
// phaseStartedAt/elapsedMs track real wall-clock time for the current phase (survives pause/
// resume) so the amount logged is always the actual time studied, never a value read back out
// of settings that could have changed since the session began.
let timer={running:false,active:false,mode:'work',remaining:25*60,subjectId:null,topic:'',intervalId:null,cyclesDone:0,phaseStartedAt:null,elapsedMs:0};
function timerPhaseElapsedMs(){
  return timer.elapsedMs + (timer.phaseStartedAt ? (Date.now()-timer.phaseStartedAt) : 0);
}
// Called whenever a (main ledger) file becomes the active file — a fresh file should never
// inherit a running/paused timer, stale subject, or stale countdown from whatever was open
// before, and the displayed countdown should always match *this* file's saved timer defaults.
function resetTimerForLoadedFile(){
  timer.running=false; timer.active=false;
  clearInterval(timer.intervalId); timer.intervalId=null;
  timer.mode='work'; timer.remaining=state.settings.pomodoroWork*60;
  timer.subjectId=null; timer.topic=''; timer.cyclesDone=0;
  timer.phaseStartedAt=null; timer.elapsedMs=0;
}

const supportsFSAccess='showOpenFilePicker' in window;

/* ============================= FILE HANDLING ============================= */
async function writeToHandle(handle,data){
  const writable=await handle.createWritable();
  await writable.write(JSON.stringify(data,null,2));
  await writable.close();
}
function downloadFile(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='ledger-data.json';a.click();
  URL.revokeObjectURL(url);
}
let lastSavedAt=null;
async function saveFile(auto){
  if(!state) return;
  if(fileHandle){
    try{
      await writeToHandle(fileHandle,state);
      lastSavedAt=Date.now();
      setSaveIndicator(true);
    }catch(err){
      setSaveIndicator(false);
      if(!auto) toast('Could not save: '+err.message);
    }
  }else{
    if(!auto){ downloadFile(); lastSavedAt=Date.now(); setSaveIndicator(true,true); }
    else setSaveIndicator(false);
  }
}
function scheduleSave(){
  setSaveIndicator(false);
  clearTimeout(saveTimeout);
  // Cloud-login sessions never autosave to the network — that would blow through the
  // Cloudflare KV daily request budget in no time. Instead every edit gets debounced into
  // the device cache (localStorage) only, so nothing's lost if the tab closes before the
  // person taps "Sync to cloud" themselves; the cloud copy only ever changes on that tap.
  saveTimeout=setTimeout(()=>{ if(cloudMode) saveCloudCache(); else saveFile(true); },500);
}
function setSaveIndicator(saved,downloaded){
  const dot=document.getElementById('syncDot');
  const status=document.getElementById('syncStatus');
  if(!dot) return;
  if(downloaded){dot.className='savedot';status.textContent='Downloaded — replace old file';updateSyncTime();return;}
  if(cloudMode){
    // Deliberately blunt: this reads "Not synced" the moment anything changes and stays that
    // way until the person taps Sync themselves — never a live/auto status, since a truer
    // "synced" claim would need another network round trip we're not allowed to spend here.
    if(saved){dot.className='savedot';status.textContent='Synced';}
    else{dot.className='savedot pending';status.textContent='Not synced — tap Sync to cloud';}
    updateSyncTime();
    return;
  }
  if(saved){dot.className='savedot';status.textContent='Synced';}
  else{dot.className='savedot pending';status.textContent=fileHandle?'Saving…':'Not synced — click Sync';}
  updateSyncTime();
}
function updateSyncTime(){
  const timeEl=document.getElementById('syncTime');
  if(!timeEl) return;
  if(!lastSavedAt){ timeEl.textContent=''; return; }
  const diff=Math.floor((Date.now()-lastSavedAt)/1000);
  let txt;
  if(diff<10) txt='just now';
  else if(diff<60) txt=diff+'s ago';
  else if(diff<3600) txt=Math.floor(diff/60)+'m ago';
  else if(diff<86400) txt=Math.floor(diff/3600)+'h ago';
  else txt=Math.floor(diff/86400)+'d ago';
  timeEl.textContent='· '+txt;
}
setInterval(updateSyncTime,15000);
async function openFile(){
  try{
    if(supportsFSAccess){
      const [handle]=await window.showOpenFilePicker({types:[{description:'Ledger data',accept:{'application/json':['.json']}}]});
      const file=await handle.getFile();
      const text=await file.text();
      const parsed=JSON.parse(text);
      if(!looksLikeLedgerFile(parsed) && !confirm('This file doesn\'t look like a Ledger file — no subjects, schedule, homework, or logs found inside it. Open it anyway?')) return;
      state=migrateState(parsed);
      fileHandle=handle;
      cloudMode=false;
      photoState=null; photoFileHandle=null;
      photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
      lastSavedAt=Date.now();
      onFileReady(handle.name);
    }else{
      document.getElementById('fileInput').click();
    }
  }catch(err){ if(err.name!=='AbortError') toast('Could not open file: '+err.message); }
}
async function newFile(){
  state=defaultState();
  cloudMode=false;
