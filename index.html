*{box-sizing:border-box;}
body{margin:0;}
html,body{height:100%;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:var(--font-display);font-weight:600;letter-spacing:-0.01em;}
.mono{font-family:var(--font-mono);}
button{font-family:inherit;}
a{color:inherit;}

/* ===== Layout ===== */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:220px;flex-shrink:0;
  background:var(--paper-2);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  padding:20px 14px;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px 8px;}
.brand-mark{width:30px;height:30px;border-radius:7px;background:var(--accent-study);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-mark svg{width:17px;height:17px;stroke:var(--paper);}
.brand-name{font-family:var(--font-display);font-size:19px;font-weight:700;line-height:1.1;}
.brand-sub{font-size:10.5px;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;}

nav.navlist{display:flex;flex-direction:column;gap:2px;flex:1;}
.navitem{
  display:flex;align-items:center;gap:11px;
  padding:9px 10px;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--ink-soft);font-size:14px;font-weight:500;
  border:none;background:none;text-align:left;width:100%;
}
.navitem svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;flex-shrink:0;}
.navitem:hover{background:var(--paper-3);color:var(--ink);}
.navitem.active{background:var(--accent-study);color:#fff;}
.navitem.active svg{stroke:#fff;}

.content-col{flex:1;min-width:0;display:flex;flex-direction:column;max-width:1180px;}
#syncbar{position:sticky;top:0;z-index:15;display:flex;align-items:center;gap:16px;padding:11px 34px;background:var(--paper-2);border-bottom:1px solid var(--line);flex-wrap:wrap;}
.syncbar-file{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.syncbar-file svg{width:15px;height:15px;stroke:var(--ink-soft);flex-shrink:0;}
.syncbar-status{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);margin-right:auto;white-space:nowrap;}
.syncbar-time{font-family:var(--font-mono);font-size:11px;}
#syncBtn{flex-shrink:0;}
#syncBtn svg{width:14px;height:14px;}
#syncBtn.spinning svg{animation:spin .6s linear;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.live-session{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--accent-study);background:var(--accent-study-soft);padding:5px 12px;border-radius:100px;flex-shrink:0;}
.live-session .dot-pulse{width:8px;height:8px;border-radius:50%;background:var(--accent-study);animation:pulse 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.live-session .btn{padding:2px 9px;font-size:11.5px;}
main{flex:1;min-width:0;padding:24px 34px 60px;}
.savedot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent-study);margin-right:5px;}
.savedot.pending{background:var(--accent-gold);}

.pagehead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.pagehead h1{font-size:26px;margin:0;}
.pagehead .sub{color:var(--ink-soft);font-size:13px;margin-top:2px;}

/* ===== Cards / generic ===== */
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
.card+.card{margin-top:14px;}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:900px){.grid2{grid-template-columns:1fr;}.grid3{grid-template-columns:1fr;}}

.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--line);
  background:var(--paper);color:var(--ink);font-size:13.5px;font-weight:600;cursor:pointer;
}
.btn:hover{background:var(--paper-3);}
.btn.primary{background:var(--accent-study);border-color:var(--accent-study);color:#fff;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.danger{background:var(--accent-due);border-color:var(--accent-due);color:#fff;}
.btn.ghost{background:transparent;border-color:transparent;}
.btn.small{padding:5px 10px;font-size:12px;}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;}

.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:100px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.empty{color:var(--ink-soft);font-size:13.5px;padding:22px 10px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius);}

/* ===== Topbar file controls ===== */
.topbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:18px;flex-wrap:wrap;}

/* ===== Today view ===== */
.streakrow{display:flex;align-items:center;gap:14px;}
.streaknum{font-family:var(--font-mono);font-size:34px;font-weight:700;color:var(--accent-study);}
.tally{display:flex;gap:6px;flex-wrap:wrap;}
.tallygroup{display:flex;gap:2px;position:relative;padding-right:6px;}
.tallybar{width:3px;height:20px;background:var(--accent-gold);border-radius:1px;}
.tallybar.strike{position:relative;}
.tallybar.strike::after{content:'';position:absolute;left:-9px;top:9px;width:20px;height:3px;background:var(--accent-gold);transform:rotate(-40deg);}

.schedrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);}
.schedrow:last-child{border-bottom:none;}
.schedtime{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);width:98px;flex-shrink:0;}
.schedlabel{font-size:13.5px;font-weight:500;flex:1;}

.duerow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
.duerow:last-child{border-bottom:none;}
.duedate{font-family:var(--font-mono);font-size:12px;padding:3px 8px;border-radius:5px;flex-shrink:0;}

/* ===== Schedule grid ===== */
.viewtoggle{display:flex;gap:4px;background:var(--paper-3);padding:3px;border-radius:8px;}
.viewtoggle button{border:none;background:none;padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
.viewtoggle button.active{background:var(--paper);color:var(--ink);box-shadow:var(--shadow);}
.viewtoggle button:disabled{opacity:.4;cursor:not-allowed;}

.weekwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper-2);}
.weekgrid{display:grid;grid-template-columns:52px repeat(7,minmax(108px,1fr));min-width:820px;position:relative;}
.wg-daylabel{position:sticky;top:0;background:var(--paper-2);z-index:2;padding:9px 4px;text-align:center;font-size:11.5px;font-weight:700;letter-spacing:.03em;border-bottom:1px solid var(--line);border-left:1px solid var(--line);}
.wg-daylabel.wg-today{background:var(--accent-study-soft);color:var(--accent-study);}
.wg-datenum{font-family:var(--font-mono);font-size:13px;font-weight:600;margin-top:2px;}
.wg-corner{position:sticky;top:0;left:0;background:var(--paper-2);z-index:3;border-bottom:1px solid var(--line);}
.wg-timelabel{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-soft);text-align:right;padding-right:6px;transform:translateY(-6px);}
.wg-timelabel-first{transform:translateY(0);}
.wg-cell{border-left:1px solid var(--line);border-top:1px solid var(--paper-3);cursor:pointer;}
.wg-cell:hover{background:var(--accent-study-soft);}
.wg-cell.hourline{border-top:1px solid var(--line);}
.wg-block{margin:1px 3px;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:600;color:#fff;overflow:hidden;cursor:pointer;line-height:1.3;z-index:1;position:relative;}
.wg-block .t{font-family:var(--font-mono);font-weight:500;opacity:.9;font-size:9.5px;display:block;}

.listday{margin-bottom:16px;}
.listday h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:0 0 8px;}

/* ===== Homework ===== */
.filterbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
select,input[type=text],input[type=date],input[type=number],textarea{
  font-family:inherit;font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);
  border:1px solid var(--line);background:var(--paper);color:var(--ink);
}
textarea{width:100%;resize:vertical;min-height:64px;}
.hwcard{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--paper);margin-bottom:8px;}
.hwcard.done{opacity:.55;}
.hwcard .chk{width:19px;height:19px;border-radius:5px;border:2px solid var(--line);flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.hwcard .chk.checked{background:var(--accent-study);border-color:var(--accent-study);}
.hwcard .chk.checked svg{width:12px;height:12px;stroke:#fff;stroke-width:3;}
.hwtitle{font-weight:600;font-size:14px;}
.hwmeta{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap;}
.hwdesc{font-size:12.5px;color:var(--ink-soft);margin-top:5px;}
.priority-high{color:var(--accent-due);}
.priority-med{color:var(--accent-gold);}
.priority-low{color:var(--ink-soft);}

/* ===== Timer ===== */
.timerwrap{display:flex;flex-direction:column;align-items:center;padding:30px 10px;position:relative;}
.timerdisplay{font-family:var(--font-mono);font-size:64px;font-weight:700;letter-spacing:-0.02em;margin:14px 0;}
.stopwatch-display{font-family:var(--font-mono);font-size:52px;font-weight:700;letter-spacing:-0.02em;margin:14px 0;}
.timerctrls{display:flex;gap:10px;margin-top:8px;}
.timerform{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:6px;}
.sessionrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
.sessionrow:last-child{border-bottom:none;}
.fs-toggle-btn{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;color:var(--ink-soft);padding:7px;border-radius:var(--radius-sm);display:flex;}
.fs-toggle-btn:hover{background:var(--paper-3);color:var(--ink);}
.fs-toggle-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;}

/* ===== Timer Fullscreen ===== */
.timer-fs{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:var(--paper);color:var(--ink);}
.timer-fs .fs-stage{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;max-width:92vw;}
.fs-close{position:absolute;top:24px;right:28px;z-index:5;background:none;border:1px solid var(--line);cursor:pointer;color:var(--ink-soft);padding:9px;border-radius:var(--radius-sm);display:flex;}
.fs-close:hover{background:var(--paper-3);color:var(--ink);}
.fs-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;}
.fs-subject{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;margin-bottom:6px;}
.fs-label{font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;}
.fs-topic{font-size:13px;color:var(--ink-soft);margin-top:2px;max-width:70vw;text-align:center;}
.fs-ringwrap{position:relative;display:flex;align-items:center;justify-content:center;margin:18px 0;}
.fs-ringwrap svg{transform:rotate(-90deg);width:min(56vw,340px);height:min(56vw,340px);}
.fs-ringwrap circle{fill:none;stroke-width:5;}
.fs-ring-bg{stroke:var(--line);opacity:.5;}
.fs-ring-fg{stroke:var(--accent-study);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.fs-time{position:absolute;font-family:var(--font-mono);font-weight:700;letter-spacing:-0.02em;font-size:clamp(40px,9vw,84px);}
.fs-ctrls{display:flex;gap:12px;margin-top:8px;position:relative;z-index:3;}
.fs-ctrls .btn{padding:12px 24px;font-size:14.5px;}
.fs-cycles{margin-top:18px;font-size:12px;color:var(--ink-soft);position:relative;z-index:3;}
.fs-hint{position:absolute;bottom:26px;font-size:11px;color:var(--ink-soft);opacity:.6;letter-spacing:.03em;}
.fs-fx{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;}

/* --- ledger: warm paper glow, gentle lamplight breathing --- */
.timer-fs.fs-ledger::before{content:'';position:absolute;inset:-15%;background:radial-gradient(circle at 50% 42%,var(--accent-study-soft),transparent 62%);opacity:.75;animation:fsBreathe 6s ease-in-out infinite;z-index:0;}
@keyframes fsBreathe{0%,100%{transform:scale(1);opacity:.55;}50%{transform:scale(1.12);opacity:.85;}}

/* --- terminal: CRT scanlines + flicker glow --- */
.timer-fs.fs-terminal{background:var(--paper);}
.timer-fs.fs-terminal::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(61,255,142,0.05) 0px,rgba(61,255,142,0.05) 1px,transparent 1px,transparent 3px);z-index:0;}
.timer-fs.fs-terminal::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(61,255,142,0.08),transparent 70%);animation:fsCrtFlicker 4.5s infinite;z-index:0;}
.timer-fs.fs-terminal .fs-time{text-shadow:0 0 22px currentColor,0 0 6px currentColor;}
.timer-fs.fs-terminal .fs-label,.timer-fs.fs-terminal .fs-subject{text-transform:uppercase;letter-spacing:.15em;}
@keyframes fsCrtFlicker{0%,89%,91%,100%{opacity:1;}90%{opacity:.75;}}

/* --- bloom: floating soft blobs --- */
.timer-fs.fs-bloom .fs-blob{position:absolute;border-radius:50%;filter:blur(30px);opacity:.55;animation:fsFloat 12s ease-in-out infinite;}
@keyframes fsFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(3%,-4%) scale(1.08);}}

/* --- neon: cyberpunk grid + scanning beam --- */
.timer-fs.fs-neon{background:var(--paper);}
.timer-fs.fs-neon::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(46,230,255,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(46,230,255,0.08) 1px,transparent 1px);background-size:34px 34px;z-index:0;}
.timer-fs.fs-neon .fs-beam{position:absolute;left:0;right:0;height:120px;background:linear-gradient(180deg,transparent,rgba(57,255,158,0.14),transparent);animation:fsScan 5s linear infinite;z-index:0;}
@keyframes fsScan{0%{top:-120px;}100%{top:100%;}}
.timer-fs.fs-neon .fs-time{text-shadow:0 0 16px currentColor;}

/* --- aurora: intensified drifting glow + twinkling stars --- */
.timer-fs.fs-aurora::before{content:'';position:absolute;inset:-25%;background:
    radial-gradient(circle at 20% 20%,rgba(87,232,176,0.22),transparent 42%),
    radial-gradient(circle at 80% 25%,rgba(140,147,248,0.2),transparent 48%),
    radial-gradient(circle at 50% 85%,rgba(255,110,158,0.16),transparent 42%);
  animation:auroraDrift 14s ease-in-out infinite alternate;z-index:0;}
.timer-fs.fs-aurora .fs-star{position:absolute;border-radius:50%;background:#fff;animation:fsTwinkle 3s ease-in-out infinite;}
@keyframes fsTwinkle{0%,100%{opacity:.15;}50%{opacity:.9;}}

/* --- sakura: denser falling petals + soft glow --- */
.timer-fs.fs-sakura::before{content:'';position:absolute;inset:-10%;background:radial-gradient(circle at 50% 40%,rgba(244,156,181,0.22),transparent 60%);z-index:0;}
.timer-fs.fs-sakura .fs-petal{position:absolute;top:-6%;width:13px;height:13px;border-radius:50% 0 50% 50%;background:#F49CB5;animation-name:petalFall;animation-timing-function:linear;animation-iteration-count:infinite;}

/* --- sunset: animated sky + retro horizon + rising/setting sun --- */
.timer-fs.fs-sunset{background:linear-gradient(180deg,#FFDFAE 0%,#FFB199 35%,#F589B0 65%,#C97FD1 100%);background-size:100% 220%;animation:sunsetShift 16s ease-in-out infinite alternate;}
.timer-fs.fs-sunset .fs-sun{position:absolute;left:50%;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#FFE9C2,#F4A73E 70%);box-shadow:0 0 60px rgba(244,167,62,0.55);transform:translateX(-50%);transition:top 1s linear;z-index:0;}
.timer-fs.fs-sunset .fs-horizon{position:absolute;left:0;right:0;bottom:0;height:36%;background-image:linear-gradient(rgba(122,95,191,0.45) 1px,transparent 1px),linear-gradient(90deg,rgba(122,95,191,0.45) 1px,transparent 1px);background-size:34px 34px;transform:perspective(200px) rotateX(55deg);transform-origin:bottom;z-index:1;opacity:.65;}
.timer-fs.fs-sunset .fs-stage,.timer-fs.fs-sunset .fs-ctrls,.timer-fs.fs-sunset .fs-cycles{background:rgba(255,246,240,0.55);backdrop-filter:blur(6px);border-radius:20px;padding:24px 34px;}
.timer-fs.fs-sunset .fs-ctrls{background:none;backdrop-filter:none;padding:0;}

/* --- lavender / mint / sky: calm breathing circle for focus pacing --- */
.timer-fs.fs-lavender .fs-breathe,.timer-fs.fs-mint .fs-breathe,.timer-fs.fs-sky .fs-breathe{position:absolute;border-radius:50%;background:var(--accent-study-soft);animation:fsBreatheCalm 8s ease-in-out infinite;z-index:0;}
@keyframes fsBreatheCalm{0%,100%{transform:scale(0.85);opacity:.5;}50%{transform:scale(1.25);opacity:.85;}}
.timer-fs.fs-sky .fs-cloud{position:absolute;background:#fff;border-radius:100px;opacity:.7;animation:fsDrift linear infinite;}
.timer-fs.fs-sky .fs-cloud::before,.timer-fs.fs-sky .fs-cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
@keyframes fsDrift{0%{transform:translateX(-20vw);}100%{transform:translateX(110vw);}}
.timer-fs.fs-mint .fs-leaf{position:absolute;font-size:22px;opacity:.5;animation:fsSway ease-in-out infinite;}
@keyframes fsSway{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-14px) rotate(8deg);}}

/* --- dusk: candlelit breathing glow + drifting fireflies --- */
.timer-fs.fs-dusk::before{content:'';position:absolute;inset:-15%;background:radial-gradient(circle at 50% 45%,rgba(217,152,170,0.14),transparent 60%);animation:fsBreathe 7s ease-in-out infinite;z-index:0;}
.timer-fs.fs-dusk .fs-firefly{position:absolute;border-radius:50%;background:var(--accent-gold);box-shadow:0 0 6px 1px var(--accent-gold);animation:fsFirefly ease-in-out infinite;}
@keyframes fsFirefly{0%,100%{opacity:.2;transform:translateY(0);}50%{opacity:.9;transform:translateY(-18px);}}

/* --- twilight: dreamy drifting glow + twinkling stars --- */
.timer-fs.fs-twilight::before{content:'';position:absolute;inset:-25%;background:
    radial-gradient(circle at 22% 22%,rgba(142,217,196,0.16),transparent 42%),
    radial-gradient(circle at 78% 30%,rgba(167,179,242,0.16),transparent 45%),
    radial-gradient(circle at 50% 88%,rgba(226,154,203,0.13),transparent 42%);
  animation:auroraDrift 16s ease-in-out infinite alternate;z-index:0;}
.timer-fs.fs-twilight .fs-star{position:absolute;border-radius:50%;background:#fff;animation:fsTwinkle 3s ease-in-out infinite;}

/* ===== Stats ===== */
.barrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.barrow .lbl{width:110px;font-size:12.5px;font-weight:500;flex-shrink:0;}
.barrow .track{flex:1;height:10px;background:var(--paper-3);border-radius:100px;overflow:hidden;}
.barrow .fill{height:100%;border-radius:100px;}
.barrow .val{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);width:52px;text-align:right;flex-shrink:0;}

.weekbars{display:flex;align-items:flex-end;gap:10px;height:120px;padding-top:10px;}
.weekbar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;height:100%;}
.weekbar-fill{width:100%;border-radius:5px 5px 0 0;background:var(--accent-study);min-height:2px;}
.weekbar-day{font-size:10.5px;color:var(--ink-soft);font-family:var(--font-mono);}

.statnum{font-family:var(--font-mono);font-size:28px;font-weight:700;}
.statlabel{font-size:12px;color:var(--ink-soft);margin-top:2px;}

.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:10.5px;color:var(--ink-soft);text-align:center;margin-bottom:5px;font-weight:700;letter-spacing:.03em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:6px;padding:4px;display:flex;flex-direction:column;cursor:pointer;position:relative;overflow:hidden;background:var(--paper);}
.cal-cell.empty-cell{border:none;cursor:default;background:transparent;}
.cal-cell:not(.empty-cell):hover{border-color:var(--accent-study);}
.cal-cell.cal-today{border-color:var(--accent-study);border-width:2px;}
.cal-daynum{font-size:10.5px;color:var(--ink-soft);font-family:var(--font-mono);position:relative;z-index:1;}
.cal-bar{position:absolute;inset:0;background:var(--accent-study);z-index:0;}
.cal-mins{position:relative;z-index:1;font-size:9px;margin-top:auto;font-weight:700;}

/* ===== Subjects ===== */
.subjrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
.subjrow:last-child{border-bottom:none;}
.swatch{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.1);cursor:pointer;}
.palette{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.palette .sw{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.palette .sw.sel{border-color:var(--ink);}

/* ===== Photos ===== */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.photo-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--paper-3);border:1px solid var(--line);}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-meta{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.6));color:#fff;font-size:9.5px;padding:5px 6px;font-family:var(--font-mono);}

/* ===== Modal ===== */
.modal-backdrop{position:fixed;inset:0;background:rgba(20,20,18,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--paper);border-radius:14px;padding:24px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h2{margin:0 0 16px;font-size:19px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field select,.field input,.field textarea{width:100%;}
.fieldrow{display:flex;gap:10px;}
.fieldrow .field{flex:1;}
.modalactions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

/* ===== Settings ===== */
.togglerow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);}
.togglerow:last-child{border-bottom:none;}
.switch{width:40px;height:23px;border-radius:100px;background:var(--paper-3);position:relative;cursor:pointer;border:1px solid var(--line);flex-shrink:0;}
.switch.on{background:var(--accent-study);}
.switch .knob{width:17px;height:17px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;}
.switch.on .knob{left:19px;}
.theme-options{display:flex;gap:10px;flex-wrap:wrap;}
.theme-opt{border:2px solid var(--line);border-radius:10px;padding:9px;cursor:pointer;text-align:center;font-size:11.5px;font-weight:600;width:88px;flex-shrink:0;}
.theme-opt.sel{border-color:var(--accent-study);}
.theme-preview{height:38px;border-radius:6px;margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:5px;}

<script>
(function(){
"use strict";

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

/* ============================= DATA LAYER ============================= */
const APP_VERSION='3.6';
const APP_CODENAME='Inkwell';
// The ONE intentional difference between the main and beta deployments'
// index.html: everything else stays byte-identical. Set to 'beta' in the
// beta copy only, so the version display below reads e.g. "Beta 3.4"
// instead of just "3.4" — makes it unmistakable which build you're in,
// on top of the already-different app name/icon.
const BUILD_CHANNEL='beta';
const DISPLAY_VERSION = BUILD_CHANNEL ? `Beta ${APP_VERSION}` : APP_VERSION;
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_NAMES_FULL = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SUBJECT_PALETTE = ['#2E5E4E','#4A5FBF','#B23A48','#C98A3E','#6B4C7A','#3E7C8C','#8C5B3E','#5B7A3E','#7A3E5E','#3E5E7A','#A6444A','#4A8FA6','#7A5E3E','#5E3E7A','#3E7A5E','#A67E3E','#3E4A7A','#7A3E3E','#4A7A3E','#3E3E5E'];

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayDayIdx(){return (new Date().getDay()+6)%7;} // Monday=0
function isoToDayIdx(iso){return (new Date(iso+'T00:00:00').getDay()+6)%7;}
function addDaysISO(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function mondayOfWeek(iso){ return addDaysISO(iso, -isoToDayIdx(iso)); }
function shiftMonth(ym,delta){ let [y,m]=ym.split('-').map(Number); m+=delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} return y+'-'+String(m).padStart(2,'0'); }
function fmtDate(iso){const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}
function fmtDateTime(isoDatetime){const d=new Date(isoDatetime);return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function fmtTime(isoDatetime){const d=new Date(isoDatetime);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function fmtMins(m){const h=Math.floor(m/60),mm=m%60;return h>0?(h+'h'+(mm?' '+mm+'m':'')):(mm+'m');}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function defaultState(){
  const s1=uid(),s2=uid(),s3=uid();
  return {
    version:1,
    subjects:[
      {id:s1,name:'Mathematics',color:'#2E5E4E'},
      {id:s2,name:'Physics',color:'#4A5FBF'},
      {id:s3,name:'English',color:'#B23A48'}
    ],
    scheduleBlocks:[],
    studyLogs:[],
    homework:[],
    questions:[],
    photos:[],
    activeSession:null,
    settings:{darkMode:false,palette:'ledger',pomodoroWork:25,pomodoroBreak:5,reminderDaysBefore:2,syncServerUrl:'',syncCode:''}
  };
}
/* ============================= SUBJECT DEDUPE HELPERS =============================
   Shared by (1) migrateState's self-heal pass below, which cleans up duplicate
   subjects that may already exist from a first-sync collision, and (2) the server
   merge logic further down, which prevents new ones from being created going
   forward. Two subjects are considered "the same" if their names match once
   trimmed and case-folded — this is what catches two devices' independently
   generated default subjects ("Mathematics" / "Mathematics") even though they
   have completely different random ids. */
function normSubjectName(name){
  return String(name||'').trim().toLowerCase().replace(/\s+/g,' ');
}
// Walks a subjects array and drops later entries whose name matches an earlier
// one, keeping the earliest. Returns the surviving list plus a {droppedId:keptId}
// remap so callers can repoint anything that referenced a dropped duplicate.
function dedupeSubjectList(subjects){
  const seen=new Map();
  const remap={};
  const kept=[];
  (subjects||[]).forEach(sub=>{
    if(!sub || !sub.id) return;
    const key=normSubjectName(sub.name);
    if(seen.has(key)){
      remap[sub.id]=seen.get(key);
    }else{
      seen.set(key,sub.id);
      kept.push(sub);
    }
  });
  return {subjects:kept, remap};
}
// Repoints subjectId fields per a {droppedId:keptId} remap. Mutates in place.
function applySubjectRemap(remap, ...refArrays){
  if(!remap || Object.keys(remap).length===0) return;
  const fix=id=>Object.prototype.hasOwnProperty.call(remap,id)?remap[id]:id;
  refArrays.forEach(arr=>{ (arr||[]).forEach(item=>{ if(item && item.subjectId!=null) item.subjectId=fix(item.subjectId); }); });
}
function migrateState(s){
  s.version=s.version||1;
  s.subjects=s.subjects||[];
  s.scheduleBlocks=(s.scheduleBlocks||[]).map(b=>({...b, recurring:(b.recurring!==undefined?b.recurring:true), date:(b.date!==undefined?b.date:null)}));
  s.studyLogs=s.studyLogs||[];
  s.homework=s.homework||[];
  s.questions=s.questions||[];
  s.photos=s.photos||[];
  s.activeSession=s.activeSession||null;
  s.settings=Object.assign({darkMode:false,palette:'ledger',pomodoroWork:25,pomodoroBreak:5,reminderDaysBefore:2,syncServerUrl:'',syncCode:''},s.settings||{});

  // Self-heal: if this file already picked up duplicate subjects (e.g. from a
  // first sync between two fresh devices, before this fix existed), collapse
  // them back down to one per name and fix up anything that pointed at the
  // dropped copies so nothing gets silently orphaned.
  const {subjects:dedupedSubjects, remap}=dedupeSubjectList(s.subjects);
  const removedCount=s.subjects.length-dedupedSubjects.length;
  if(removedCount>0){
    s.subjects=dedupedSubjects;
    applySubjectRemap(remap, s.scheduleBlocks, s.studyLogs, s.homework, s.questions);
    toast(`Cleaned up ${removedCount} duplicate subject${removedCount===1?'':'s'} left over from an earlier sync.`);
  }
  return s;
}

let state=null;
let fileHandle=null;
let saveTimeout=null;
let activeTab='today';
let scheduleViewMode='week';
let scheduleWeekStart=mondayOfWeek(todayISO());
let logViewMode='daily';
let logCursorDate=todayISO();
let logCursorMonth=todayISO().slice(0,7);
let timerMode='stopwatch';
let timerFullscreen=false;
let stopwatchIntervalId=null;
let pendingPhotoData=null;
let photoState=null;
let photoFileHandle=null;
let viewingPhotoId=null;
let photoLockedRaw=null;      // raw {locked:true,...} wrapper waiting for a password this session
let photoLockKey=null;        // derived CryptoKey, held in memory only — never written to disk
let photoLockMeta=null;       // {saltB64, iterations} for the currently-active lock, needed to re-encrypt on save
let photoLockLastWrapper=null;// last known-good locked wrapper on disk, used to verify a password before changing/removing it
let timer={running:false,mode:'work',remaining:25*60,subjectId:null,intervalId:null,cyclesDone:0};

const supportsFSAccess='showOpenFilePicker' in window;

/* ============================= FILE HANDLING ============================= */
async function writeToHandle(handle,data){
  const writable=await handle.createWritable();
  await writable.write(JSON.stringify(data,null,2));
  await writable.close();
}
function downloadFile(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='ledger-data.json';a.click();
  URL.revokeObjectURL(url);
}
let lastSavedAt=null;
async function saveFile(auto){
  if(!state) return;
  if(fileHandle){
    try{
      await writeToHandle(fileHandle,state);
      lastSavedAt=Date.now();
      setSaveIndicator(true);
    }catch(err){
      setSaveIndicator(false);
      if(!auto) toast('Could not save: '+err.message);
    }
  }else{
    if(!auto){ downloadFile(); lastSavedAt=Date.now(); setSaveIndicator(true,true); }
    else setSaveIndicator(false);
  }
}
function scheduleSave(){
  setSaveIndicator(false);
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>saveFile(true),500);
}
function setSaveIndicator(saved,downloaded){
  const dot=document.getElementById('syncDot');
  const status=document.getElementById('syncStatus');
  if(!dot) return;
  if(downloaded){dot.className='savedot';status.textContent='Downloaded — replace old file';updateSyncTime();return;}
  if(saved){dot.className='savedot';status.textContent='Synced';}
  else{dot.className='savedot pending';status.textContent=fileHandle?'Saving…':'Not synced — click Sync';}
  updateSyncTime();
}
function updateSyncTime(){
  const timeEl=document.getElementById('syncTime');
  if(!timeEl) return;
  if(!lastSavedAt){ timeEl.textContent=''; return; }
  const diff=Math.floor((Date.now()-lastSavedAt)/1000);
  let txt;
  if(diff<10) txt='just now';
  else if(diff<60) txt=diff+'s ago';
  else if(diff<3600) txt=Math.floor(diff/60)+'m ago';
  else if(diff<86400) txt=Math.floor(diff/3600)+'h ago';
  else txt=Math.floor(diff/86400)+'d ago';
  timeEl.textContent='· '+txt;
}
setInterval(updateSyncTime,15000);
async function openFile(){
  try{
    if(supportsFSAccess){
      const [handle]=await window.showOpenFilePicker({types:[{description:'Ledger data',accept:{'application/json':['.json']}}]});
      const file=await handle.getFile();
      const text=await file.text();
      state=migrateState(JSON.parse(text));
      fileHandle=handle;
      photoState=null; photoFileHandle=null;
      photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
      lastSavedAt=Date.now();
      onFileReady(handle.name);
    }else{
      document.getElementById('fileInput').click();
    }
  }catch(err){ if(err.name!=='AbortError') toast('Could not open file: '+err.message); }
}
async function newFile(){
  state=defaultState();
  photoState=null; photoFileHandle=null;
  photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
  if(supportsFSAccess){
    try{
      const handle=await window.showSaveFilePicker({suggestedName:'ledger-data.json',types:[{description:'Ledger data',accept:{'application/json':['.json']}}]});
      fileHandle=handle;
      await writeToHandle(handle,state);
      lastSavedAt=Date.now();
      onFileReady(handle.name);
    }catch(err){ if(err.name!=='AbortError') toast(err.message); }
  }else{
    onFileReady('ledger-data.json (new — use Save to download)');
  }
}
async function pickSaveLocation(){
  if(!supportsFSAccess){ downloadFile(); lastSavedAt=Date.now(); setSaveIndicator(true,true); return; }
  try{
    const handle=await window.showSaveFilePicker({suggestedName:'ledger-data.json',types:[{description:'Ledger data',accept:{'application/json':['.json']}}]});
    fileHandle=handle;
    await writeToHandle(handle,state);
    lastSavedAt=Date.now();
    setSaveIndicator(true);
    document.getElementById('syncFileName').textContent=handle.name;
    toast('Saved to '+handle.name);
  }catch(err){ if(err.name!=='AbortError') toast(err.message); }
}
function onFileReady(name){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('syncFileName').textContent=name;
  applyTheme();
  buildNav();
  setSaveIndicator(true);
  updateLiveSessionBadge();
  if(state.activeSession) ensureStopwatchTicking();
  render();
}

/* ============================= ADDITIVE MERGE (used by server sync) =============================
   Subjects and study logs are the only categories that ever merge additively: a record already
   present on this device (matched by its id) is never edited or overwritten — only records missing
   here get added, and nothing already here is ever lost. Schedule blocks, homework, and questions
   are handled differently (see the OVERWRITE step in serverSyncNow below) — they always overwrite
   the cloud copy with whatever's on this device, edits and deletions included, rather than merging.

   Subjects get one extra rule on top of the additive merge: an incoming subject is also treated as
   "already here" if its name matches one we already have (case/whitespace-insensitive), even under a
   different id. Without this, two devices that each started their own fresh ledger — so each
   has its own randomly-id'd "Mathematics", "Physics", "English" — would end up with six subjects
   instead of three the first time they synced, since plain id-matching can't tell those pairs
   apart. When a match is found, the incoming copy is dropped and any schedule block, study log,
   homework item, or question that referenced it is repointed at the subject we kept, so nothing
   that referenced the dropped copy gets orphaned. */
function syncableData(){
  return {subjects:state.subjects, scheduleBlocks:state.scheduleBlocks, studyLogs:state.studyLogs, homework:state.homework, questions:state.questions};
}
function computeMergeDiff(incoming){
  const idsOf=(arr)=>new Set((arr||[]).map(x=>x.id));
  const subjExisting=idsOf(state.subjects), schedExisting=idsOf(state.scheduleBlocks);
  const logsExisting=idsOf(state.studyLogs), hwExisting=idsOf(state.homework), qExisting=idsOf(state.questions);

  const nameToId=new Map();
  state.subjects.forEach(sub=>{ if(sub&&sub.id) nameToId.set(normSubjectName(sub.name), sub.id); });
  const newSubjects=[];
  const subjectRemap={};
  (incoming.subjects||[]).forEach(x=>{
    if(!x || !x.id || subjExisting.has(x.id)) return; // exact record already present
    const key=normSubjectName(x.name);
    if(nameToId.has(key)){
      subjectRemap[x.id]=nameToId.get(key); // same subject, different id — fold into the one we keep
    }else{
      nameToId.set(key,x.id);
      newSubjects.push(x);
    }
  });
  const fixSubjectId=id=>Object.prototype.hasOwnProperty.call(subjectRemap,id)?subjectRemap[id]:id;

  return {
    subjects:newSubjects,
    scheduleBlocks:(incoming.scheduleBlocks||[]).filter(x=>x&&x.id&&!schedExisting.has(x.id))
      .map(x=>({...x, subjectId:fixSubjectId(x.subjectId)})),
    studyLogs:(incoming.studyLogs||[]).filter(x=>x&&x.id&&!logsExisting.has(x.id))
      .map(x=>({...x, subjectId:fixSubjectId(x.subjectId)})),
    homework:(incoming.homework||[]).filter(x=>x&&x.id&&!hwExisting.has(x.id))
      .map(x=>({...x, subjectId:fixSubjectId(x.subjectId)})),
    questions:(incoming.questions||[]).filter(x=>x&&x.id&&!qExisting.has(x.id))
      .map(x=>({...x, subjectId:fixSubjectId(x.subjectId)}))
  };
}
/* Only subjects and study logs ever merge additively — schedule blocks, homework, and questions
   are intentionally left out here; they're overwritten wholesale by the OVERWRITE step in
   serverSyncNow instead, so this function never adds incoming copies of those three back in. */
function applyMergeDiff(diff){
  state.subjects=state.subjects.concat(diff.subjects);
  state.studyLogs=state.studyLogs.concat(diff.studyLogs);
}

/* ============================= SERVER SYNC (online, via a small Cloudflare Worker) =============================
   A tiny free backend (see worker.js, deployed separately on Cloudflare Workers) acts as a mailbox.
   This device only talks to it when you tap "Save & sync now" in Settings — nothing syncs
   automatically. "Save & sync now" is now a two-step handshake that treats the five synced
   categories differently, on purpose:

   1) MERGE step (subjects + study logs only) — this device POSTs its own subjects/study logs,
      the server merges them additively into whatever's already stored under the shared "sync
      code" and hands back the merged superset, and this device merges that superset into itself
      using the additive logic above. No record already on either side is ever edited,
      overwritten, or duplicated — a delete or edit made here never removes it from the server.

   2) OVERWRITE step (schedule blocks + homework + questions) — right after the merge step, this
      device PUTs its current copy of these three categories and the server's stored copy is
      replaced wholesale to match. Edits and deletions made on this device DO take effect on the
      server this way, every time you sync — not just when you use the separate "Upload" button —
      because these three are the ones you're most likely to reschedule, edit, or delete day to
      day, and a purely additive merge could never reflect that. The subjects/study logs sent
      alongside this step are exactly the merged copy from step 1, so this step never re-adds
      anything the merge intentionally left out, and never loses anything either.

   "Upload" (serverUploadNow, below) still exists as a separate, deliberate escape hatch: it
   overwrites *all five* categories — including subjects and study logs — to match this device
   exactly. Only use it once this device is the one you trust most, since anything not yet synced
   on other devices is discarded. */
let serverSyncInFlight=false;
async function serverSyncNow(){
  if(serverSyncInFlight) return;
  const rawUrl=(state.settings.syncServerUrl||'').trim();
  const code=(state.settings.syncCode||'').trim();
  if(!rawUrl || !code){ toast('Enter your Worker URL and a sync code in Settings first.'); return; }
  const base=rawUrl.replace(/\/+$/,'');
  serverSyncInFlight=true;
  const btn=document.getElementById('server-sync-btn');
  const origLabel=btn?btn.textContent:null;
  if(btn){ btn.textContent='Syncing…'; btn.disabled=true; }
  try{
    // Step 1: merge — subjects and study logs only, additive both ways.
    const mergeResp=await fetch(base+'/sync?code='+encodeURIComponent(code), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(syncableData())
    });
    if(!mergeResp.ok){
      const errText=await mergeResp.text().catch(()=>'');
      throw new Error('Server responded with '+mergeResp.status+(errText?': '+errText.slice(0,120):''));
    }
    const merged=await mergeResp.json();
    const diff=computeMergeDiff(merged);
    const total=diff.subjects.length+diff.studyLogs.length;
    applyMergeDiff(diff);
    scheduleSave();

    // Step 2: overwrite — schedule blocks, homework, and questions always push this device's
    // current copy to the cloud, replacing whatever was stored there. Subjects/study logs are
    // sent back exactly as just merged, so nothing from step 1 gets lost or duplicated.
    const overwriteResp=await fetch(base+'/sync?code='+encodeURIComponent(code), {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(syncableData())
    });
    if(!overwriteResp.ok){
      const errText=await overwriteResp.text().catch(()=>'');
      throw new Error('Server responded with '+overwriteResp.status+(errText?': '+errText.slice(0,120):'')+' while pushing schedule/homework/questions.');
    }
    await overwriteResp.json().catch(()=>null);

    render();
    toast(total>0 ? `Synced — added ${total} new record${total===1?'':'s'}, and pushed the latest schedule, homework, and questions.` : 'Synced — schedule, homework, and questions pushed to the cloud.');
  }catch(err){
    toast('Sync failed: '+err.message);
  }finally{
    serverSyncInFlight=false;
    if(btn){ btn.textContent=origLabel; btn.disabled=false; }
  }
}

/* ============================= STOPWATCH (persisted real-time session) ============================= */
function startStopwatch(subjectId,topic){
  if(!subjectId) subjectId=state.subjects[0]?.id;
  if(!subjectId){ toast('Add a subject first.'); return; }
  state.activeSession={subjectId,startedAt:new Date().toISOString(),topic:topic||''};
  timerMode='stopwatch';
  saveFile(false);
  updateLiveSessionBadge();
  ensureStopwatchTicking();
  render();
}
function stopStopwatch(discard){
  if(!state.activeSession) return;
  if(!discard){
    const elapsedMin=(Date.now()-new Date(state.activeSession.startedAt).getTime())/60000;
    if(elapsedMin>=0.5) logStudy(state.activeSession.subjectId, elapsedMin, 'stopwatch', state.activeSession.topic||'');
    else toast('Session was too short to log.');
  }
  state.activeSession=null;
  if(stopwatchIntervalId){ clearInterval(stopwatchIntervalId); stopwatchIntervalId=null; }
  saveFile(false);
  updateLiveSessionBadge();
  render();
}
function ensureStopwatchTicking(){
  if(stopwatchIntervalId) return;
  stopwatchIntervalId=setInterval(updateStopwatchDisplays,1000);
  updateStopwatchDisplays();
}
function updateStopwatchDisplays(){
  if(!state || !state.activeSession){
    if(stopwatchIntervalId){ clearInterval(stopwatchIntervalId); stopwatchIntervalId=null; }
    return;
  }
  const elapsedMs=Date.now()-new Date(state.activeSession.startedAt).getTime();
  const text=formatHMS(elapsedMs);
  document.querySelectorAll('.js-live-elapsed').forEach(el=>el.textContent=text);
}
function formatHMS(ms){
  const total=Math.max(0,Math.floor(ms/1000));
  const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function updateLiveSessionBadge(){
  const badge=document.getElementById('liveSessionBadge');
  if(!badge) return;
  if(state && state.activeSession){
    badge.style.display='flex';
    const s=subj(state.activeSession.subjectId);
    document.getElementById('liveSessionSubject').textContent=s?s.name:'Studying';
  }else{
    badge.style.display='none';
  }
}

function computeStreak(){
  const logDates=new Set(state.studyLogs.map(l=>l.date));
  let streak=0;
  let cursor=todayISO();
  if(!logDates.has(cursor)){ cursor=addDaysISO(cursor,-1); }
  while(logDates.has(cursor)){ streak++; cursor=addDaysISO(cursor,-1); }
  return streak;
}
function renderToday(){

function renderWeekGrid(){
  const hours=[]; for(let h=0;h<=23;h++) hours.push(h);
  let cellsHtml='';
  for(let slot=0;slot<48;slot++){
    const h=Math.floor(slot/2), m=(slot%2)*30;
    const isHour=m===0;
    for(let day=0;day<7;day++){
      cellsHtml+=`<div class="wg-cell${isHour?' hourline':''}" style="grid-row:${slot+2};grid-column:${day+2};" data-action="add-block" data-day="${day}" data-start="${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}"></div>`;
    }
  }
  const todayStr=todayISO();
  let labelsHtml='<div class="wg-corner"></div>';
  DAY_NAMES.forEach((d,i)=>{
    const date=addDaysISO(scheduleWeekStart,i);
    const isToday=date===todayStr;
    labelsHtml+=`<div class="wg-daylabel${isToday?' wg-today':''}">${d}<div class="wg-datenum mono">${new Date(date+'T00:00:00').getDate()}</div></div>`;
  });
  let timeLabels='';
  hours.forEach(h=>{
    timeLabels+=`<div class="wg-timelabel${h===0?' wg-timelabel-first':''}" style="grid-row:${rowLine(String(h).padStart(2,'0')+':00')};grid-column:1;">${h}:00</div>`;
  });
  let blocksHtml='';
  for(let day=0;day<7;day++){
    const date=addDaysISO(scheduleWeekStart,day);
    blocksOnDate(day,date).forEach(b=>{
      const s=subj(b.subjectId);
      const r1=rowLine(b.start), r2=rowLine(b.end);

function timeOptions(){
  const out=[];
  for(let h=0;h<=23;h++){ out.push(String(h).padStart(2,'0')+':00'); out.push(String(h).padStart(2,'0')+':30'); }
  return out;
}
function addHalfHour(t){
  const [h,m]=t.split(':').map(Number);
  let nm=m+60, nh=h; if(nm>=60){nh+=Math.floor(nm/60); nm=nm%60;}
  return String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
}

/* ============================= QUESTIONS VIEW =============================
   A running, undated-by-design capture list: jot down a question the moment it
   comes up, tag it to a subject, and come back to answer it whenever. Grouped
   by the day it was captured, newest first — there's deliberately no due date
   here, unlike Homework. */
let qFilters={subject:'all',status:'all'};
function fmtGroupDate(iso){
  if(iso===todayISO()) return 'Today';
  if(iso===addDaysISO(todayISO(),-1)) return 'Yesterday';
  const d=new Date(iso+'T00:00:00');
  const sameYear=d.getFullYear()===new Date().getFullYear();
  return d.toLocaleDateString(undefined, sameYear?{weekday:'long',month:'long',day:'numeric'}:{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function renderQuestions(){
  let items=state.questions.slice();
  if(qFilters.subject!=='all') items=items.filter(q=>q.subjectId===qFilters.subject);
  if(qFilters.status==='open') items=items.filter(q=>!q.answered);
  else if(qFilters.status==='answered') items=items.filter(q=>q.answered);
  items.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));

  const groups=[];
  items.forEach(q=>{
    let g=groups.find(g=>g.date===q.date);
    if(!g){ g={date:q.date, items:[]}; groups.push(g); }
    g.items.push(q);
  });
  groups.sort((a,b)=>b.date.localeCompare(a.date));

  const openCount=state.questions.filter(q=>!q.answered).length;
  return `
  <div class="pagehead">
    <div><h1>Questions</h1><div class="sub">${openCount} question${openCount===1?'':'s'} waiting on an answer.</div></div>
    <button class="btn primary" data-action="add-question">+ Add question</button>
  </div>
  <div class="filterbar">
    <select data-action="filter-q" data-key="subject"><option value="all">All subjects</option>${state.subjects.map(s=>`<option value="${s.id}" ${qFilters.subject===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select>
    <select data-action="filter-q" data-key="status"><option value="all">All</option><option value="open" ${qFilters.status==='open'?'selected':''}>Unanswered</option><option value="answered" ${qFilters.status==='answered'?'selected':''}>Answered</option></select>
  </div>
  ${groups.length? groups.map(g=>`
    <h3 style="margin:18px 0 10px;font-size:12.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;">${fmtGroupDate(g.date)}</h3>
    ${g.items.map(q=>renderQuestionCard(q)).join('')}
  `).join('') : '<div class="empty">Nothing jotted down yet. Add a question whenever one comes up — no due date needed.</div>'}
  `;
}

  return `<div class="hwcard ${q.answered?'done':''}">
    <div class="chk ${q.answered?'checked':''}" data-action="toggle-question" data-id="${q.id}">${q.answered?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 13l4 4L19 7"/></svg>':''}</div>

        <span class="mono" style="font-size:11.5px;color:var(--ink-soft);">${fmtTime(q.createdAt)}</span>

function tickTimer(){
  if(timer.remaining>0){
    timer.remaining--;
    if(activeTab==='timer') updateTimerDisplayOnly();
  }else{
    if(timer.mode==='work'){
      logStudy(timer.subjectId, state.settings.pomodoroWork, 'timer', timer.topic||'');
      timer.cyclesDone++;
      timer.mode='break';
      timer.remaining=state.settings.pomodoroBreak*60;
      toast('Focus session complete — logged '+state.settings.pomodoroWork+' min. Break started.');
    }else{
      timer.mode='work';
      timer.remaining=state.settings.pomodoroWork*60;
      toast('Break over — ready for another session.');
    }
    if(activeTab==='timer') render();
  }
}
function updateTimerDisplayOnly(){
  const mins=Math.floor(timer.remaining/60), secs=timer.remaining%60;
  const text=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  document.querySelectorAll('.timerdisplay').forEach(el=>el.textContent=text);
  updateFsProgress();
}
/* Keeps the full-screen ring / sunset sun in sync each tick without a full re-render */
function updateFsProgress(){
  if(!timerFullscreen || timerMode!=='pomodoro') return;
  const total=(timer.mode==='work'?state.settings.pomodoroWork:state.settings.pomodoroBreak)*60;
  const frac=total>0?Math.min(1,Math.max(0,1-(timer.remaining/total))):0;
  const ring=document.getElementById('fsRingFg');
  if(ring){
    const r=90, c=2*Math.PI*r;
    ring.style.strokeDashoffset=String(c*(1-frac));
  }
  const sun=document.getElementById('fsSun');
  if(sun){
    const pct = timer.mode==='work' ? (10+frac*55) : (65-frac*55);
    sun.style.top=pct+'%';
  }
}
function logStudy(subjectId,minutes,source,note){
  if(!subjectId || minutes<=0) return;
  state.studyLogs.push({id:uid(),subjectId,date:todayISO(),minutes:Math.round(minutes),note:note||'',source:source||'manual'});
  scheduleSave();
}

function fsFxMarkup(palette, frac){
  frac = frac || 0;
  if(palette==='bloom'){
    return `<div class="fs-fx">
      <div class="fs-blob" style="width:280px;height:280px;left:8%;top:15%;background:var(--accent-study);animation-duration:13s;"></div>
      <div class="fs-blob" style="width:220px;height:220px;right:10%;top:55%;background:var(--accent-due);animation-duration:15s;animation-delay:-4s;"></div>
      <div class="fs-blob" style="width:180px;height:180px;left:35%;bottom:6%;background:var(--accent-gold);animation-duration:11s;animation-delay:-7s;"></div>
    </div>`;
  }
  if(palette==='neon'){
    return `<div class="fs-fx"><div class="fs-beam"></div></div>`;
  }
  if(palette==='aurora'){

/* ============================= PHOTOS ============================= */
/* Photos live in their own small file, separate from the main ledger data.
   This keeps everyday edits (schedule, homework, logs) fast, since saving
   them never has to rewrite accumulated photo bytes — and it lets photos
   be saved at better quality since their file is only rewritten when a
   photo actually changes, not on every unrelated edit. */
function estimatePhotosBytes(photos){
  // base64 encodes 3 bytes as 4 chars, so bytes ≈ length * 0.75. Good enough for a rough readout.
  return (photos||[]).reduce((sum,p)=> sum + (p.dataUrl?Math.round(p.dataUrl.length*0.75):0), 0);
}
function fmtBytes(bytes){
  if(bytes<1024) return bytes+' B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(0)+' KB';
  return (bytes/(1024*1024)).toFixed(bytes<10*1024*1024?1:0)+' MB';
}
function defaultPhotoState(){ return {version:1, photos:[]}; }
function migratePhotoState(s){ s.version=s.version||1; s.photos=s.photos||[]; return s; }
function photosLinked(){ return photoState!==null; }
function getPhotosArray(){
  if(photoLockedRaw) return []; // locked, password not entered yet this session — never expose anything
  return photosLinked() ? photoState.photos : (state.photos||[]);
}
function markPhotosDirty(){ if(photosLinked()) schedulePhotoSave(); else scheduleSave(); }

/* ---- Password-lock (client-side encryption) ----
   A locked photos file on disk looks like:
     {version:2, locked:true, kdf:'PBKDF2', hash:'SHA-256', iterations, salt, iv, ciphertext}
   `salt` and `iv` are base64, not secret — they just make the key/cipher unique per file/save.
   `ciphertext` is the AES-256-GCM encryption of {photos:[...]}, keyed from the password via PBKDF2.
   Nothing here is decryptable without the password — not by opening the file in a text editor,
   not by inspecting it on disk, and not by this app itself unless it's been unlocked this session. */
const PHOTO_LOCK_ITERATIONS=600000;
function isLockedPhotoFile(parsed){
  return !!(parsed && parsed.locked===true && typeof parsed.ciphertext==='string' && typeof parsed.salt==='string' && typeof parsed.iv==='string');
}
function bufToB64(buf){
  const bytes=buf instanceof Uint8Array?buf:new Uint8Array(buf);
  let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}
function b64ToBuf(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}
async function deriveLockKey(password, saltBytes, iterations){
  const enc=new TextEncoder();
  const baseKey=await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:saltBytes, iterations:iterations||PHOTO_LOCK_ITERATIONS, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
}
async function unlockPhotosWithPassword(password){
  const raw=photoLockedRaw;
  if(!raw) return false;
  try{
    const salt=b64ToBuf(raw.salt), iv=b64ToBuf(raw.iv);
    const key=await deriveLockKey(password, salt, raw.iterations);
    const ptBuf=await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, b64ToBuf(raw.ciphertext));
    const parsed=JSON.parse(new TextDecoder().decode(ptBuf));
    photoState={version:2, locked:true, photos:parsed.photos||[]};
    photoLockKey=key;
    photoLockMeta={saltB64:raw.salt, iterations:raw.iterations};
    photoLockLastWrapper=raw;
    photoLockedRaw=null;
    return true;
  }catch(err){ return false; } // wrong password → GCM auth failure, or a corrupt file
}
async function verifyLockPassword(password){
  if(!photoLockLastWrapper) return false;
  try{
    const salt=b64ToBuf(photoLockLastWrapper.salt), iv=b64ToBuf(photoLockLastWrapper.iv);
    const key=await deriveLockKey(password, salt, photoLockLastWrapper.iterations);
    await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, b64ToBuf(photoLockLastWrapper.ciphertext));
    return true;
  }catch(err){ return false; }
}
async function lockPhotosWithPassword(password){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  photoLockKey=await deriveLockKey(password, salt, PHOTO_LOCK_ITERATIONS);
  photoLockMeta={saltB64:bufToB64(salt), iterations:PHOTO_LOCK_ITERATIONS};
  photoState.locked=true; photoState.version=2;
  await savePhotoFile(false);
}
async function changeLockPassword(newPassword){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  photoLockKey=await deriveLockKey(newPassword, salt, PHOTO_LOCK_ITERATIONS);
  photoLockMeta={saltB64:bufToB64(salt), iterations:PHOTO_LOCK_ITERATIONS};
  await savePhotoFile(false);
}
async function removeLockPassword(){
  photoState.locked=false;
  photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
  await savePhotoFile(false);
}
// Re-locks without closing the app: forces a fresh save first (so nothing
// unsaved gets left behind — important on browsers without a persistent file
// handle, where "save" just means "download a fresh copy"), then drops the
// decrypted copy and key from memory. The password is required again to view
// photos after this, same as if the app had been closed and reopened.
async function relockPhotosNow(){
  if(!photoState || !photoState.locked || !photoLockKey) return;
  await savePhotoFile(false);
  photoLockedRaw=photoLockLastWrapper;
  photoState=null;
  photoLockKey=null;
  toast('Photos locked.');
  render();
}
async function serializePhotoStateForDisk(){
  if(photoState && photoState.locked && photoLockKey){
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const plaintext=new TextEncoder().encode(JSON.stringify({photos:photoState.photos}));
    const ctBuf=await crypto.subtle.encrypt({name:'AES-GCM', iv}, photoLockKey, plaintext);
    const wrapper={
      version:2, locked:true, kdf:'PBKDF2', hash:'SHA-256',
      iterations:photoLockMeta.iterations, salt:photoLockMeta.saltB64,
      iv:bufToB64(iv), ciphertext:bufToB64(ctBuf)
    };
    photoLockLastWrapper=wrapper;
    return JSON.stringify(wrapper, null, 2);
  }
  return JSON.stringify(photoState, null, 2);
}

let photoSaveTimeout=null;
async function writePhotoStateToHandle(handle){
  const text=await serializePhotoStateForDisk();
  const writable=await handle.createWritable();
  await writable.write(text);
  await writable.close();
}
async function downloadPhotoFile(){
  const text=await serializePhotoStateForDisk();
  const blob=new Blob([text],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='ledger-photos.json'; a.click();
  URL.revokeObjectURL(url);
}
async function savePhotoFile(auto){
  if(!photoState) return;
  if(photoFileHandle){
    try{ await writePhotoStateToHandle(photoFileHandle); }
    catch(err){ if(!auto) toast('Could not save photos: '+err.message); }
  }else{
    if(!auto) await downloadPhotoFile();
  }
}
function schedulePhotoSave(){
  clearTimeout(photoSaveTimeout);
  photoSaveTimeout=setTimeout(()=>savePhotoFile(true),500);
}
async function linkPhotoFile(mode){
  try{
    if(supportsFSAccess){
      if(mode==='open'){
        const [handle]=await window.showOpenFilePicker({types:[{description:'Ledger photos',accept:{'application/json':['.json']}}]});
        const file=await handle.getFile();
        const text=await file.text();
        const parsed=JSON.parse(text);
        if(isLockedPhotoFile(parsed)){
          photoLockedRaw=parsed; photoLockLastWrapper=parsed; photoState=null;
          photoLockKey=null; photoLockMeta=null;
        }else{
          photoState=migratePhotoState(parsed);
          photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
        }
        photoFileHandle=handle;
      }else{
        const handle=await window.showSaveFilePicker({suggestedName:'ledger-photos.json',types:[{description:'Ledger photos',accept:{'application/json':['.json']}}]});
        photoState=defaultPhotoState();
        photoFileHandle=handle;
        photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
        await writePhotoStateToHandle(handle);
      }
    }else{
      if(mode==='open'){ document.getElementById('photoFileInput').click(); return; }
      photoState=defaultPhotoState();
      photoFileHandle=null;
      photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
    }
    render();
  }catch(err){ if(err.name!=='AbortError') toast(err.message); }
}
async function migrateLegacyPhotos(mode){
  const legacy=(state.photos||[]).slice();
  await linkPhotoFile(mode);
  if(!photoState){
    if(photoLockedRaw){
      toast('That photos file is locked. Enter its password below, then use "Move photos here" again to finish bringing these over.');
      pendingLegacyPhotos=legacy; // picked up by finishPendingLegacyMigration() right after a successful unlock
      render();
    }
    return;
  }
  photoState.photos=photoState.photos.concat(legacy);
  state.photos=[];
  scheduleSave();
  schedulePhotoSave();
  toast('Photos moved to a separate file.');
  render();
}
let pendingLegacyPhotos=null;
function finishPendingLegacyMigration(){
  if(!pendingLegacyPhotos || !photoState) return;
  photoState.photos=photoState.photos.concat(pendingLegacyPhotos);
  state.photos=[];
  pendingLegacyPhotos=null;
  scheduleSave();
  schedulePhotoSave();
  toast('Photos moved to a separate file.');
}
/* ============================= IMPORT PHOTOS FROM ANOTHER FILE ============================= */
// Covers the "photos taken on another device" case: someone opens the app fresh
// elsewhere (a new ledger or a new photos file), takes some photos, and sends that
// JSON file over. This pulls any photos out of it into the currently active photo
// store here, then tries to clear the source file so a stray copy isn't left behind.
async function importPhotosFlow(){
  if(supportsFSAccess){
    try{
      const [handle]=await window.showOpenFilePicker({types:[{description:'Ledger or photos file',accept:{'application/json':['.json']}}]});
      if(photoFileHandle){
        try{ if(await handle.isSameEntry(photoFileHandle)){ toast('That’s already your linked photos file.'); return; } }catch(e){}
      }
      if(fileHandle){
        try{ if(await handle.isSameEntry(fileHandle)){ toast('That’s already your current ledger file.'); return; } }catch(e){}
      }
      const file=await handle.getFile();
      const text=await file.text();
      const parsed=JSON.parse(text);
      await handleImportedPhotoJSON(parsed, handle, handle.name);
    }catch(err){
      if(err.name!=='AbortError') toast('Could not read that file: '+err.message);
    }
  }else{
    document.getElementById('importPhotosInput').click();
  }
}
async function handleImportedPhotoJSON(parsed, sourceHandle, sourceName){
  if(isLockedPhotoFile(parsed)){
    toast('That file is password-locked. Open it as your linked photos file and unlock it first, then import from elsewhere.');
    return;
  }
  let candidates=null;
  if(parsed && Array.isArray(parsed.photos)) candidates=parsed.photos;
  else if(Array.isArray(parsed)) candidates=parsed;
  if(!candidates){ toast('That doesn’t look like a ledger or photos file.'); return; }

  const dest=getPhotosArray();
  const existingUrls=new Set(dest.map(p=>p.dataUrl));
  let added=0, skipped=0;
  candidates.forEach(p=>{
    if(!p || typeof p.dataUrl!=='string' || !p.dataUrl.startsWith('data:image')){ skipped++; return; }
    if(existingUrls.has(p.dataUrl)){ skipped++; return; }
    dest.push({
      id:uid(),
      dataUrl:p.dataUrl,
      note: typeof p.note==='string' ? p.note : '',
      takenAt: typeof p.takenAt==='string' ? p.takenAt : new Date().toISOString()
    });
    existingUrls.add(p.dataUrl);
    added++;
  });

  if(added>0){ markPhotosDirty(); render(); }
  toast(added>0
    ? `Imported ${added} photo${added===1?'':'s'}${skipped?` (${skipped} skipped)`:''}.`
    : `No new photos found${skipped?` (${skipped} skipped)`:''}.`);

  if(!sourceHandle || added===0) return; // no handle (fallback input) or nothing to clean up

  const wipe=confirm(`Photos copied in. Erase the photos inside "${sourceName}" now so no extra copy is left behind on that device? This can’t be undone.`);
  if(!wipe) return;
  await scrubSourceFile(sourceHandle, parsed);
}
async function scrubSourceFile(handle, originalParsed){
  let perm='granted';
  try{ perm=await handle.requestPermission({mode:'readwrite'}); }
  catch(err){ perm='denied'; }
  if(perm!=='granted'){ toast('No permission to clear that file — please delete it manually.'); return; }

  try{
    if(typeof handle.remove==='function'){
      await handle.remove();
      toast('Source file deleted.');
      return;
    }
  }catch(err){ /* fall through to overwrite */ }

  try{
    const junk=Array.from({length:24},()=>Math.random().toString(36).slice(2)).join('');
    const scrubbed=(originalParsed && Array.isArray(originalParsed.photos))
      ? {...originalParsed, photos:[], wiped:true, wipedAt:new Date().toISOString(), note:junk}
      : {wiped:true, wipedAt:new Date().toISOString(), note:junk};
    const writable=await handle.createWritable();
    await writable.write(JSON.stringify(scrubbed,null,2));
    await writable.close();
    toast('Source file’s photos were wiped.');
  }catch(err){
    toast('Could not clear the source file: '+err.message);
  }
}
function resizeToDataUrl(sourceEl, srcW, srcH){
  const maxDim=2000;
  let w=srcW, h=srcH;
  if(w>maxDim || h>maxDim){
    if(w>h){ h=Math.round(h*maxDim/w); w=maxDim; }
    else{ w=Math.round(w*maxDim/h); h=maxDim; }
  }
  const canvas=document.createElement('canvas');
  canvas.width=w; canvas.height=h;
  canvas.getContext('2d').drawImage(sourceEl,0,0,w,h);
  return canvas.toDataURL('image/jpeg',0.88);
}
function handlePhotoFile(file){
  if(!file) return;
  if(!file.type || !file.type.startsWith('image/')){ toast('That file is not an image.'); return; }
  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=new Image();
    img.onload=()=>{
      pendingPhotoData=resizeToDataUrl(img, img.width, img.height);
      openModal(photoCaptureModalHtml());
    };
    img.onerror=()=>toast('Could not read that image.');
    img.src=e.target.result;
  };
  reader.onerror=()=>toast('Could not read that file.');
  reader.readAsDataURL(file);
}

function isTouchPrimary(){
  return !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
}
let webcamStream=null;
async function openWebcamCapture(){
  try{
    webcamStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});

    return;

function navigatePhoto(delta){
  if(!viewingPhotoId) return;
  const photos=getPhotosArray().slice().sort((a,b)=>b.takenAt.localeCompare(a.takenAt));
  if(!photos.length) return;
  const idx=photos.findIndex(x=>x.id===viewingPhotoId);
  if(idx===-1) return;
  const next=photos[(idx+delta+photos.length)%photos.length];
  viewingPhotoId=next.id;
  openModal(photoModalHtml(next));
}

function renderStats(){
  const now=todayISO();
  const weekAgo=addDaysISO(now,-6);
  const logsThisWeek=state.studyLogs.filter(l=>l.date>=weekAgo && l.date<=now);
  const totalWeekMin=logsThisWeek.reduce((a,l)=>a+l.minutes,0);
  const totalAllMin=state.studyLogs.reduce((a,l)=>a+l.minutes,0);

  const bySubject={};
  state.studyLogs.forEach(l=>{ bySubject[l.subjectId]=(bySubject[l.subjectId]||0)+l.minutes; });
  const maxSubjMin=Math.max(1,...Object.values(bySubject));

  const dayTotals=[];
  for(let i=6;i>=0;i--){
    const d=addDaysISO(now,-i);
    const mins=state.studyLogs.filter(l=>l.date===d).reduce((a,l)=>a+l.minutes,0);
    dayTotals.push({date:d,mins});
  }
  const maxDayMin=Math.max(1,...dayTotals.map(d=>d.mins));

  const doneCount=state.homework.filter(h=>h.status==='done').length;
  const totalHw=state.homework.length;
  const completionRate= totalHw? Math.round(doneCount/totalHw*100) : 0;

  return `
  <div class="pagehead"><div><h1>Stats</h1><div class="sub">Your study time, at a glance.</div></div></div>
  <div class="grid3">
    <div class="card"><div class="statnum">${fmtMins(totalWeekMin)}</div><div class="statlabel">Last 7 days</div></div>
    <div class="card"><div class="statnum">${fmtMins(totalAllMin)}</div><div class="statlabel">All-time logged</div></div>
    <div class="card"><div class="statnum">${completionRate}%</div><div class="statlabel">Homework completed (${doneCount}/${totalHw})</div></div>
  </div>
  <div class="card">
    <h3 style="margin:0 0 12px;font-size:14px;">Last 7 days</h3>
    <div class="weekbars">
      ${dayTotals.map(d=>`<div class="weekbar-col"><div class="weekbar-fill" style="height:${Math.max(4,d.mins/maxDayMin*90)}px;"></div><div class="weekbar-day">${fmtDate(d.date)}</div></div>`).join('')}
    </div>
  </div>
  <div class="card">
    <h3 style="margin:0 0 12px;font-size:14px;">Hours by subject</h3>
    ${state.subjects.length? state.subjects.map(s=>{const m=bySubject[s.id]||0;return `<div class="barrow"><span class="lbl">${esc(s.name)}</span><div class="track"><div class="fill" style="width:${m/maxSubjMin*100}%;background:${s.color};"></div></div><span class="val mono">${fmtMins(m)}</span></div>`}).join('') : '<div class="empty">Add a subject to see breakdowns.</div>'}
  </div>
  `;
}
