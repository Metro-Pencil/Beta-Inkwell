/* ============================= SYNC MERGE HELPERS =============================
   Two merge strategies, one per category, both computed entirely on this device (the Worker is
   just a dumb GET/PUT store — see worker.js):

   1) ADDITIVE + NAME-DEDUP (subjects, study logs) — a record already present here (matched by id)
      is never edited or overwritten; only records missing here get added, so a delete or edit made
      on one device never removes/changes it on the other via a regular sync. Subjects get one extra
      rule: an incoming subject is also treated as "already here" if its name matches one we already
      have (case/whitespace-insensitive), even under a different id — otherwise two devices that each
      started their own fresh ledger (each with its own randomly-id'd "Mathematics", "Physics",
      "English") would end up with six subjects instead of three on first sync. When a match is
      found, the incoming copy is dropped and anything that referenced it is repointed at the
      subject we kept, via subjectRemap, so nothing gets orphaned.

   2) LAST-WRITE-WINS + TOMBSTONES (schedule blocks, homework, questions) — every record carries an
      updatedAt (ms epoch), stamped whenever it's created, edited, or its status is toggled. Deleting
      one doesn't just remove it from the array — it also records a tombstone {id: deletedAt} in
      state.tombstones[category]. For every id seen on either side (live here, live in the cloud, or
      tombstoned on either side), whichever side's most recent timestamp is newer wins: if that's a
      live record, it survives into the merged result; if it's a tombstone, the id is dropped (and
      the tombstone carries over) even if the *other* side still has a live copy. This is what makes
      an edit override an untouched copy, a delete actually stick, and a genuinely untouched record
      just pick up whatever the other device most recently did to it — without a fixed field list or
      server-side intelligence. Ties (identical timestamp on both sides) keep the local copy; this
      only matters when the content is already identical, so it's not a real conflict. */
function syncableData(){
  return {subjects:state.subjects, scheduleBlocks:state.scheduleBlocks, studyLogs:state.studyLogs, homework:state.homework, questions:state.questions, tombstones:state.tombstones};
}
// Marks `id` as deleted (right now) in the given category's tombstone map. Called by every
// delete-* action handler instead of just splicing the array, so the deletion can be told apart
// from "this device has simply never heard of this id" during the next sync.
function recordTombstone(category, id){
  if(!state.tombstones) state.tombstones={scheduleBlocks:{},homework:{},questions:{}};
  if(!state.tombstones[category]) state.tombstones[category]={};
  state.tombstones[category][id]=Date.now();
}
// Subjects: additive, with name-based dedup. Returns the full merged subjects array (this
// device's, plus any genuinely new ones from the cloud) and a remap for any cloud subject id that
// got folded into an existing local one by name.
function mergeSubjects(localSubjects, cloudSubjects){
  const existing=new Set((localSubjects||[]).map(x=>x&&x.id).filter(Boolean));
  const nameToId=new Map();
  (localSubjects||[]).forEach(sub=>{ if(sub&&sub.id) nameToId.set(normSubjectName(sub.name), sub.id); });
  const added=[];
  const subjectRemap={};
  (cloudSubjects||[]).forEach(x=>{
    if(!x || !x.id || existing.has(x.id)) return; // exact record already present
    const key=normSubjectName(x.name);
    if(nameToId.has(key)){
      subjectRemap[x.id]=nameToId.get(key); // same subject, different id — fold into the one we keep
    }else{
      nameToId.set(key,x.id);
      added.push(x);
    }
  });
  return {merged:(localSubjects||[]).concat(added), subjectRemap, addedCount:added.length};
}
// Study logs: additive by id only (no name-dedup — logs don't have names). Never edited in place,
// so a plain "is this id already here" check is all that's needed.
function mergeLogsAdditive(localLogs, cloudLogs){
  const existing=new Set((localLogs||[]).map(x=>x&&x.id).filter(Boolean));
  const added=(cloudLogs||[]).filter(x=>x&&x.id&&!existing.has(x.id));
  return {merged:(localLogs||[]).concat(added), addedCount:added.length};
}
// Repoints subjectId fields per a {droppedId:keptId} remap across any number of arrays. Mutates
// each array's items in place. A no-op for ids not present in the remap (i.e. everything that was
// never a dropped duplicate), so it's safe to run over every merged array unconditionally.
function applySubjectRemapMerge(remap, ...refArrays){
  if(!remap || Object.keys(remap).length===0) return;
  const fix=id=>Object.prototype.hasOwnProperty.call(remap,id)?remap[id]:id;
  refArrays.forEach(arr=>{ (arr||[]).forEach(item=>{ if(item && item.subjectId!=null) item.subjectId=fix(item.subjectId); }); });
}
// Last-write-wins merge with tombstones for one category (schedule blocks, homework, or
// questions). `localTomb`/`cloudTomb` are {id: deletedAtMs} maps. Returns the merged live array,
// the merged tombstone map, and pulled/pushed counts for the sync summary toast.
// Tombstones are kept forever rather than aged out: an earlier version of this pruned anything
// older than 180 days, but that's a real data-loss risk for an app that isn't used every day — a
// device that goes quiet for longer than the cutoff would rejoin, find the tombstone already
// gone, and its still-lingering local copy would look brand new and resurrect the delete on every
// device. For a personal ledger's data volumes the tombstone list stays tiny (a plain {id:number}
// map) for years even with heavy use, so there's no real storage cost to just keeping it forever.
function lwwMergeCategory(localArr, localTomb, cloudArr, cloudTomb){
  localTomb=localTomb||{}; cloudTomb=cloudTomb||{};
  const localMap=new Map((localArr||[]).filter(x=>x&&x.id).map(x=>[x.id,x]));
  const cloudMap=new Map((cloudArr||[]).filter(x=>x&&x.id).map(x=>[x.id,x]));
  const ids=new Set([...localMap.keys(), ...cloudMap.keys(), ...Object.keys(localTomb), ...Object.keys(cloudTomb)]);
  const mergedArr=[]; const mergedTomb={};
  let pulled=0, pushed=0;
  ids.forEach(id=>{
    const localRec=localMap.get(id), cloudRec=cloudMap.get(id);
    const localLiveTime=localRec?(localRec.updatedAt||0):-1;
    const localDelTime=Object.prototype.hasOwnProperty.call(localTomb,id)?localTomb[id]:-1;
    const cloudLiveTime=cloudRec?(cloudRec.updatedAt||0):-1;
    const cloudDelTime=Object.prototype.hasOwnProperty.call(cloudTomb,id)?cloudTomb[id]:-1;
    const localEff=Math.max(localLiveTime,localDelTime);
    const cloudEff=Math.max(cloudLiveTime,cloudDelTime);
    const winnerIsLocal = localEff>=cloudEff; // tie goes to local
    const winnerIsDeleted = winnerIsLocal ? (localDelTime>localLiveTime) : (cloudDelTime>cloudLiveTime);
    const winnerTime = winnerIsLocal?localEff:cloudEff;
    if(winnerIsDeleted){
      mergedTomb[id]=winnerTime;
      if(!winnerIsLocal && localRec) pulled++; // cloud's delete overrides a live local copy
    }else{
      const winnerRec = winnerIsLocal?localRec:cloudRec;
      mergedArr.push(winnerRec);
      if(!winnerIsLocal && cloudEff>localEff) pulled++; // cloud version is newer/new
      else if(winnerIsLocal && cloudEff<0) pushed++; // brand new here, cloud has never seen it
    }
  });
  return {mergedArr, mergedTomb, pulled, pushed};
}

/* ============================= SERVER SYNC (online, via a small Cloudflare Worker) =============================
   A tiny free backend (see worker.js, deployed separately on Cloudflare Workers) acts as a mailbox
   — it only ever GETs or PUTs a JSON blob under your sync code; every merge decision below happens
   on this device. This device only talks to it when you tap "Save & sync now" in Settings —
   nothing syncs automatically. "Save & sync now" does, in order:

   1) GET — fetch whatever's currently stored under the shared sync code.

   2) MERGE, entirely client-side:
      - subjects + study logs: additive, name-deduped for subjects (see mergeSubjects/
        mergeLogsAdditive above). A delete or edit made on either device to one of these never
        removes/changes it on the other via a regular sync — "Upload" is the deliberate escape
        hatch for that (see below).
      - schedule blocks + homework + questions: last-write-wins using each record's updatedAt,
        with tombstones standing in for deletions (see lwwMergeCategory above). This is what fixes
        the old one-way behavior: an edit or delete made *anywhere* now actually reaches the other
        device, while a record neither side touched is simply left as whichever side's copy is
        already there.

   3) Apply the merged result to this device's state, then PUT that exact merged result back —
      so the cloud copy now matches what this device just adopted, and the next device to sync
      merges against a fully up-to-date snapshot instead of a half-applied one. */
let serverSyncInFlight=false;
async function serverSyncNow(){
  if(serverSyncInFlight) return;
  const rawUrl=(state.settings.syncServerUrl||'').trim();
  const code=(state.settings.syncCode||'').trim();
  if(!rawUrl || !code){ toast('Enter your Worker URL and a sync code in Settings first.'); return; }
  const base=rawUrl.replace(/\/+$/,'');
  serverSyncInFlight=true;
  const btn=document.getElementById('server-sync-btn');
  const origLabel=btn?btn.textContent:null;
  if(btn){ btn.textContent='Syncing…'; btn.disabled=true; }
  try{
    // Step 1: fetch the current cloud copy.
    const getResp=await fetch(base+'/sync?code='+encodeURIComponent(code), { method:'GET' });
    if(!getResp.ok){
      const errText=await getResp.text().catch(()=>'');
      throw new Error('Server responded with '+getResp.status+(errText?': '+errText.slice(0,120):''));
    }
    const cloud=await getResp.json();
    const cloudTomb=cloud.tombstones||{};

    // Step 2: merge every category client-side.
    const subjResult=mergeSubjects(state.subjects, cloud.subjects||[]);
    const logResult=mergeLogsAdditive(state.studyLogs, cloud.studyLogs||[]);
    const blockResult=lwwMergeCategory(state.scheduleBlocks, state.tombstones.scheduleBlocks, cloud.scheduleBlocks||[], cloudTomb.scheduleBlocks||{});
    const hwResult=lwwMergeCategory(state.homework, state.tombstones.homework, cloud.homework||[], cloudTomb.homework||{});
    const qResult=lwwMergeCategory(state.questions, state.tombstones.questions, cloud.questions||[], cloudTomb.questions||{});
    applySubjectRemapMerge(subjResult.subjectRemap, logResult.merged, blockResult.mergedArr, hwResult.mergedArr, qResult.mergedArr);

    // Step 3: adopt the merged result locally...
    state.subjects=subjResult.merged;
    state.studyLogs=logResult.merged;
    state.scheduleBlocks=blockResult.mergedArr;
    state.homework=hwResult.mergedArr;
    state.questions=qResult.mergedArr;
    state.tombstones={scheduleBlocks:blockResult.mergedTomb, homework:hwResult.mergedTomb, questions:qResult.mergedTomb};
    scheduleSave();

    // ...then push that same merged result back so the cloud matches exactly.
    const putResp=await fetch(base+'/sync?code='+encodeURIComponent(code), {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(syncableData())
    });
    if(!putResp.ok){
      const errText=await putResp.text().catch(()=>'');
      throw new Error('Server responded with '+putResp.status+(errText?': '+errText.slice(0,120):'')+' while pushing the merged result.');
    }
    await putResp.json().catch(()=>null);

    if(cloudMode){ lastSavedAt=Date.now(); setSaveIndicator(true); saveCloudCache(); }
    render();
    const added=subjResult.addedCount+logResult.addedCount;
    const pulled=blockResult.pulled+hwResult.pulled+qResult.pulled;
    const pushed=blockResult.pushed+hwResult.pushed+qResult.pushed;
    const parts=[];
    if(added>0) parts.push(`${added} new subject/log record${added===1?'':'s'}`);
    if(pulled>0) parts.push(`${pulled} item${pulled===1?'':'s'} updated from the cloud`);
    if(pushed>0) parts.push(`${pushed} new item${pushed===1?'':'s'} pushed up`);
    toast(parts.length? 'Synced — '+parts.join(', ')+'.' : 'Synced — everything already matched.');
  }catch(err){
    if(cloudMode) setSaveIndicator(false);
    toast('Sync failed: '+err.message);
  }finally{
    serverSyncInFlight=false;
    if(btn){ btn.textContent=origLabel; btn.disabled=false; }
  }
}

/* ============================= CLOUD LOGIN (gate-screen shortcut, device-cached) =============================
   "Log in with sync code" is a second way into the app besides opening a local file: paste the same
   Worker URL + sync code used for regular sync, and this device adopts the merged cloud copy as its
   active ledger — no local file at all. Because there's no fileHandle to write to, every edit in this
   mode is debounced into localStorage (the device cache) instead, so a forgotten tab close never loses
   work; only tapping "Sync to cloud" (here, or the syncbar/Settings button once inside) ever touches
   the network, in line with keeping Worker/KV requests to a deliberate, manual minimum. */
function cloudCacheKey(url,code){
  return 'ledgerCloudCache::'+String(url||'').trim().replace(/\/+$/,'')+'::'+String(code||'').trim();
}
function saveCloudCache(){
  if(!cloudMode || !state) return;
  try{
    localStorage.setItem(cloudCacheKey(state.settings.syncServerUrl, state.settings.syncCode), JSON.stringify({cachedAt:Date.now(), state}));
  }catch(err){ /* localStorage full or unavailable — nothing more we can do locally */ }
}
function loadCloudCache(url,code){
  try{
    const raw=localStorage.getItem(cloudCacheKey(url,code));
    if(!raw) return null;
    const parsed=JSON.parse(raw);
    return (parsed && parsed.state) ? parsed.state : null;
  }catch(err){ return null; }
}
function lastCloudUrl(){ try{ return localStorage.getItem('ledgerLastCloudUrl')||''; }catch(err){ return ''; } }
function lastCloudCode(){ try{ return localStorage.getItem('ledgerLastCloudCode')||''; }catch(err){ return ''; } }
function cloudLoginModalHtml(){
  return `<h2 style="margin:0 0 10px;">Log in with sync code</h2>
  <p style="font-size:13px;color:var(--ink-soft);line-height:1.55;margin:0 0 16px;">
    Pulls your ledger straight from the cloud using your Worker URL and sync code — no local file needed. This device keeps a cached copy of your edits so nothing's lost even if you close the app before syncing again, but it only actually talks to the server when you tap Sync.
  </p>
  <div class="field"><label for="login-sync-url">Worker URL</label><input type="text" id="login-sync-url" placeholder="https://your-worker.workers.dev" value="${esc(lastCloudUrl())}"></div>
  <div class="field"><label for="login-sync-code">Sync code</label><input type="password" id="login-sync-code" placeholder="e.g. amber-cedar-4821" value="${esc(lastCloudCode())}" autocomplete="off"></div>
  <div class="modalactions">
    <button class="btn" data-action="close-modal">Cancel</button>
    <button class="btn primary" id="cloud-login-btn" data-action="confirm-cloud-login">Log in &amp; sync</button>
  </div>`;
}
async function cloudLogin(url, code){
  // If this device has cached a session for this exact URL+code before (e.g. it logged in here
  // previously and had unsynced edits when the tab closed), start from that instead of blank —
  // otherwise start from a genuinely empty ledger so the merge below only ever adds what the
  // cloud actually has, never this device's placeholder demo subjects.
  const cached=loadCloudCache(url, code);
  state=cached ? migrateState(cached) : defaultState();
  if(!cached) state.subjects=[];
  fileHandle=null;
  cloudMode=true;
  photoState=null; photoFileHandle=null;
  photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
  state.settings.syncServerUrl=url;
  state.settings.syncCode=code;
  try{ localStorage.setItem('ledgerLastCloudUrl', url); localStorage.setItem('ledgerLastCloudCode', code); }catch(err){}
  onCloudReady(code);
  await serverSyncNow();
}

/* ============================= STOPWATCH (persisted real-time session) ============================= */
function startStopwatch(subjectId,topic){
  if(!subjectId) subjectId=state.subjects[0]?.id;
  if(!subjectId){ toast('Add a subject first.'); return; }
  state.activeSession={subjectId,startedAt:new Date().toISOString(),topic:topic||''};
  timerMode='stopwatch';
  saveFile(false);
  updateLiveSessionBadge();
  ensureStopwatchTicking();
  render();
}
function stopStopwatch(discard){
  if(!state.activeSession) return;
  if(!discard){
    const elapsedMin=(Date.now()-new Date(state.activeSession.startedAt).getTime())/60000;
    if(elapsedMin>=0.5) logStudy(state.activeSession.subjectId, elapsedMin, 'stopwatch', state.activeSession.topic||'');
    else toast('Session was too short to log.');
  }
  state.activeSession=null;
  if(stopwatchIntervalId){ clearInterval(stopwatchIntervalId); stopwatchIntervalId=null; }
  saveFile(false);
  updateLiveSessionBadge();
  render();
}
function ensureStopwatchTicking(){
  if(stopwatchIntervalId) return;
  stopwatchIntervalId=setInterval(updateStopwatchDisplays,1000);
  updateStopwatchDisplays();
}
function updateStopwatchDisplays(){
  if(!state || !state.activeSession){
    if(stopwatchIntervalId){ clearInterval(stopwatchIntervalId); stopwatchIntervalId=null; }
    return;
  }
  const elapsedMs=Date.now()-new Date(state.activeSession.startedAt).getTime();
  const text=formatHMS(elapsedMs);
  document.querySelectorAll('.js-live-elapsed').forEach(el=>el.textContent=text);
}
function formatHMS(ms){
  const total=Math.max(0,Math.floor(ms/1000));
  const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function updateLiveSessionBadge(){
  const badge=document.getElementById('liveSessionBadge');
  if(!badge) return;
  if(state && state.activeSession){
    badge.style.display='flex';
    const s=subj(state.activeSession.subjectId);
    document.getElementById('liveSessionSubject').textContent=s?s.name:'Studying';
  }else{
    badge.style.display='none';
  }
}

/* ============================= TOAST ============================= */
function toast(msg){
  const root=document.getElementById('toastRoot');
  const el=document.createElement('div');
  el.className='toast';
  el.textContent=msg;
  root.appendChild(el);
  setTimeout(()=>el.remove(),2600);
}

/* ============================= THEME ============================= */
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.settings.darkMode?'dark':'light');
  document.documentElement.setAttribute('data-palette', state.settings.palette||'ledger');
  setupThemeEffects();
}
function setupThemeEffects(){
  document.querySelectorAll('.theme-fx').forEach(el=>el.remove());
  const palette=state.settings.palette||'ledger';
  if(palette==='sakura'){
    const wrap=document.createElement('div');
    wrap.className='theme-fx sakura-fx';
    wrap.setAttribute('aria-hidden','true');
    for(let i=0;i<9;i++){
      const petal=document.createElement('span');
      petal.className='petal';
      petal.style.left=(Math.random()*100)+'vw';
      petal.style.animationDuration=(9+Math.random()*8)+'s';
      petal.style.animationDelay=(Math.random()*10)+'s';
      petal.style.opacity=String(0.5+Math.random()*0.4);
      petal.style.transform='scale('+(0.6+Math.random()*0.8)+')';
      wrap.appendChild(petal);
    }
    document.body.appendChild(wrap);
  }
  if(palette==='halftone'){
    setupHalftoneBackground();
    if(lastAppliedPalette!=='halftone') playHalftoneCurtain();
  }else{
    teardownHalftoneBackground();
  }
  if(palette==='glass'){
    setupGlassBackground();
    if(lastAppliedPalette!=='glass') playGlassCurtain();
  }else{
    teardownGlassBackground();
  }
  lastAppliedPalette=palette;
}

/* ============================= HALFTONE THEME EFFECTS =============================
   Everything below is exclusive to the Halftone palette: a canvas-painted dot-screen
   sky with drifting clouds behind the whole app, an ink-dot curtain that wipes away
   top-to-bottom the first time the theme appears, and a matching reveal on #main
   whenever the person switches tabs while it's active (triggered from render()).
   Nothing here runs, or has any effect, for any other theme. */
function prefersReducedMotion(){
  return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
}
// Cheap deterministic pseudo-random in [0,1) from two integers — gives the halftone
// field organic, non-repeating speckle without needing a real noise library.
function haloHash(x,y){
  const n=Math.sin(x*127.1+y*311.7)*43758.5453;
  return n-Math.floor(n);
}
// Max-blend distance field over a handful of soft elliptical "cloud" blobs (all
// coordinates 0..1, normalized to the canvas). Used both for the page-wide sky and
// for the full-screen timer's hero cloud, just with different blob layouts.
function haloField(nx,ny,blobs){
  let v=0;
  for(let i=0;i<blobs.length;i++){
    const b=blobs[i];
    const dx=(nx-b.x)*b.sx, dy=(ny-b.y)*b.sy;
    const t=1-Math.sqrt(dx*dx+dy*dy)/b.r;
    if(t>v) v=t;
  }
  return v;
}
// A loose, lower-weighted cluster of cloud blobs — mirrors the reference photo's
// composition (a dark sky giving way to a fluffy mass of cloud lower in frame),
// randomized a little each time so the sky looks slightly different every time
// this theme is switched on.
function generateHaloBlobs(){
  const blobs=[];
  const clusterX=0.3+Math.random()*0.4;
  const n=5+Math.floor(Math.random()*3);
  for(let i=0;i<n;i++){
    blobs.push({
      x:clusterX+(Math.random()-0.5)*0.55,
      y:0.58+(Math.random()-0.5)*0.42,
      r:0.15+Math.random()*0.17,
      sx:0.75+Math.random()*0.55,
      sy:1.05+Math.random()*0.55
    });
  }
  return blobs;
}
// Paints a halftone dot field into ctx: a soft vertical sky gradient, small scattered
// dots in the dark "sky" gaps, larger dots (size scales with cloud density) for the
// clouds themselves, and a sprinkle of warm gold dots near mid-tone cloud edges to
// suggest sunlight breaking through — the bit of "different colours" warmth that
// keeps the whole thing from reading as flat monochrome dot-grid.
function drawHalftoneField(ctx,w,h,blobs,opts){
  const cell=opts.cell||12;
  const cols=Math.ceil(w/cell)+1, rows=Math.ceil(h/cell)+1;
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,opts.skyTop||'#0A1524');
  grad.addColorStop(1,opts.skyBottom||'#182B45');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);
  const skyDots=[], cloudDots=[], warmDots=[];
  for(let ry=0;ry<rows;ry++){
    for(let rx=0;rx<cols;rx++){
      const px=rx*cell+((ry%2)?cell/2:0);
      const py=ry*cell;
      const v=haloField(px/w,py/h,blobs)+(haloHash(rx,ry)-0.5)*0.3;
      if(v>0.08){
        const rr=Math.min(cell*0.48,1+v*cell*0.62);
        const warmChance=0.05+Math.max(0,0.55-Math.abs(v-0.55))*0.16;
        if(haloHash(rx*3+1,ry*3+7)<warmChance) warmDots.push([px,py,rr*0.85]);
        else cloudDots.push([px,py,rr]);
      }else if(haloHash(rx*7+2,ry*7+3)<0.6){
        const sv=Math.max(0,0.14+(haloHash(rx,ry)-0.5)*0.7-Math.max(0,-v)*0.18);
        skyDots.push([px,py,0.5+sv*cell*0.36]);
      }
    }
  }
  ctx.fillStyle=opts.skyDot||'rgba(87,198,224,0.55)';
  skyDots.forEach(d=>{ ctx.beginPath(); ctx.arc(d[0],d[1],d[2],0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle=opts.cloudDot||'rgba(234,243,252,0.9)';
  cloudDots.forEach(d=>{ ctx.beginPath(); ctx.arc(d[0],d[1],d[2],0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle=opts.warmDot||'rgba(244,193,94,0.75)';
  warmDots.forEach(d=>{ ctx.beginPath(); ctx.arc(d[0],d[1],d[2],0,Math.PI*2); ctx.fill(); });
}
function redrawHalftoneBackground(){
  const canvas=document.getElementById('halftoneBgCanvas');
  if(!canvas||!haloBlobs) return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=window.innerWidth, h=window.innerHeight;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawHalftoneField(ctx,w,h,haloBlobs,{
    cell:12, skyTop:'#0A1524', skyBottom:'#182B45',
    skyDot:'rgba(87,198,224,0.5)', cloudDot:'rgba(234,243,252,0.85)', warmDot:'rgba(244,193,94,0.5)'
  });
}
function setupHalftoneBackground(){
  if(document.getElementById('halftoneBgLayer')) return; // already set up for this "session" of the theme
  const layer=document.createElement('div');
  layer.id='halftoneBgLayer';
  layer.setAttribute('aria-hidden','true');
  layer.style.cssText='position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;';
  const canvas=document.createElement('canvas');
  canvas.id='halftoneBgCanvas';
  canvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;';
  layer.appendChild(canvas);
  document.body.appendChild(layer);
  haloBlobs=generateHaloBlobs();
  redrawHalftoneBackground();
  if(!halftoneResizeBound){
    let resizeT=null;
    window.addEventListener('resize',()=>{
      clearTimeout(resizeT);
      resizeT=setTimeout(()=>{ if(document.getElementById('halftoneBgLayer')) redrawHalftoneBackground(); },150);
    });
    halftoneResizeBound=true;
  }
}
function teardownHalftoneBackground(){
  const layer=document.getElementById('halftoneBgLayer');
  if(layer) layer.remove();
  haloBlobs=null;
}
// The ink-dot curtain: an opaque full-screen dot field that wipes away top-to-bottom
// (see .halftone-curtain / @keyframes halftoneCurtainOut in the CSS) the moment this
// theme first appears — on opening the ledger file if it's already the saved theme,
// or right when switching into it from Settings. Skips entirely under reduced-motion,
// since its un-animated resting state is a full-screen cover — it must never be left
// on screen without its wipe running.
function playHalftoneCurtain(){
  if(prefersReducedMotion()) return;
  const curtain=document.createElement('div');
  curtain.className='halftone-curtain';
  curtain.setAttribute('aria-hidden','true');
  const sweep=document.createElement('div');
  sweep.className='halftone-curtain-sweep';
  curtain.appendChild(sweep);
  document.body.appendChild(curtain);
  const remove=()=>{ if(curtain.parentNode) curtain.remove(); };
  curtain.addEventListener('animationend',remove);
  setTimeout(remove,2200); // safety net in case animationend never fires
}
// Called from render() when the active tab just changed while Halftone is active —
// restarts the CSS reveal on #main (see .section-in / @keyframes halftoneMainIn).
function triggerHalftoneSectionTransition(main){
  if(prefersReducedMotion()) return;
  main.classList.remove('section-in');
  void main.offsetWidth; // force reflow so re-adding the class restarts the animation
  main.classList.add('section-in');
}

/* ============================= GLASS THEME EFFECTS =============================
   Everything below is exclusive to the Glass palette: a canvas-painted field of
   long, wiggly "ribbon" lines behind the whole app — seen through frosted, blurred
   glass panels (the sidebar, cards, the sync bar, modals) — a matching wiggly-ribbon
   flower as the full-screen timer's hero art, and a left-to-right sweep reveal (the
   mirror image of Halftone's top-to-bottom one) that plays the first time this theme
   appears and again on every tab switch while it's active. Nothing here runs, or has
   any effect, for any other theme. */
const GLASS_HUES=[
  {r:138,g:92,b:232},  // violet — accent-study
  {r:232,g:115,b:79},  // coral — accent-due
  {r:231,g:169,b:62},  // gold — accent-gold
  {r:79,g:163,b:216},  // sky blue — accent-info
  {r:224,g:102,b:168}  // orchid pink, for extra iridescent variety
];
// Draws one wiggly ribbon per entry in `ribbons` — a gently sine-waving vertical
// line running the full height of the canvas — over a soft paper-to-lilac gradient.
// Used both for the page-wide backdrop and the full-screen curtain, with different
// density/opacity via `opts`.
function drawGlassStrandField(ctx,w,h,ribbons,opts){
  opts=opts||{};
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,opts.bgTop||'#FBF8F5');
  grad.addColorStop(1,opts.bgBottom||'#F3ECFB');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);
  const steps=opts.steps||64, alphaMul=opts.alphaMul||1, widthMul=opts.widthMul||1;
  ribbons.forEach(rb=>{
    const baseX=rb.xFrac*w;
    ctx.beginPath();
    for(let s=0;s<=steps;s++){
      const t=s/steps, y=t*h;
      const x=baseX+Math.sin(t*Math.PI*rb.freq*2+rb.phase)*rb.amp;
      if(s===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(${rb.hue.r},${rb.hue.g},${rb.hue.b},${Math.min(1,rb.alpha*alphaMul).toFixed(3)})`;
    ctx.lineWidth=rb.width*widthMul;
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.shadowColor=`rgba(${rb.hue.r},${rb.hue.g},${rb.hue.b},${Math.min(0.5,rb.alpha*alphaMul*1.6).toFixed(3)})`;
    ctx.shadowBlur=opts.glow!=null?opts.glow:7;
    ctx.stroke();
  });
  ctx.shadowBlur=0;
}
// A loose field of ribbon strands spread evenly across the width with a little
// jitter, randomized a bit each time so the page looks slightly different every
// time this theme is switched on — mirrors Halftone's generateHaloBlobs().
// `viewportW` scales each ribbon's own wiggle amplitude to how tightly packed the
// field is at this width, so a narrow phone screen gets fewer, calmer ribbons
// instead of the same dense desktop field squeezed into far less space.
function generateGlassRibbons(count,viewportW){
  const spacing=(viewportW||1280)/count;
  const maxAmp=Math.max(6,Math.min(34,spacing*0.85));
  const ribbons=[];
  for(let i=0;i<count;i++){
    ribbons.push({
      xFrac:(i+0.5)/count+(Math.random()-0.5)*(0.7/count),
      amp:maxAmp*0.4+Math.random()*maxAmp*0.6,
      freq:1.1+Math.random()*2.4,
      phase:Math.random()*Math.PI*2,
      width:1+Math.random()*2.2,
      hue:GLASS_HUES[Math.floor(Math.random()*GLASS_HUES.length)],
      alpha:0.08+Math.random()*0.16
    });
  }
  return ribbons;
}
// How many ribbons the page-wide backdrop gets at a given viewport width — about
// one every 24px, so the field reads the same way on a 380px phone as it does on a
// 1400px monitor, clamped so it never gets too sparse or too dense either way.
function glassBgRibbonCount(w){ return Math.max(16,Math.min(60,Math.round(w/24))); }
// The curtain wants a visibly denser field than the resting backdrop (it's only on
// screen for just over a second), about one ribbon every 17px.
function glassCurtainRibbonCount(w){ return Math.max(20,Math.min(80,Math.round(w/17))); }
function redrawGlassBackground(){
  const canvas=document.getElementById('glassBgCanvas');
  if(!canvas||!glassRibbons) return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=window.innerWidth, h=window.innerHeight;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawGlassStrandField(ctx,w,h,glassRibbons,{bgTop:'#FBF8F5',bgBottom:'#F0E5FA',glow:6});
}
function setupGlassBackground(){
  if(document.getElementById('glassBgLayer')) return; // already set up for this "session" of the theme
  const layer=document.createElement('div');
  layer.id='glassBgLayer';
  layer.setAttribute('aria-hidden','true');
  layer.style.cssText='position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;';
  const canvas=document.createElement('canvas');
  canvas.id='glassBgCanvas';
  canvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;';
  layer.appendChild(canvas);
  document.body.appendChild(layer);
  glassRibbons=generateGlassRibbons(glassBgRibbonCount(window.innerWidth),window.innerWidth);
  redrawGlassBackground();
  if(!glassResizeBound){
    let resizeT=null;
    window.addEventListener('resize',()=>{
      clearTimeout(resizeT);
      resizeT=setTimeout(()=>{
        if(document.getElementById('glassBgLayer')){
          // A full re-generate (not just a redraw) on resize, so rotating a phone or
          // dragging a window to a very different width re-fits the ribbon count and
          // amplitude to the new size rather than keeping whichever density the
          // theme happened to start at.
          glassRibbons=generateGlassRibbons(glassBgRibbonCount(window.innerWidth),window.innerWidth);
          redrawGlassBackground();
        }
      },150);
    });
    glassResizeBound=true;
  }
}
function teardownGlassBackground(){
  const layer=document.getElementById('glassBgLayer');
  if(layer) layer.remove();
  glassRibbons=null;
}
// The ribbon curtain: a densely-coloured wiggly-line field that wipes away
// left-to-right (see .glass-curtain / @keyframes glassCurtainOut in the CSS) the
// moment this theme first appears — on opening the ledger file if it's already the
// saved theme, or right when switching into it from Settings. Skips entirely under
// reduced-motion, since its un-animated resting state is a full-screen cover — it
// must never be left on screen without its wipe running.
function playGlassCurtain(){
  if(prefersReducedMotion()) return;
  const curtain=document.createElement('div');
  curtain.className='glass-curtain';
  curtain.setAttribute('aria-hidden','true');
  const canvas=document.createElement('canvas');
  curtain.appendChild(canvas);
  const sweep=document.createElement('div');
  sweep.className='glass-curtain-sweep';
  curtain.appendChild(sweep);
  document.body.appendChild(curtain);
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=window.innerWidth, h=window.innerHeight;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawGlassStrandField(ctx,w,h,generateGlassRibbons(glassCurtainRibbonCount(w),w),{bgTop:'#FBF8F5',bgBottom:'#EEE1FA',glow:9,alphaMul:2.4,widthMul:1.3});
  const remove=()=>{ if(curtain.parentNode) curtain.remove(); };
  curtain.addEventListener('animationend',remove);
  setTimeout(remove,2200); // safety net in case animationend never fires
}
// Called from render() when the active tab just changed while Glass is active —
// restarts the CSS reveal on #main (see .section-in / @keyframes glassMainIn).
function triggerGlassSectionTransition(main){
  if(prefersReducedMotion()) return;
  main.classList.remove('section-in');
  void main.offsetWidth; // force reflow so re-adding the class restarts the animation
  main.classList.add('section-in');
}
// A fixed, hand-composed set of wiggly ribbon "petals" radiating from a centre point
// — deterministic (no Math.random()) so the full-screen hero flower always blooms
// the same cozy shape, though it varies enough per petal (via its index) to read as
// organic rather than mechanical. Mirrors Halftone's hardcoded renderFsCloud blobs.
function buildGlassFlowerPetals(){
  const N=44, petals=[];
  for(let i=0;i<N;i++){
    petals.push({
      angle:(i/N)*Math.PI*2,
      len:0.30+0.20*(0.5+0.5*Math.sin(i*2.399963)),
      amp:0.05+0.035*Math.sin(i*1.7+1.1),
      freq:2.3+0.9*Math.sin(i*0.53),
      phase:i*0.9,
      width:2+2.2*Math.pow(Math.sin(i*0.77+0.4),2),
      hue:GLASS_HUES[i%GLASS_HUES.length],
      alpha:0.6+0.3*Math.sin(i*0.31+0.6)
    });
  }
  return petals;
}
function drawGlassFlower(ctx,w,h,petals,opts){
  opts=opts||{};
  const cx=w*(opts.cx!=null?opts.cx:0.5), cy=h*(opts.cy!=null?opts.cy:0.5);
  const R=Math.min(w,h)*(opts.scale!=null?opts.scale:0.46);
  const steps=opts.steps||40;
  petals.forEach(p=>{
    const pts=[];
    for(let s=0;s<=steps;s++){
      const t=s/steps, r=t*p.len*R;
      const wig=Math.sin(t*Math.PI*p.freq+p.phase)*p.amp*R*t;
      pts.push([cx+Math.cos(p.angle)*r-Math.sin(p.angle)*wig, cy+Math.sin(p.angle)*r+Math.cos(p.angle)*wig]);
    }
    ctx.beginPath();
    pts.forEach((pt,i)=>{ if(i===0) ctx.moveTo(pt[0],pt[1]); else ctx.lineTo(pt[0],pt[1]); });
    ctx.strokeStyle=`rgba(${p.hue.r},${p.hue.g},${p.hue.b},${p.alpha.toFixed(2)})`;
    ctx.lineWidth=p.width; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.shadowColor=`rgba(${p.hue.r},${p.hue.g},${p.hue.b},0.55)`;
    ctx.shadowBlur=opts.glow!=null?opts.glow:11;
    ctx.stroke();
    ctx.beginPath();
    pts.forEach((pt,i)=>{ if(i===0) ctx.moveTo(pt[0],pt[1]); else ctx.lineTo(pt[0],pt[1]); });
    ctx.strokeStyle=`rgba(255,255,255,${(p.alpha*0.35).toFixed(2)})`;
    ctx.lineWidth=Math.max(0.6,p.width*0.3); ctx.shadowBlur=0;
    ctx.stroke();
  });
}
// Paints the full-screen "cozy flower" hero art for the Glass theme onto its canvas.
// Must run after fsFxMarkup's canvas tag has actually been inserted into the DOM
// (innerHTML alone never executes a canvas's drawing — see the renderFullscreenTimer
// call sites).
function renderFsGlassFlower(){
  const canvas=document.getElementById('fsFlowerCanvas');
  if(!canvas) return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=canvas.clientWidth||window.innerWidth, h=canvas.clientHeight||window.innerHeight;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawGlassFlower(ctx,w,h,buildGlassFlowerPetals(),{cx:0.5,cy:0.5,scale:0.46,glow:12});
  // Re-paint (rather than just letting CSS stretch the old raster) if the window is
  // resized while the full-screen flower is still on screen — otherwise the petals
  // would warp non-uniformly since width/height rarely resize by the same ratio.
  if(!glassFsResizeBound){
    let fsResizeT=null;
    window.addEventListener('resize',()=>{
      clearTimeout(fsResizeT);
      fsResizeT=setTimeout(()=>{
        if(timerFullscreen && (state.settings.palette||'ledger')==='glass' && document.getElementById('fsFlowerCanvas')) renderFsGlassFlower();
      },150);
    });
    glassFsResizeBound=true;
  }
}

/* ============================= MODAL =============================
   Modals are plain innerHTML swaps (no <dialog> element, no per-modal JS), so the
   accessibility behaviors a real dialog gets for free — a labelled dialog role,
   focus moving in on open and back out on close, Tab staying inside while it's
   open, Escape closing it — are all handled centrally here instead of in each of
   the ~15 xModalHtml() functions that only ever produce the inner content. */
let modalReturnFocusEl=null;
function focusableIn(container){
  return Array.from(container.querySelectorAll('input, textarea, select, button, a[href], [tabindex]'))
    .filter(el=>!el.disabled && el.tabIndex!==-1 && el.offsetParent!==null);
}
function openModal(html){
  const root=document.getElementById('modalRoot');
  const wasAlreadyOpen=!!root.querySelector('.modal');
  // If a modal is refreshing itself in place (e.g. toggling a switch re-renders the
  // same modal), try to land focus back on the same field rather than jumping to the
  // top — otherwise remember what had focus on the page so it can be restored on close.
  const prevFocusedId=document.activeElement && document.activeElement.id;
  if(!wasAlreadyOpen) modalReturnFocusEl=document.activeElement;
  root.innerHTML=`<div class="modal-backdrop" data-action="close-modal"><div class="modal" data-action="noop" role="dialog" aria-modal="true" tabindex="-1"></div></div>`;
  const modalEl=root.querySelector('.modal');
  modalEl.innerHTML=html;
  const heading=modalEl.querySelector('h1,h2');
  if(heading){ if(!heading.id) heading.id='modalTitle'; modalEl.setAttribute('aria-labelledby', heading.id); }
  let toFocus=wasAlreadyOpen && prevFocusedId ? modalEl.querySelector('#'+CSS.escape(prevFocusedId)) : null;
  if(!toFocus) toFocus=modalEl.querySelector('input:not([type=hidden]), textarea, select, button, a[href], [tabindex]:not([tabindex="-1"])');
  (toFocus||modalEl).focus({preventScroll:true});
}
function closeModal(){
  document.getElementById('modalRoot').innerHTML='';
  pendingPhotoData=null; pendingLockedImport=null; stopWebcamStream(); viewingPhotoId=null;
  const toRestore=modalReturnFocusEl;
  modalReturnFocusEl=null;
  // Deferred: an action that closes a modal is almost always followed, in the same
  // synchronous call, by a full render() of the page underneath — restoring focus
  // has to wait until after that finishes or it'd just be wiped out again.
  setTimeout(()=>{
    if(toRestore && document.contains(toRestore) && typeof toRestore.focus==='function'){ toRestore.focus({preventScroll:true}); }
    else { const m=document.getElementById('main'); if(m) m.focus({preventScroll:true}); }
  },0);
}
document.addEventListener('keydown', (e)=>{
  const modalEl=document.querySelector('#modalRoot .modal');
  if(!modalEl) return;
  if(e.key==='Escape'){ e.preventDefault(); closeModal(); return; }
  if(e.key!=='Tab') return;
  const items=focusableIn(modalEl);
  if(!items.length) return;
  const first=items[0], last=items[items.length-1];
  if(e.shiftKey){
    if(document.activeElement===first || !modalEl.contains(document.activeElement)){ e.preventDefault(); last.focus(); }
  }else{
    if(document.activeElement===last || !modalEl.contains(document.activeElement)){ e.preventDefault(); first.focus(); }
  }
});
document.addEventListener('keydown', (e)=>{
  if(!viewingPhotoId) return;
  const tag=(document.activeElement && document.activeElement.tagName) || '';
  if(tag==='TEXTAREA' || tag==='INPUT') return; // don't hijack arrows while typing a note
  if(e.key==='ArrowLeft'){ e.preventDefault(); navigatePhoto(-1); }
  else if(e.key==='ArrowRight'){ e.preventDefault(); navigatePhoto(1); }
});
document.addEventListener('keydown', (e)=>{
  if(!timerFullscreen) return;
  if(e.key==='Escape'){ e.preventDefault(); closeTimerFullscreen(); }
});
/* Pressing Enter in a single-line field submits the nearest primary action, the way
   a real <form> would — this app has none, since every action is dispatched through
   the data-action click-delegation below. Relies on two conventions that hold
   everywhere in this file: inside a modal, the actionable button is always the LAST
   one in .modalactions (Cancel/Delete come first); outside a modal, a field's own
   .card has exactly one .btn.primary, which is the thing Enter should trigger. */
const ENTER_SUBMIT_TYPES=new Set(['text','password','email','tel','url','search','number','date','time','datetime-local','month','week']);
document.addEventListener('keydown', function(e){
  if(e.key!=='Enter' || e.isComposing) return;
  const t=e.target;
  if(!(t instanceof HTMLInputElement) || !ENTER_SUBMIT_TYPES.has(t.type)) return;
  const modalEl=t.closest('.modal');
  let target=null;
  if(modalEl){
    const actions=modalEl.querySelectorAll('.modalactions .btn');
    target=actions[actions.length-1]||null;
  }else{
    const card=t.closest('.card');
    if(card) target=card.querySelector('.btn.primary');
  }
  if(target && !target.disabled){ e.preventDefault(); target.click(); }
});
/* Enter/Space activation for the custom controls below that aren't native buttons
   (color swatches, toggle switches, calendar cells, photo tiles, etc.) — anything
   given role+tabindex to make it focusable needs this to make it operable too. */
document.body.addEventListener('keydown', function(e){
  if(e.key!==' ' && e.key!=='Spacebar' && e.key!=='Enter') return;
  const el=e.target.closest('[role][tabindex]');
  if(!el) return;
  const tag=el.tagName;
  if(tag==='BUTTON' || tag==='A' || tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
  e.preventDefault();
  el.click();
});

/* ============================= RENDER DISPATCH ============================= */
function render(){
  buildNav();
  applyTheme();
  updateSyncBtnLabel();
  const main=document.getElementById('main');
  // Only a genuine tab switch (not e.g. a data refresh while staying put) should replay
  // the halftone reveal — and not the very first render, which the entrance curtain
  // already covers. lastRenderedTab starts null, so this is false on that first call.
  const tabChanged=(lastRenderedTab!==null && lastRenderedTab!==activeTab);
  if(activeTab==='today') main.innerHTML=renderToday();
  else if(activeTab==='schedule') main.innerHTML=renderSchedule();
  else if(activeTab==='homework') main.innerHTML=renderHomework();
  else if(activeTab==='questions') main.innerHTML=renderQuestions();
  else if(activeTab==='timer') main.innerHTML=renderTimer();
  else if(activeTab==='log') main.innerHTML=renderLog();
  else if(activeTab==='photos') main.innerHTML=renderPhotos();
  else if(activeTab==='stats') main.innerHTML=renderStats();
  else if(activeTab==='subjects') main.innerHTML=renderSubjects();
  else if(activeTab==='settings') main.innerHTML=renderSettings();
  if(tabChanged){
    const activePalette=state.settings.palette||'ledger';
    if(activePalette==='halftone') triggerHalftoneSectionTransition(main);
    else if(activePalette==='glass') triggerGlassSectionTransition(main);
  }
  lastRenderedTab=activeTab;
  updateLiveSessionBadge();
  updateStopwatchDisplays();
  if(timerFullscreen) renderFullscreenTimer();
}

function computeStreak(){
  const logDates=new Set(state.studyLogs.map(l=>l.date));
  let streak=0;
  let cursor=todayISO();
  if(!logDates.has(cursor)){ cursor=addDaysISO(cursor,-1); }
  while(logDates.has(cursor)){ streak++; cursor=addDaysISO(cursor,-1); }
  return streak;
}
function renderToday(){
  const dIdx=todayDayIdx();
  const todayISOv=todayISO();
  const blocks=state.scheduleBlocks.filter(b=>(b.recurring!==false && b.day===dIdx) || (b.recurring===false && b.date===todayISOv)).sort((a,b)=>a.start.localeCompare(b.start));
  const reminderDays=state.settings.reminderDaysBefore;
  const dueSoon=state.homework.filter(h=>h.status!=='done').map(h=>({...h,daysLeft:(new Date(h.dueDate)-new Date(todayISOv))/86400000}))
    .filter(h=>h.daysLeft<=reminderDays).sort((a,b)=>a.daysLeft-b.daysLeft);
  const streak=computeStreak();
  const tallyGroups=[];
  for(let i=0;i<streak;i+=5){ tallyGroups.push(Math.min(5,streak-i)); }

  return `
  <div class="pagehead">
    <div><h1>${new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}</h1>
    <div class="sub">Here's what's on your plate today.</div></div>

      <div class="card">

        ${blocks.length? blocks.map(b=>{const s=subj(b.subjectId);return `<div class="schedrow"><span class="dot" style="background:${s?s.color:'#999'}"></span><span class="schedtime mono">${b.start}–${b.end}</span><span class="schedlabel">${esc(b.label||(s?s.name:'Study'))}</span></div>`}).join('') : '<div class="empty">Nothing scheduled today. Add a block from the Schedule tab.</div>'}
      </div>
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;">Due soon</h3>
        ${dueSoon.length? dueSoon.map(h=>{const s=subj(h.subjectId);const overdue=h.daysLeft<0;return `<div class="duerow"><span class="duedate mono" style="background:${overdue?'var(--accent-due-soft)':'var(--accent-gold-soft)'};color:${overdue?'var(--accent-due)':'var(--accent-gold)'}">${overdue?'overdue':fmtDate(h.dueDate)}</span><span class="dot" style="background:${s?s.color:'#999'}"></span><span style="font-size:13.5px;font-weight:500;">${esc(h.title)}</span></div>`}).join('') : '<div class="empty">Nothing due in the next '+reminderDays+" days. You're clear.</div>"}
      </div>
    </div>
    <div>
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;">Study streak</h3>
        <div class="streakrow">
          <div class="streaknum">${streak}</div>
          <div style="font-size:12.5px;color:var(--ink-soft);">day${streak===1?'':'s'} in a row<br>logging study time</div>
        </div>
        <div class="tally" style="margin-top:12px;">
          ${tallyGroups.length? tallyGroups.map(n=>renderTallyGroup(n)).join('') : '<span style="font-size:12px;color:var(--ink-soft);">Log a session today to start your streak.</span>'}
        </div>
      </div>
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;">Quick start</h3>
        ${state.activeSession? renderQuickStartActive() : renderQuickStartIdle()}

}

/* ============================= SCHEDULE VIEW ============================= */
function rowLine(t){
  const [h,m]=t.split(':').map(Number);
  return h*2 + (m>=30?1:0) + 2;
}
function renderSchedule(){
  const rangeLabel=fmtDate(scheduleWeekStart)+' – '+fmtDate(addDaysISO(scheduleWeekStart,6));
  const isCurrentWeek=scheduleWeekStart===mondayOfWeek(todayISO());
  return `
  <div class="pagehead">
    <div><h1>Schedule</h1><div class="sub">${rangeLabel}${isCurrentWeek?' · This week':''}</div></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn small" data-action="week-prev">← Prev</button>
      ${isCurrentWeek?'':'<button class="btn small" data-action="week-today">This week</button>'}
      <button class="btn small" data-action="week-next">Next →</button>
      <div class="viewtoggle">
        <button class="${scheduleViewMode==='week'?'active':''}" data-action="sched-view" data-mode="week" aria-pressed="${scheduleViewMode==='week'}">Week</button>
        <button class="${scheduleViewMode==='list'?'active':''}" data-action="sched-view" data-mode="list" aria-pressed="${scheduleViewMode==='list'}">List</button>
      </div>
      <button class="btn primary" data-action="add-block">+ Add block</button>
    </div>
  </div>
  ${scheduleViewMode==='week'?renderWeekGrid():renderScheduleList()}
  `;
}
function blocksOnDate(day,date){
  return state.scheduleBlocks.filter(b=>(b.recurring!==false && b.day===day) || (b.recurring===false && b.date===date));
}
function renderWeekGrid(){
  const hours=[]; for(let h=0;h<=23;h++) hours.push(h);
  let cellsHtml='';
  for(let slot=0;slot<48;slot++){
    const h=Math.floor(slot/2), m=(slot%2)*30;
    const isHour=m===0;
    for(let day=0;day<7;day++){
      cellsHtml+=`<div class="wg-cell${isHour?' hourline':''}" style="grid-row:${slot+2};grid-column:${day+2};" data-action="add-block" data-day="${day}" data-start="${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}" aria-hidden="true"></div>`;
    }
  }
  const todayStr=todayISO();
  let labelsHtml='<div class="wg-corner"></div>';
  DAY_NAMES.forEach((d,i)=>{
    const date=addDaysISO(scheduleWeekStart,i);
    const isToday=date===todayStr;
    labelsHtml+=`<div class="wg-daylabel${isToday?' wg-today':''}">${d}<div class="wg-datenum mono">${new Date(date+'T00:00:00').getDate()}</div></div>`;
  });
  let timeLabels='';
  hours.forEach(h=>{
    timeLabels+=`<div class="wg-timelabel${h===0?' wg-timelabel-first':''}" style="grid-row:${rowLine(String(h).padStart(2,'0')+':00')};grid-column:1;">${h}:00</div>`;
  });
  let blocksHtml='';
  for(let day=0;day<7;day++){
    const date=addDaysISO(scheduleWeekStart,day);
    blocksOnDate(day,date).forEach(b=>{
      const s=subj(b.subjectId);
      const r1=rowLine(b.start), r2=rowLine(b.end);
      blocksHtml+=`<div class="wg-block" style="grid-row:${r1} / ${r2};grid-column:${day+2};background:${s?s.color:'#888'};" data-action="edit-block" data-id="${b.id}" role="button" tabindex="0" aria-label="Edit block: ${esc(b.label||(s?s.name:'Study'))}, ${b.start} to ${b.end}"><span class="t">${b.start}–${b.end}${b.recurring===false?' · one-off':''}</span>${esc(b.label||(s?s.name:''))}</div>`;
    });
  }
  return `<div class="weekwrap"><div class="weekgrid" style="grid-template-rows:32px repeat(48,18px);">
    ${labelsHtml}${timeLabels}${cellsHtml}${blocksHtml}
  </div></div>
  <div style="font-size:11.5px;color:var(--ink-soft);margin-top:8px;">Click an empty slot to add a block, or click a block to edit it. Using a keyboard or screen reader? The List view and the + Add block button above give you the same actions.</div>`;
}
function renderScheduleList(){
  let html='';
  const todayStr=todayISO();
  for(let idx=0;idx<7;idx++){
    const date=addDaysISO(scheduleWeekStart,idx);
    const blocks=blocksOnDate(idx,date).sort((a,b)=>a.start.localeCompare(b.start));
    const isToday=date===todayStr;
    html+=`<div class="listday"><h3>${DAY_NAMES_FULL[idx]} · ${fmtDate(date)}${isToday?' · Today':''}</h3><div class="card">`;
    html+= blocks.length? blocks.map(b=>{const s=subj(b.subjectId);return `<div class="schedrow" style="cursor:pointer;" data-action="edit-block" data-id="${b.id}" role="button" tabindex="0" aria-label="Edit block: ${esc(b.label||(s?s.name:'Study'))}, ${b.start} to ${b.end}"><span class="dot" style="background:${s?s.color:'#999'}"></span><span class="schedtime mono">${b.start}–${b.end}</span><span class="schedlabel">${esc(b.label||(s?s.name:'Study'))}${b.recurring===false?' <span style="color:var(--ink-soft);font-weight:400;">(one-off)</span>':''}</span></div>`}).join('') : '<div class="empty">No blocks</div>';
    html+='</div></div>';
  }
  return html;
}

function timeOptions(){
  const out=[];
  for(let h=0;h<=23;h++){ out.push(String(h).padStart(2,'0')+':00'); out.push(String(h).padStart(2,'0')+':30'); }

function addOneHour(t){
  const [h,m]=t.split(':').map(Number);
  let nm=m+60, nh=h; if(nm>=60){nh+=Math.floor(nm/60); nm=nm%60;}
  return String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
}

/* ============================= QUESTIONS VIEW =============================
   A running, undated-by-design capture list: jot down a question the moment it
   comes up, tag it to a subject, and come back to answer it whenever. Grouped
   by the day it was captured, newest first — there's deliberately no due date
   here, unlike Homework. */
let qFilters={subject:'all',status:'all'};
function fmtGroupDate(iso){
  if(iso===todayISO()) return 'Today';
  if(iso===addDaysISO(todayISO(),-1)) return 'Yesterday';
  const d=new Date(iso+'T00:00:00');
  const sameYear=d.getFullYear()===new Date().getFullYear();
  return d.toLocaleDateString(undefined, sameYear?{weekday:'long',month:'long',day:'numeric'}:{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function renderQuestions(){
  let items=state.questions.slice();
  if(qFilters.subject!=='all') items=items.filter(q=>q.subjectId===qFilters.subject);
  if(qFilters.status==='open') items=items.filter(q=>!q.answered);
  else if(qFilters.status==='answered') items=items.filter(q=>q.answered);
  items.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));

  const groups=[];
  items.forEach(q=>{
    let g=groups.find(g=>g.date===q.date);
    if(!g){ g={date:q.date, items:[]}; groups.push(g); }
    g.items.push(q);
  });
  groups.sort((a,b)=>b.date.localeCompare(a.date));

  const openCount=state.questions.filter(q=>!q.answered).length;
  return `
  <div class="pagehead">
    <div><h1>Questions</h1><div class="sub">${openCount} question${openCount===1?'':'s'} waiting on an answer.</div></div>
    <button class="btn primary" data-action="add-question">+ Add question</button>
  </div>
  <div class="filterbar">
    <select data-action="filter-q" data-key="subject" aria-label="Filter by subject"><option value="all">All subjects</option>${state.subjects.map(s=>`<option value="${s.id}" ${qFilters.subject===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select>
    <select data-action="filter-q" data-key="status" aria-label="Filter by status"><option value="all">All</option><option value="open" ${qFilters.status==='open'?'selected':''}>Unanswered</option><option value="answered" ${qFilters.status==='answered'?'selected':''}>Answered</option></select>
  </div>
  ${groups.length? groups.map(g=>`
    <h3 style="margin:18px 0 10px;font-size:12.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;">${fmtGroupDate(g.date)}</h3>
    ${g.items.map(q=>renderQuestionCard(q)).join('')}
  `).join('') : '<div class="empty">Nothing jotted down yet. Add a question whenever one comes up — no due date needed.</div>'}
  `;
}

function tickTimer(){
  if(timer.remaining>0){
    timer.remaining--;
    if(activeTab==='timer') updateTimerDisplayOnly();
  }else{
    if(timer.mode==='work'){
      const minutes=timerPhaseElapsedMs()/60000;
      logStudy(timer.subjectId, minutes, 'timer', timer.topic||'');
      timer.cyclesDone++;
      timer.mode='break';
      timer.remaining=state.settings.pomodoroBreak*60;
      timer.elapsedMs=0; timer.phaseStartedAt=Date.now();
      toast('Focus session complete — logged '+Math.round(minutes)+' min. Break started.');
    }else{
      timer.mode='work';
      timer.remaining=state.settings.pomodoroWork*60;
      timer.elapsedMs=0; timer.phaseStartedAt=Date.now();
      toast('Break over — ready for another session.');
    }
    if(activeTab==='timer') render();
  }
}
function updateTimerDisplayOnly(){
  const mins=Math.floor(timer.remaining/60), secs=timer.remaining%60;
  const text=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  document.querySelectorAll('.timerdisplay').forEach(el=>el.textContent=text);
  updateFsProgress();
}
/* Keeps the full-screen ring / sunset sun in sync each tick without a full re-render */
function updateFsProgress(){
  if(!timerFullscreen || timerMode!=='pomodoro') return;
  const total=(timer.mode==='work'?state.settings.pomodoroWork:state.settings.pomodoroBreak)*60;
  const frac=total>0?Math.min(1,Math.max(0,1-(timer.remaining/total))):0;
  const ring=document.getElementById('fsRingFg');
  if(ring){
    const r=90, c=2*Math.PI*r;
    ring.style.strokeDashoffset=String(c*(1-frac));
  }
  const sun=document.getElementById('fsSun');
  if(sun){
    const pct = timer.mode==='work' ? (10+frac*55) : (65-frac*55);
    sun.style.top=pct+'%';
  }
}
function logStudy(subjectId,minutes,source,note){
  if(!subjectId || minutes<=0) return;
  state.studyLogs.push({id:uid(),subjectId,date:todayISO(),minutes:Math.round(minutes),note:note||'',source:source||'manual'});
  scheduleSave();
}

function buildPixelEyeGrid(open){
  const W=15,H=9,cx=7,cy=4;
  let out='';
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      let cls='';
      if(open){
        const sclera=((x-cx)/6.5)**2+((y-cy)/3.6)**2;
        const iris=((x-cx)/2.7)**2+((y-cy)/2.7)**2;
        const pupil=((x-cx)/1.15)**2+((y-cy)/1.15)**2;
        if(sclera<=1){
          if(pupil<=1) cls=(x===cx-1&&y===cy)?'g':'p';
          else if(iris<=1) cls='i';
          else cls='s';
        }
      } else {
        const span=6.3-Math.abs(y-cy)*2.6;
        if(y===cy && Math.abs(x-cx)<=6) cls='l';
        else if((y===cy-1||y===cy+1) && Math.abs(x-cx)<=span) cls='ls';
      }
      out += cls ? `<i class="${cls}"></i>` : `<i></i>`;
    }
  }
  return out;
}
function fsFxMarkup(palette, frac){
  frac = frac || 0;
  if(palette==='neon'){
    return `<div class="fs-fx"><div class="fs-beam"></div></div>`;
  }
  if(palette==='aurora'){
    let stars='';
    for(let i=0;i<26;i++){
      const size=(1+Math.random()*2).toFixed(1);
      stars+=`<div class="fs-star" style="width:${size}px;height:${size}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*70).toFixed(1)}%;animation-duration:${(2+Math.random()*3).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;"></div>`;
    }
    return `<div class="fs-fx">${stars}</div>`;
  }
  if(palette==='sakura'){
    let petals='';
    for(let i=0;i<16;i++){
      petals+=`<div class="fs-petal" style="left:${(Math.random()*100).toFixed(1)}vw;animation-duration:${(8+Math.random()*7).toFixed(1)}s;animation-delay:${(Math.random()*10).toFixed(1)}s;opacity:${(0.5+Math.random()*0.4).toFixed(2)};transform:scale(${(0.6+Math.random()*0.9).toFixed(2)});"></div>`;
    }
    return `<div class="fs-fx">${petals}</div>`;
  }
  if(palette==='sunset'){
    const workMode = timerMode!=='pomodoro' || timer.mode==='work';
    const pct = workMode ? (10+frac*55) : (65-frac*55);
    return `<div class="fs-fx"><div class="fs-sun" id="fsSun" style="top:${pct}%;"></div><div class="fs-horizon"></div></div>`;
  }
  if(palette==='mint'){
    let leaves='';
    const glyphs=['🌿','🍃'];
    for(let i=0;i<10;i++){
      leaves+=`<div class="fs-leaf" style="left:${(Math.random()*94).toFixed(1)}%;top:${(Math.random()*80).toFixed(1)}%;animation-duration:${(4+Math.random()*3).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;">${glyphs[i%2]}</div>`;
    }
    return `<div class="fs-fx">${leaves}<div class="fs-breathe" style="width:260px;height:260px;left:50%;top:50%;margin:-130px 0 0 -130px;"></div></div>`;
  }
  if(palette==='lavender'){
    let motes='';
    for(let i=0;i<18;i++){
      const size=(2+Math.random()*3).toFixed(1);
      motes+=`<div class="fs-mote" style="width:${size}px;height:${size}px;left:${(Math.random()*100).toFixed(1)}%;top:${(40+Math.random()*55).toFixed(1)}%;animation-duration:${(9+Math.random()*6).toFixed(1)}s;animation-delay:${(Math.random()*9).toFixed(1)}s;"></div>`;
    }
    return `<div class="fs-fx">${motes}<div class="fs-breathe" style="width:280px;height:280px;left:50%;top:50%;margin:-140px 0 0 -140px;"></div></div>`;
  }
  if(palette==='diagnostic'){
    const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    let cells='';
    for(let i=0;i<36;i++){
      const ch=letters[Math.floor(Math.random()*letters.length)];
      const hit=Math.random()<0.14;
      cells+=`<span class="fs-gridcell${hit?' hit':''}">${ch}</span>`;
    }
    return `<div class="fs-fx">
      <div class="fs-scan"></div>
      <div class="fs-eyewrap">
        <div class="fs-eye-frame open">${buildPixelEyeGrid(true)}</div>
        <div class="fs-eye-frame closed">${buildPixelEyeGrid(false)}</div>
      </div>
      <div class="fs-lettergrid">${cells}</div>
    </div>`;
  }
  if(palette==='halftone'){
    // The cloud itself is painted onto this canvas by renderFsCloud(), called right
    // after this markup is inserted into the DOM (a plain <canvas> tag paints nothing
    // on its own). Twinkle dots are cheap DOM/CSS and can be generated right here.
    let twinkles='';
    for(let i=0;i<14;i++){
      const size=(1.5+Math.random()*2.2).toFixed(1);
      const warm=Math.random()<0.35;
      twinkles+=`<div class="fs-twinkle${warm?' warm':''}" style="width:${size}px;height:${size}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*46).toFixed(1)}%;animation-duration:${(2.5+Math.random()*3).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;"></div>`;
    }
    return `<div class="fs-fx"><canvas class="fs-cloud-canvas" id="fsCloudCanvas" aria-hidden="true"></canvas>${twinkles}</div>`;
  }
  if(palette==='glass'){
    // The flower itself is painted onto this canvas by renderFsGlassFlower(), called
    // right after this markup is inserted into the DOM (a plain <canvas> tag paints
    // nothing on its own). Glints are cheap DOM/CSS and can be generated right here.
    let glints='';
    const hueCls=['v','c','g','s'];
    for(let i=0;i<16;i++){
      const size=(2+Math.random()*3).toFixed(1);
      const cls=hueCls[Math.floor(Math.random()*hueCls.length)];
      glints+=`<div class="fs-glint ${cls}" style="width:${size}px;height:${size}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;animation-duration:${(2.6+Math.random()*3.2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;"></div>`;
    }
    return `<div class="fs-fx"><canvas class="fs-flower-canvas" id="fsFlowerCanvas" aria-hidden="true"></canvas>${glints}</div>`;
  }
  return `<div class="fs-fx"></div>`; // ledger + terminal use pseudo-element glows only
}
// Paints the full-screen "cozy cloud" hero art for the halftone theme — a bigger, more
// central cloud cluster than the page background gets, same dot-field technique. Must
// run after fsFxMarkup's canvas tag has actually been inserted into the DOM (innerHTML
// alone never executes a canvas's drawing — see the renderFullscreenTimer call sites).
function renderFsCloud(){
  const canvas=document.getElementById('fsCloudCanvas');
  if(!canvas) return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=canvas.clientWidth||window.innerWidth, h=canvas.clientHeight||window.innerHeight;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const blobs=[
    {x:0.5,y:0.46,r:0.30,sx:1,sy:0.72},
    {x:0.33,y:0.58,r:0.22,sx:1,sy:0.85},
    {x:0.69,y:0.56,r:0.24,sx:1,sy:0.8},
    {x:0.5,y:0.67,r:0.32,sx:1.25,sy:0.58},
    {x:0.41,y:0.4,r:0.14,sx:1,sy:1},
    {x:0.6,y:0.38,r:0.13,sx:1,sy:1}
  ];
  drawHalftoneField(ctx,w,h,blobs,{
    cell:9, skyTop:'#0A1524', skyBottom:'#1C3255',
    skyDot:'rgba(87,198,224,0.55)', cloudDot:'rgba(238,246,253,0.95)', warmDot:'rgba(247,199,109,0.85)'
  });
}

/* ============================= PHOTOS ============================= */
/* Photos live in their own small file, separate from the main ledger data.
   This keeps everyday edits (schedule, homework, logs) fast, since saving
   them never has to rewrite accumulated photo bytes — and it lets photos
   be saved at better quality since their file is only rewritten when a
   photo actually changes, not on every unrelated edit. */
function estimatePhotosBytes(photos){
  // base64 encodes 3 bytes as 4 chars, so bytes ≈ length * 0.75. Good enough for a rough readout.
  return (photos||[]).reduce((sum,p)=> sum + (p.dataUrl?Math.round(p.dataUrl.length*0.75):0), 0);
}
function fmtBytes(bytes){
  if(bytes<1024) return bytes+' B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(0)+' KB';
  return (bytes/(1024*1024)).toFixed(bytes<10*1024*1024?1:0)+' MB';
}
function defaultPhotoState(){ return {version:1, photos:[]}; }
function migratePhotoState(s){ s.version=s.version||1; s.photos=s.photos||[]; return s; }
function photosLinked(){ return photoState!==null; }
function getPhotosArray(){
  if(photoLockedRaw) return []; // locked, password not entered yet this session — never expose anything
  return photosLinked() ? photoState.photos : (state.photos||[]);
}
function markPhotosDirty(){ if(photosLinked()) schedulePhotoSave(); else scheduleSave(); }

/* ---- Password-lock (client-side encryption) ----
   A locked photos file on disk looks like:
     {version:2, locked:true, kdf:'PBKDF2', hash:'SHA-256', iterations, salt, iv, ciphertext}
   `salt` and `iv` are base64, not secret — they just make the key/cipher unique per file/save.
   `ciphertext` is the AES-256-GCM encryption of {photos:[...]}, keyed from the password via PBKDF2.
   Nothing here is decryptable without the password — not by opening the file in a text editor,
   not by inspecting it on disk, and not by this app itself unless it's been unlocked this session. */
const PHOTO_LOCK_ITERATIONS=600000;
function isLockedPhotoFile(parsed){
  return !!(parsed && parsed.locked===true && typeof parsed.ciphertext==='string' && typeof parsed.salt==='string' && typeof parsed.iv==='string');
}
function bufToB64(buf){
  const bytes=buf instanceof Uint8Array?buf:new Uint8Array(buf);
  let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}
function b64ToBuf(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}
async function deriveLockKey(password, saltBytes, iterations){
  const enc=new TextEncoder();
  const baseKey=await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:saltBytes, iterations:iterations||PHOTO_LOCK_ITERATIONS, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
}
async function unlockPhotosWithPassword(password){
  const raw=photoLockedRaw;
  if(!raw) return false;
  try{
    const salt=b64ToBuf(raw.salt), iv=b64ToBuf(raw.iv);
    const key=await deriveLockKey(password, salt, raw.iterations);
    const ptBuf=await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, b64ToBuf(raw.ciphertext));
    const parsed=JSON.parse(new TextDecoder().decode(ptBuf));
    photoState={version:2, locked:true, photos:parsed.photos||[]};
    photoLockKey=key;
    photoLockMeta={saltB64:raw.salt, iterations:raw.iterations};
    photoLockLastWrapper=raw;
    photoLockedRaw=null;
    return true;
  }catch(err){ return false; } // wrong password → GCM auth failure, or a corrupt file
}
// Like unlockPhotosWithPassword, but for a one-off wrapper being imported from elsewhere rather
// than the session's own locked file — doesn't touch photoLockKey/photoLockMeta/photoLockedRaw,
// so the destination's own lock (and password) is left completely alone either way.
async function decryptPhotoWrapper(wrapper, password){
  try{
    const salt=b64ToBuf(wrapper.salt), iv=b64ToBuf(wrapper.iv);
    const key=await deriveLockKey(password, salt, wrapper.iterations);
    const ptBuf=await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, b64ToBuf(wrapper.ciphertext));
    const parsed=JSON.parse(new TextDecoder().decode(ptBuf));
    return Array.isArray(parsed.photos) ? parsed.photos : [];
  }catch(err){ return null; } // wrong password, or a corrupt/foreign file
}
async function verifyLockPassword(password){
  if(!photoLockLastWrapper) return false;
  try{
    const salt=b64ToBuf(photoLockLastWrapper.salt), iv=b64ToBuf(photoLockLastWrapper.iv);
    const key=await deriveLockKey(password, salt, photoLockLastWrapper.iterations);
    await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, b64ToBuf(photoLockLastWrapper.ciphertext));
    return true;
  }catch(err){ return false; }
}
async function lockPhotosWithPassword(password){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  photoLockKey=await deriveLockKey(password, salt, PHOTO_LOCK_ITERATIONS);
  photoLockMeta={saltB64:bufToB64(salt), iterations:PHOTO_LOCK_ITERATIONS};
  photoState.locked=true; photoState.version=2;
  await savePhotoFile(false);
}
async function changeLockPassword(newPassword){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  photoLockKey=await deriveLockKey(newPassword, salt, PHOTO_LOCK_ITERATIONS);
  photoLockMeta={saltB64:bufToB64(salt), iterations:PHOTO_LOCK_ITERATIONS};
  await savePhotoFile(false);
}
async function removeLockPassword(){
  photoState.locked=false;
  photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
  await savePhotoFile(false);
}
// Re-locks without closing the app: forces a fresh save first (so nothing
// unsaved gets left behind — important on browsers without a persistent file
// handle, where "save" just means "download a fresh copy"), then drops the
// decrypted copy and key from memory. The password is required again to view
// photos after this, same as if the app had been closed and reopened.
async function relockPhotosNow(){
  if(!photoState || !photoState.locked || !photoLockKey) return;
  await savePhotoFile(false);
  photoLockedRaw=photoLockLastWrapper;
  photoState=null;
  photoLockKey=null;
  toast('Photos locked.');
  render();
}
async function serializePhotoStateForDisk(){
  if(photoState && photoState.locked && photoLockKey){
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const plaintext=new TextEncoder().encode(JSON.stringify({photos:photoState.photos}));
    const ctBuf=await crypto.subtle.encrypt({name:'AES-GCM', iv}, photoLockKey, plaintext);
    const wrapper={
      version:2, locked:true, kdf:'PBKDF2', hash:'SHA-256',
      iterations:photoLockMeta.iterations, salt:photoLockMeta.saltB64,
      iv:bufToB64(iv), ciphertext:bufToB64(ctBuf)
    };
    photoLockLastWrapper=wrapper;
    return JSON.stringify(wrapper, null, 2);
  }
  return JSON.stringify(photoState, null, 2);
}

let photoSaveTimeout=null;
async function writePhotoStateToHandle(handle){
  const text=await serializePhotoStateForDisk();
  const writable=await handle.createWritable();
  await writable.write(text);
  await writable.close();
}
async function downloadPhotoFile(){
  const text=await serializePhotoStateForDisk();
  const blob=new Blob([text],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='ledger-photos.json'; a.click();
  URL.revokeObjectURL(url);
}
async function savePhotoFile(auto){
  if(!photoState) return;
  if(photoFileHandle){
    try{ await writePhotoStateToHandle(photoFileHandle); }
    catch(err){ if(!auto) toast('Could not save photos: '+err.message); }
  }else{
    if(!auto) await downloadPhotoFile();
  }
}
function schedulePhotoSave(){
  clearTimeout(photoSaveTimeout);
  photoSaveTimeout=setTimeout(()=>savePhotoFile(true),500);
}
async function linkPhotoFile(mode){
  try{
    if(supportsFSAccess){
      if(mode==='open'){
        const [handle]=await window.showOpenFilePicker({types:[{description:'Ledger photos',accept:{'application/json':['.json']}}]});
        const file=await handle.getFile();
        const text=await file.text();
        const parsed=JSON.parse(text);
        if(isLockedPhotoFile(parsed)){
          photoLockedRaw=parsed; photoLockLastWrapper=parsed; photoState=null;
          photoLockKey=null; photoLockMeta=null;
        }else{
          photoState=migratePhotoState(parsed);
          photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
        }
        photoFileHandle=handle;
      }else{
        const handle=await window.showSaveFilePicker({suggestedName:'ledger-photos.json',types:[{description:'Ledger photos',accept:{'application/json':['.json']}}]});
        photoState=defaultPhotoState();
        photoFileHandle=handle;
        photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
        await writePhotoStateToHandle(handle);
      }
    }else{
      if(mode==='open'){ document.getElementById('photoFileInput').click(); return; }
      photoState=defaultPhotoState();
      photoFileHandle=null;
      photoLockedRaw=null; photoLockKey=null; photoLockMeta=null; photoLockLastWrapper=null;
    }
    render();
  }catch(err){ if(err.name!=='AbortError') toast(err.message); }
}
// Shared by migrateLegacyPhotos and finishPendingLegacyMigration: folds a batch of
// already-valid photo objects into photoState.photos, skipping any whose image data
// (dataUrl) already exists there. Without this, linking a photo file that already
// contains some of these photos (e.g. it's the real main file, and the "legacy" copies
// got there via an earlier import) would duplicate every one of them.
function mergeLegacyIntoPhotoState(legacy){
  const existingUrls=new Set(photoState.photos.map(p=>p.dataUrl));
  let added=0, skipped=0;
  (legacy||[]).forEach(p=>{
    if(!p || !p.dataUrl || existingUrls.has(p.dataUrl)){ skipped++; return; }
    photoState.photos.push(p);
    existingUrls.add(p.dataUrl);
    added++;
  });
  return {added, skipped};
}
function legacyMoveToast(added, skipped){
  return skipped>0
    ? `Moved ${added} photo${added===1?'':'s'} to a separate file (${skipped} already there, skipped).`
    : 'Photos moved to a separate file.';
}
// One-off cleanup for duplicates that already made it in — e.g. from linking a photo file
// that already had some of the same photos in it before this was fixed to dedupe automatically.
// Keeps the first copy of each exact image and removes any later exact matches.
function dedupePhotosNow(){
  if(photoLockedRaw){ toast('Unlock your photos first.'); return; }
  const arr=getPhotosArray();
  const seen=new Set();
  const toRemove=[];
  arr.forEach((p,i)=>{
    if(!p || !p.dataUrl) return;
    if(seen.has(p.dataUrl)) toRemove.push(i);
    else seen.add(p.dataUrl);
  });
  for(let i=toRemove.length-1;i>=0;i--) arr.splice(toRemove[i],1);
  if(toRemove.length>0){ markPhotosDirty(); render(); toast(`Removed ${toRemove.length} duplicate photo${toRemove.length===1?'':'s'}.`); }
  else toast('No duplicate photos found.');
}

/* ============================= IMPORT PHOTOS FROM ANOTHER FILE ============================= */
// Covers the "photos taken on another device" case: someone opens the app fresh
// elsewhere (a new ledger or a new photos file), takes some photos, and sends that
// JSON file over. This pulls any photos out of it into the currently active photo
// store here, then tries to clear the source file so a stray copy isn't left behind.
async function importPhotosFlow(){
  if(supportsFSAccess){
    try{
      const [handle]=await window.showOpenFilePicker({types:[{description:'Ledger or photos file',accept:{'application/json':['.json']}}]});
      if(photoFileHandle){
        try{ if(await handle.isSameEntry(photoFileHandle)){ toast('That’s already your linked photos file.'); return; } }catch(e){}
      }
      if(fileHandle){
        try{ if(await handle.isSameEntry(fileHandle)){ toast('That’s already your current ledger file.'); return; } }catch(e){}
      }
      const file=await handle.getFile();
      const text=await file.text();
      const parsed=JSON.parse(text);
      await handleImportedPhotoJSON(parsed, handle, handle.name);
    }catch(err){
      if(err.name!=='AbortError') toast('Could not read that file: '+err.message);
    }
  }else{
    document.getElementById('importPhotosInput').click();
  }
}
async function handleImportedPhotoJSON(parsed, sourceHandle, sourceName){
  if(isLockedPhotoFile(parsed)){
    // Ask for *that file's* password right away instead of bouncing the person off to link it
    // and unlock it first — decrypt it here, then fold its photos into whichever photo store is
    // already active, which keeps its own password (or lack of one) exactly as it was.
    pendingLockedImport={parsed, sourceHandle, sourceName};
    openModal(importPhotoUnlockModalHtml(sourceName));
    return;
  }
  let candidates=null;
  if(parsed && Array.isArray(parsed.photos)) candidates=parsed.photos;
  else if(Array.isArray(parsed)) candidates=parsed;
  if(!candidates){ toast('That doesn’t look like a ledger or photos file.'); return; }
  await mergeImportedPhotos(candidates, sourceHandle, sourceName, parsed);
}
// Shared by both the plain-file and password-unlocked import paths: dedupes by data URL, adds
// the rest into the currently active photo store (photoState if linked, else state.photos), and
// offers to scrub the source file afterward. Never touches the destination's own lock/password.
async function mergeImportedPhotos(candidates, sourceHandle, sourceName, originalParsedForWipe){
  const dest=getPhotosArray();
  const existingUrls=new Set(dest.map(p=>p.dataUrl));
  let added=0, skipped=0;
  candidates.forEach(p=>{
    if(!p || typeof p.dataUrl!=='string' || !p.dataUrl.startsWith('data:image')){ skipped++; return; }
    if(existingUrls.has(p.dataUrl)){ skipped++; return; }
    dest.push({
      id:uid(),
      dataUrl:p.dataUrl,
      note: typeof p.note==='string' ? p.note : '',
      takenAt: typeof p.takenAt==='string' ? p.takenAt : new Date().toISOString()
    });
    existingUrls.add(p.dataUrl);
    added++;
  });

  if(added>0){ markPhotosDirty(); render(); }
  toast(added>0
    ? `Imported ${added} photo${added===1?'':'s'}${skipped?` (${skipped} skipped)`:''} into your main photo file.`
    : `No new photos found${skipped?` (${skipped} skipped)`:''}.`);

  if(!sourceHandle || added===0) return; // no handle (fallback input) or nothing to clean up

  const wipe=confirm(`Photos copied in. Erase the photos inside "${sourceName}" now so no extra copy is left behind on that device? This can’t be undone.`);
  if(!wipe) return;
  await scrubSourceFile(sourceHandle, originalParsedForWipe);
}
